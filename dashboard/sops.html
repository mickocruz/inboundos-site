@font-face{font-family:'NHGrotesk';src:url('/dashboard/fonts/NHGrotesk-Black.otf') format('opentype');font-weight:900;}
:root{
  --bg:#0D1117;--surface:rgba(255,255,255,0.015);--card:rgba(255,255,255,0.02);--card-hover:rgba(255,255,255,0.035);
  --border:rgba(255,255,255,0.07);--border-glow:rgba(79,195,247,0.2);
  --accent:#4FC3F7;--accent-dim:rgba(79,195,247,0.07);
  --text:#ffffff;--text-muted:rgba(255,255,255,0.3);--text-dim:rgba(255,255,255,0.22);
  --green:#4ade80;--yellow:#fbbf24;--red:#f87171;--purple:#a78bfa;
  --sidebar-w:180px;
  --font-head:'NHGrotesk','Arial Black',Arial,sans-serif;
  --font-data:'DM Sans',sans-serif;--font-body:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 40% at 50% -5%,rgba(79,195,247,0.06) 0%,transparent 70%);pointer-events:none;z-index:0;}
.layout{display:flex;height:100vh;position:relative;z-index:1;}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:rgba(7,11,18,0.82);border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;padding:0 0 16px;backdrop-filter:blur(32px) saturate(160%);-webkit-backdrop-filter:blur(32px) saturate(160%);z-index:10;overflow-y:auto;scrollbar-width:none;box-shadow:inset -1px 0 0 rgba(255,255,255,0.04);}
.sidebar::-webkit-scrollbar{display:none;}
.sidebar-logo-wrap{padding:18px 16px 14px;border-bottom:1px solid var(--border);margin-bottom:8px;cursor:pointer;}
.sidebar-logo-wrap img{width:100%;height:auto;max-height:36px;object-fit:contain;object-position:left center;}
.sidebar-logo-text{font-family:var(--font-head);font-size:17px;font-weight:900;letter-spacing:-0.5px;line-height:1;user-select:none;}
.nav-section{padding:10px 0 4px;}
.nav-section-label{font-family:var(--font-data);font-size:9px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--text-dim);padding:0 16px;margin-bottom:4px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;transition:all 0.15s ease;color:var(--text-muted);position:relative;user-select:none;font-family:var(--font-data);font-size:13px;font-weight:500;border-left:2px solid transparent;}
.nav-item svg{width:14px;height:14px;flex-shrink:0;opacity:0.7;}
.nav-item:hover{background:rgba(79,195,247,0.04);color:rgba(255,255,255,0.75);}
.nav-item.active{color:#4FC3F7;border-left-color:#4FC3F7;background:rgba(79,195,247,0.06);}
.nav-item.active svg{opacity:1;}
.sidebar-bottom{margin-top:auto;padding:12px 16px 0;border-top:1px solid var(--border);}
.mk-avatar-wrap{display:flex;align-items:center;gap:10px;}
.mk-name{font-family:var(--font-data);font-size:12px;font-weight:600;color:#ffffff;line-height:1.2;}
.mk-role{font-family:var(--font-data);font-size:10px;color:rgba(255,255,255,0.42);}
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px 28px 40px;display:flex;flex-direction:column;gap:20px;scrollbar-width:thin;scrollbar-color:rgba(79,195,247,0.12) transparent;}
.main::-webkit-scrollbar{width:3px;}.main::-webkit-scrollbar-thumb{background:rgba(79,195,247,0.15);border-radius:3px;}
.header{display:flex;align-items:flex-start;justify-content:space-between;}
.header-title{font-family:var(--font-head);font-size:30px;font-weight:900;letter-spacing:-1.5px;line-height:1;}
.header-sub{font-family:var(--font-data);font-size:11px;color:var(--text-muted);margin-top:5px;}

.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.sops-list{display:flex;flex-direction:column;gap:12px;}
.sop-card{background:rgba(255,255,255,0.028);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:0;overflow:hidden;transition:border-color 0.25s,box-shadow 0.25s,transform 0.3s cubic-bezier(0.34,1.56,0.64,1);box-shadow:inset 0 1px 0 rgba(255,255,255,0.07),0 4px 20px rgba(0,0,0,0.28);}
.sop-card:hover{border-color:rgba(79,195,247,0.2);}
.sop-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;cursor:pointer;gap:16px;}
.sop-header-left{display:flex;align-items:center;gap:14px;}
.sop-num{font-family:var(--font-head);font-size:11px;font-weight:900;letter-spacing:1.5px;color:var(--text-dim);min-width:28px;}
.sop-title{font-family:var(--font-head);font-size:14px;font-weight:900;letter-spacing:0.5px;}
.sop-meta{font-family:var(--font-data);font-size:11px;color:var(--text-muted);margin-top:2px;}
.sop-chevron{color:var(--text-dim);transition:transform 0.2s;flex-shrink:0;}
.sop-chevron.open{transform:rotate(180deg);}
.sop-body{border-top:1px solid var(--border);padding:16px 20px 18px;display:none;}
.sop-body.open{display:block;}
.sop-steps{list-style:none;display:flex;flex-direction:column;gap:8px;}

.sop-owner-label{font-family:var(--font-head);font-size:8px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);}
.owner-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:4px;font-family:var(--font-head);font-size:8px;font-weight:900;letter-spacing:1px;text-transform:uppercase;}

.amb{position:fixed;border-radius:50%;filter:blur(110px);pointer-events:none;z-index:0;}
.amb-1{width:700px;height:500px;top:-100px;left:10%;background:rgba(79,195,247,0.055);animation:ab1 20s ease-in-out infinite;}
.amb-2{width:500px;height:500px;bottom:5%;right:5%;background:rgba(74,222,128,0.04);animation:ab2 26s ease-in-out infinite;}
.amb-3{width:400px;height:400px;top:40%;left:40%;background:rgba(168,139,250,0.03);animation:ab3 32s ease-in-out infinite;}
@keyframes ab1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(60px,40px) scale(1.08);}}
@keyframes ab2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-50px,-30px) scale(1.06);}}
@keyframes ab3{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(40px,-50px) scale(0.94);}}
@media(prefers-reduced-motion:reduce){.amb{animation:none!important;}}

<script>
const SB_URL = 'https://cscfbuhwlfhblxprkwnh.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNzY2ZidWh3bGZoYmx4cHJrd25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NjMyMjUsImV4cCI6MjA5NTAzOTIyNX0.TNIW7H0iR7WxtPJSJi9LPBmqIiQu8w1xJ2MY4eDYVsA';
const SB_HEADERS = { 'apikey': SB_ANON, 'Authorization': `Bearer ${SB_ANON}` };
const CLIENT_ID = (document.cookie.match('(^|;) ?ctrl_slug=([^;]*)(;|$)')||[])[2]?.replace(/-/g,'_') || 'micko_cruz';

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleSOP(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('.sop-chevron');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chevron.classList.toggle('open', !isOpen);
}

async function loadSOPs() {
  const list = document.getElementById('sopsList');
  try {
    const res = await fetch(
      `${SB_URL}/rest/v1/sops?client_id=eq.${CLIENT_ID}&select=*&active=eq.true&order=sort_order.asc`,
      { headers: SB_HEADERS }
    );
    if (!res.ok) throw new Error(res.status);
    const sops = await res.json();
    if (!sops.length) { list.innerHTML = '<div style="font-family:var(--font-data);font-size:12px;color:var(--text-muted);padding:32px;text-align:center;">No SOPs found — run the schema SQL first</div>'; return; }
    list.innerHTML = sops.map(s => {
      const colors = s.agent_colors || {};
      const agents = (s.agents || []);
      const steps = (s.steps || []);
      return `
      <div class="sop-card">
        <div class="sop-header" onclick="toggleSOP(this)">
          <div class="sop-header-left">
            <div class="sop-num">${escHtml(s.number)}</div>
            <div>
              <div class="sop-title">${escHtml(s.title)}</div>
              ${s.meta ? `<div class="sop-meta">${escHtml(s.meta)}</div>` : ''}
            </div>
          </div>
          <svg class="sop-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="sop-body">
          <ul class="sop-steps">
            ${steps.map((step, i) => `<li class="sop-step"><span class="step-num">${String(i+1).padStart(2,'0')}</span>${escHtml(step)}</li>`).join('')}
          </ul>
          ${agents.length ? `
          <div class="sop-owner-row">
            <span class="sop-owner-label">Agents:</span>
            ${agents.map(a => {
              const color = colors[a] || '#ffffff';
              const bg = color.replace('#','');
              const r = parseInt(bg.slice(0,2),16), g = parseInt(bg.slice(2,4),16), b = parseInt(bg.slice(4,6),16);
              return `<span class="owner-badge" style="background:rgba(${r},${g},${b},0.1);color:${color};">${escHtml(a)}</span>`;
            }).join('')}
          </div>` : ''}
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    list.innerHTML = `<div style="font-family:var(--font-data);font-size:12px;color:var(--red);padding:32px;text-align:center;">Failed to load SOPs — run the schema SQL first</div>`;
  }
}

loadSOPs();
</script>

  fetch('http://localhost:3001/agent/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ agent: '_check', messages: [] }),
  }).then(res => res.json()).then(data => {
    if (!data.error) {
      const el = document.getElementById('nav-chat-item');
      if (!el) return;
      el.onclick = function() { location.href = 'chat.html'; };
      el.style.opacity = '';
      el.style.cursor = '';
      el.style.pointerEvents = '';
      el.removeAttribute('title');
      el.innerHTML = el.innerHTML.replace('🔒 Chat', 'Chat');
    }
  }).catch(() => { /* server offline — stay locked */ });
})();
</script>
<script>(function(){var sel=".card,.cs-card,.client-profile,.checklist-panel,.agent-card,.ops-card,.ov-card,.insight-card,.reel-card,.stat-card,.kcard,.sop-card,.swipe-card";function stagger(els){[].forEach.call(els,function(el,i){if(!el.classList.contains("s-visible")){setTimeout(function(){el.classList.add("s-visible");},60+i*70);}});}document.addEventListener("DOMContentLoaded",function(){stagger(document.querySelectorAll(sel));});var ob=new MutationObserver(function(ms){ms.forEach(function(m){m.addedNodes.forEach(function(n){if(n.nodeType===1){var found=n.matches&&n.matches(sel)?[n]:[];[].push.apply(found,n.querySelectorAll?n.querySelectorAll(sel):[]);stagger(found);}});});});ob.observe(document.body||document.documentElement,{childList:true,subtree:true});})();</script></body>
