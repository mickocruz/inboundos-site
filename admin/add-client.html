<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Client — InboundOS Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#0D1117;min-height:100vh;font-family:'DM Sans',sans-serif;color:#fff;padding:40px 16px;}
.wrap{max-width:560px;margin:0 auto;}
.logo{font-size:20px;font-weight:900;letter-spacing:-0.02em;margin-bottom:32px;}
.logo span{color:#4FC3F7;}
h1{font-size:18px;font-weight:700;margin-bottom:4px;}
.sub{font-size:12px;color:#8899A6;margin-bottom:32px;}
.card{background:rgba(28,44,59,0.4);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:32px;}
.section-label{font-size:10px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:#4FC3F7;margin:24px 0 16px;padding-bottom:8px;border-bottom:1px solid rgba(79,195,247,0.15);}
.section-label:first-child{margin-top:0;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:10px;color:#8899A6;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:6px;}
input,select{width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:11px 14px;font-size:13px;color:#fff;outline:none;font-family:'DM Sans',sans-serif;transition:border-color 0.15s;}
input::placeholder{color:rgba(255,255,255,0.2);}
input:focus{border-color:rgba(79,195,247,0.4);}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.hint{font-size:11px;color:#8899A6;margin-top:5px;}
.btn{width:100%;padding:13px;background:#4FC3F7;color:#0D1117;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;border:none;border-radius:10px;cursor:pointer;margin-top:24px;font-family:'DM Sans',sans-serif;transition:filter 0.15s;}
.btn:hover{filter:brightness(1.1);}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.msg{margin-top:16px;padding:12px 16px;border-radius:10px;font-size:13px;display:none;}
.msg.success{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:#4ade80;}
.msg.error{background:rgba(248,81,49,0.1);border:1px solid rgba(248,81,49,0.3);color:#f87171;}
#gate{position:fixed;inset:0;background:#0D1117;display:flex;align-items:center;justify-content:center;z-index:100;}
.gate-card{width:100%;max-width:300px;background:rgba(28,44,59,0.4);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:32px;}
.gate-card h2{font-size:16px;font-weight:700;margin-bottom:4px;}
.gate-card p{font-size:12px;color:#8899A6;margin-bottom:20px;}
.gate-error{font-size:11px;color:#f87171;margin-top:8px;display:none;}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:40px;}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#8899A6;padding:0;display:flex;align-items:center;}
.eye:hover{color:#fff;}
</style>
</head>
<body>

<!-- Admin gate -->
<div id="gate">
  <div class="gate-card">
    <h2>Admin Access</h2>
    <p>InboundOS internal only</p>
    <div class="field">
      <label>Admin Password</label>
      <div class="pw-wrap">
        <input type="password" id="gate-pw" placeholder="Enter password" autofocus>
        <button type="button" class="eye" onclick="togglePw('gate-pw',this)" tabindex="-1">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>
    <div class="gate-error" id="gate-err">Wrong password</div>
    <button class="btn" onclick="checkGate()">Enter</button>
  </div>
</div>

<div class="wrap" id="main" style="display:none;">
  <div class="logo">Inbound<span>OS</span> <span style="font-size:11px;color:#8899A6;font-weight:400;letter-spacing:0.1em;">ADMIN</span></div>
  <h1>Add New Client</h1>
  <p class="sub">Fills in the database automatically. No SQL needed.</p>

  <div class="card">

    <div class="section-label">Client Info</div>
    <div class="row">
      <div class="field">
        <label>First Name</label>
        <input type="text" id="first_name" placeholder="John">
      </div>
      <div class="field">
        <label>Last Name</label>
        <input type="text" id="last_name" placeholder="Smith">
      </div>
    </div>
    <div class="field">
      <label>Agency Name</label>
      <input type="text" id="agency_name" placeholder="Smith Media">
    </div>
    <div class="field">
      <label>Username (used for login URL)</label>
      <input type="text" id="username" placeholder="john-smith" oninput="autoSlug(this)">
      <div class="hint">Lowercase, dashes only. e.g. <code>john-smith</code></div>
    </div>
    <div class="field">
      <label>Login Password</label>
      <input type="text" id="password" placeholder="Set their password">
    </div>

    <div class="section-label">Their Supabase</div>
    <p style="font-size:12px;color:#8899A6;margin-bottom:16px;">Get these from their Supabase → Project Settings → API</p>
    <div class="field">
      <label>Project URL</label>
      <input type="text" id="sb_url" placeholder="https://xxxxxx.supabase.co">
    </div>
    <div class="field">
      <label>Anon Key</label>
      <input type="text" id="sb_anon" placeholder="eyJ...">
    </div>
    <div class="field">
      <label>Service Role Key</label>
      <input type="text" id="sb_service" placeholder="eyJ...">
    </div>

    <button class="btn" id="submit-btn" onclick="addClient()">Add Client</button>
    <div class="msg success" id="msg-ok"></div>
    <div class="msg error" id="msg-err"></div>

  </div>
</div>

<script>
// ── ADMIN GATE ────────────────────────────────────────────────
// Password checked server-side — never exposed in source code

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const isHidden = inp.type === 'password';
  inp.type = isHidden ? 'text' : 'password';
  btn.innerHTML = isHidden
    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
}

// ── AUTO SLUG ─────────────────────────────────────────────────
function autoSlug(el) {
  el.value = el.value.toLowerCase().replace(/[^a-z0-9-]/g, '-').replace(/-+/g, '-');
}

// All client creation routes through the provision-client Clio Function server-side.
// No service role key ever touches the browser.
const PROVISION_URL = 'https://cscfbuhwlfhblxprkwnh.supabase.co/functions/v1/provision-client';

// Admin password is stored in sessionStorage after gate check — used as x-master-token
let _adminPw = '';

async function checkGate() {
  const pw = document.getElementById('gate-pw').value;
  const errEl = document.getElementById('gate-err');
  errEl.style.display = 'none';
  try {
    const res = await fetch('/api/admin/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    if (res.ok) {
      _adminPw = pw; // keep in memory only — never persisted
      document.getElementById('gate').style.display = 'none';
      document.getElementById('main').style.display = 'block';
    } else {
      errEl.style.display = 'block';
    }
  } catch {
    errEl.style.display = 'block';
  }
}
document.addEventListener('DOMContentLoaded', () => {
  const gatePw = document.getElementById('gate-pw');
  if (gatePw) gatePw.addEventListener('keydown', e => { if (e.key === 'Enter') checkGate(); });
});

async function addClient() {
  const btn = document.getElementById('submit-btn');
  const ok  = document.getElementById('msg-ok');
  const err = document.getElementById('msg-err');
  ok.style.display = err.style.display = 'none';

  const first    = document.getElementById('first_name').value.trim();
  const last     = document.getElementById('last_name').value.trim();
  const agency   = document.getElementById('agency_name').value.trim();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const sb_url   = document.getElementById('sb_url').value.trim();
  const sb_anon  = document.getElementById('sb_anon').value.trim();
  const sb_svc   = document.getElementById('sb_service').value.trim();

  if (!first || !last || !username || !password || !sb_url || !sb_anon || !sb_svc) {
    err.textContent = 'Fill in all fields before submitting.';
    err.style.display = 'block';
    return;
  }

  const client_id   = username.replace(/-/g, '_');
  const client_slug = username;

  btn.textContent = 'Adding...';
  btn.disabled = true;

  try {
    const res = await fetch(PROVISION_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-master-token': _adminPw,
      },
      body: JSON.stringify({
        first_name: first,
        last_name: last,
        agency_name: agency,
        username,
        password,
        client_id,
        client_slug,
        client_supabase_url:  sb_url,
        client_supabase_anon: sb_anon,
        client_supabase_service: sb_svc,
      }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

    ok.textContent = `✓ ${first} ${last} added. Login: ${username} / ${password}`;
    ok.style.display = 'block';
    ['first_name','last_name','agency_name','username','password','sb_url','sb_anon','sb_service'].forEach(id => document.getElementById(id).value = '');

  } catch (e) {
    err.textContent = e.message;
    err.style.display = 'block';
  }

  btn.textContent = 'Add Client';
  btn.disabled = false;
}
</script>
</body>
</html>
