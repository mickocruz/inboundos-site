<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Health — InboundOS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0D1117; color: #fff; font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 40px; }
  h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
  h1 span { color: #4FC3F7; }
  .subtitle { color: #8b949e; margin-bottom: 30px; font-size: 0.95rem; }

  .controls { display: flex; gap: 12px; margin-bottom: 30px; align-items: center; }
  .btn-primary { background: #4FC3F7; color: #0D1117; border: none; border-radius: 8px; padding: 10px 20px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: opacity 0.2s; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .last-refresh { color: #8b949e; font-size: 0.85rem; }

  .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; margin-bottom: 30px; }

  .service-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 20px; transition: all 0.3s ease; }
  .service-card:hover { border-color: rgba(79,195,247,0.3); background: rgba(255,255,255,0.03); }

  .service-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .service-name { font-size: 1rem; font-weight: 600; color: #c9d1d9; }
  .status-indicator { display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; animation: pulse-dot 2s infinite; }
  .status-dot.online { background: #4ade80; box-shadow: 0 0 10px rgba(74,222,128,0.6); }
  .status-dot.offline { background: #f87171; box-shadow: 0 0 10px rgba(248,113,113,0.6); }
  .status-dot.degraded { background: #facc15; box-shadow: 0 0 10px rgba(250,204,21,0.6); }
  .status-text { font-size: 0.85rem; font-weight: 500; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  .status-text.online { color: #4ade80; }
  .status-text.offline { color: #f87171; }
  .status-text.degraded { color: #facc15; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .service-details { display: flex; flex-direction: column; gap: 12px; }
  .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { font-size: 0.8rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  .detail-value { font-size: 0.9rem; color: #c9d1d9; font-family: 'Courier New', monospace; }

  .error-message { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); border-radius: 8px; padding: 12px; color: #f87171; font-size: 0.85rem; margin-top: 8px; }
  .loading { color: #8b949e; font-style: italic; }

  .footer { margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.08); color: #8b949e; font-size: 0.85rem; }
</style>
<link rel="stylesheet" href="/dashboard/glass.css">
</head>
<body>
<h1>System<span>.</span> Health</h1>
<p class="subtitle">Real-time service status & performance</p>

<div class="controls">
  <button class="btn-primary" id="refreshBtn" onclick="checkAllServices()">Check Now</button>
  <span class="last-refresh">Last checked: <span id="lastRefresh">Never</span></span>
</div>

<div class="services-grid" id="servicesGrid">
  <!-- Service cards will be inserted here -->
</div>

<div class="footer">
  Auto-refresh every 30 seconds. All services must respond within 5 seconds.
</div>

<script>
const SERVICES = [
  { name: 'Supabase', id: 'supabase', check: checkSupabase },
  { name: 'n8n', id: 'n8n', check: checkN8n, url: 'http://localhost:5678/healthz' },
  { name: 'Qualify Server', id: 'qualify', check: checkQualifyServer, url: 'http://localhost:3001/health' },
  { name: 'Claude CLI', id: 'claude', check: checkClaude, url: 'http://localhost:7821/health' },
  { name: 'Vercel', id: 'vercel', check: checkVercel },
  { name: 'Nexus Bot', id: 'nexus', check: checkNexus }
];

const STATE = {
  checks: {},
  autoRefreshInterval: null
};

async function checkAllServices() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = 'Checking...';

  const promises = SERVICES.map(svc =>
    svc.check(svc).then(result => {
      STATE.checks[svc.id] = result;
      renderServiceCard(svc, result);
    }).catch(err => {
      const result = { status: 'offline', error: err.message, responseTime: null };
      STATE.checks[svc.id] = result;
      renderServiceCard(svc, result);
    })
  );

  await Promise.all(promises);

  const now = new Date();
  document.getElementById('lastRefresh').textContent = now.toLocaleTimeString();

  btn.disabled = false;
  btn.textContent = 'Check Now';
}

async function checkSupabase() {
  const start = Date.now();
  try {
    const res = await fetch('/api/health/supabase', { signal: AbortSignal.timeout(5000) });
    const responseTime = Date.now() - start;
    if (res.ok) {
      return { status: 'online', responseTime };
    } else {
      return { status: 'offline', error: `HTTP ${res.status}`, responseTime };
    }
  } catch(err) {
    return { status: 'offline', error: err.message, responseTime: Date.now() - start };
  }
}

async function checkN8n(svc) {
  const start = Date.now();
  try {
    const res = await fetch(svc.url, { signal: AbortSignal.timeout(5000), mode: 'no-cors' });
    const responseTime = Date.now() - start;
    return { status: 'online', responseTime };
  } catch(err) {
    return { status: 'offline', error: err.message, responseTime: Date.now() - start };
  }
}

async function checkQualifyServer(svc) {
  const start = Date.now();
  try {
    const res = await fetch(svc.url, { signal: AbortSignal.timeout(5000) });
    const responseTime = Date.now() - start;
    if (res.ok) {
      const data = await res.json();
      return { status: 'online', responseTime, services: data.services || {} };
    } else {
      return { status: 'offline', error: `HTTP ${res.status}`, responseTime };
    }
  } catch(err) {
    return { status: 'offline', error: err.message, responseTime: Date.now() - start };
  }
}

async function checkClaude(svc) {
  const start = Date.now();
  try {
    const res = await fetch(svc.url, { signal: AbortSignal.timeout(5000) });
    const responseTime = Date.now() - start;
    if (res.ok) {
      return { status: 'online', responseTime };
    } else {
      return { status: 'offline', error: `HTTP ${res.status}`, responseTime };
    }
  } catch(err) {
    return { status: 'offline', error: err.message, responseTime: Date.now() - start };
  }
}

async function checkVercel() {
  const start = Date.now();
  try {
    const res = await fetch('https://inboundos.vercel.app/ping', { signal: AbortSignal.timeout(5000) });
    const responseTime = Date.now() - start;
    return { status: 'online', responseTime };
  } catch(err) {
    try {
      const res = await fetch('https://inboundos.vercel.app', { method: 'HEAD', signal: AbortSignal.timeout(5000) });
      const responseTime = Date.now() - start;
      return { status: 'online', responseTime };
    } catch(err2) {
      return { status: 'offline', error: err2.message, responseTime: Date.now() - start };
    }
  }
}

async function checkNexus() {
  return { status: 'unknown', error: 'Telegram bot (not directly pingable)', responseTime: null };
}

function renderServiceCard(svc, result) {
  const grid = document.getElementById('servicesGrid');
  let card = document.getElementById(`card-${svc.id}`);
  if (!card) {
    card = document.createElement('div');
    card.id = `card-${svc.id}`;
    card.className = 'service-card';
    grid.appendChild(card);
  }

  const statusClass = result.status === 'online' ? 'online' : (result.status === 'degraded' ? 'degraded' : 'offline');
  const statusText = result.status === 'online' ? 'Online' : (result.status === 'degraded' ? 'Degraded' : 'Offline');

  let servicesDetails = '';
  if (result.services) {
    servicesDetails = `
      <div class="detail-row">
        <span class="detail-label">Supabase Check</span>
        <span class="detail-value">${result.services.supabase ? '✓ Ok' : '✗ Down'}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">n8n Check</span>
        <span class="detail-value">${result.services.n8n ? '✓ Ok' : '✗ Down'}</span>
      </div>
    `;
  }

  card.innerHTML = `
    <div class="service-header">
      <span class="service-name">${svc.name}</span>
      <div class="status-indicator">
        <div class="status-dot ${statusClass}"></div>
        <span class="status-text ${statusClass}">${statusText}</span>
      </div>
    </div>
    <div class="service-details">
      <div class="detail-row">
        <span class="detail-label">Response Time</span>
        <span class="detail-value">${result.responseTime !== null ? result.responseTime + 'ms' : 'N/A'}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Last Check</span>
        <span class="detail-value">${new Date().toLocaleTimeString()}</span>
      </div>
      ${servicesDetails}
    </div>
    ${result.error ? `<div class="error-message">${result.error}</div>` : ''}
  `;
}

function initGrid() {
  const grid = document.getElementById('servicesGrid');
  SERVICES.forEach(svc => {
    const card = document.createElement('div');
    card.id = `card-${svc.id}`;
    card.className = 'service-card';
    card.innerHTML = '<div class="loading">Initializing...</div>';
    grid.appendChild(card);
  });
}

function startAutoRefresh() {
  checkAllServices();
  STATE.autoRefreshInterval = setInterval(checkAllServices, 30000);
}

window.addEventListener('beforeunload', () => {
  if (STATE.autoRefreshInterval) clearInterval(STATE.autoRefreshInterval);
});

document.addEventListener('DOMContentLoaded', () => {
  initGrid();
  startAutoRefresh();
});
</script>
</body>
</html>
