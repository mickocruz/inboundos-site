<style>
@font-face { font-family:'NHGrotesk'; src:url('/dashboard/fonts/NHGrotesk-Black.otf') format('opentype'); font-weight:900; }
:root {
  --bg:#0D1117; --surface:rgba(255,255,255,0.015); --card:rgba(255,255,255,0.02); --border:rgba(255,255,255,0.07); --border-glow:rgba(79,195,247,0.2);
  --accent:#4FC3F7; --accent-dim:rgba(79,195,247,0.07); --text:#ffffff; --text-muted:rgba(255,255,255,0.3); --text-dim:rgba(255,255,255,0.22);
  --green:#4ade80; --yellow:#fbbf24; --red:#f87171; --purple:#a78bfa; --orange:#fb923c;
  --sidebar-w:180px; --font-head:'NHGrotesk','Arial Black',Arial,sans-serif; --font-data:'DM Sans',sans-serif; --font-body:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;overflow:hidden;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(79,195,247,0.08) 0%,transparent 70%),radial-gradient(ellipse 40% 60% at 100% 20%,rgba(79,195,247,0.03) 0%,transparent 60%);pointer-events:none;z-index:0;}
.amb{position:fixed;border-radius:50%;filter:blur(110px);pointer-events:none;z-index:0;}
.amb-1{width:700px;height:500px;top:-100px;left:10%;background:rgba(79,195,247,0.055);animation:ab1 20s ease-in-out infinite;}
.amb-2{width:500px;height:500px;bottom:5%;right:5%;background:rgba(74,222,128,0.04);animation:ab2 26s ease-in-out infinite;}
.amb-3{width:400px;height:400px;top:40%;left:40%;background:rgba(168,139,250,0.03);animation:ab3 32s ease-in-out infinite;}
@keyframes ab1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(60px,40px) scale(1.08);}}
@keyframes ab2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-50px,-30px) scale(1.06);}}
@keyframes ab3{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(40px,-50px) scale(0.94);}}
@media(prefers-reduced-motion:reduce){.amb{animation:none!important;}}
.layout{display:flex;height:100vh;position:relative;z-index:1;}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:rgba(7,11,18,0.97);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0 0 16px;backdrop-filter:blur(24px);z-index:10;overflow-y:auto;scrollbar-width:none;}
.sidebar::-webkit-scrollbar{display:none;}
.sidebar-logo-wrap{padding:18px 16px 14px;border-bottom:1px solid var(--border);margin-bottom:8px;cursor:pointer;}
.sidebar-logo-text{font-family:var(--font-head);font-size:17px;font-weight:900;letter-spacing:-0.5px;line-height:1;user-select:none;}
.nav-section{padding:10px 0 4px;}
.nav-section-label{font-family:var(--font-data);font-size:9px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--text-dim);padding:0 16px;margin-bottom:4px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;transition:all 0.15s ease;color:var(--text-muted);position:relative;user-select:none;font-family:var(--font-data);font-size:13px;font-weight:500;border-left:2px solid transparent;}
.nav-item svg{width:14px;height:14px;flex-shrink:0;opacity:0.7;}
.nav-item:hover{background:rgba(79,195,247,0.04);color:rgba(255,255,255,0.75);}
.nav-item.active{color:#4FC3F7;border-left-color:#4FC3F7;background:rgba(79,195,247,0.06);}
.nav-item.active svg{opacity:1;}
.sidebar-bottom{margin-top:auto;padding:12px 16px 0;border-top:1px solid var(--border);}
.mk-avatar-wrap{display:flex;align-items:center;gap:10px;cursor:pointer;}
.mk-name{font-family:var(--font-data);font-size:12px;font-weight:600;color:#ffffff;line-height:1.2;}
.mk-role{font-family:var(--font-data);font-size:10px;color:rgba(255,255,255,0.42);}

/* MAIN */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.page-header{padding:22px 24px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.page-header h1{font-family:var(--font-head);font-size:28px;font-weight:900;letter-spacing:-1.2px;line-height:1;}
.page-header h1 span{color:var(--accent);}
.page-header .sub{font-family:var(--font-data);font-size:11px;color:var(--text-muted);margin-top:4px;}
.header-right{display:flex;gap:8px;align-items:center;}
.pill{display:flex;align-items:center;gap:6px;border-radius:20px;padding:5px 12px;font-family:var(--font-data);font-size:11px;font-weight:500;border:1px solid rgba(79,195,247,0.22);background:var(--accent-dim);color:var(--accent);cursor:pointer;transition:all 0.15s;}
.pill:hover{background:rgba(79,195,247,0.12);}
.pill-warn{background:rgba(248,113,113,0.08);border-color:rgba(248,113,113,0.22);color:var(--red);}

/* STAGE FILTERS */
.stage-filters{display:flex;gap:6px;padding:0 24px 12px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.stage-filters::-webkit-scrollbar{display:none;}
.chip{display:flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:rgba(255,255,255,0.02);cursor:pointer;transition:all 0.15s;font-family:var(--font-data);font-size:11px;font-weight:500;white-space:nowrap;color:var(--text-muted);}
.chip:hover{border-color:rgba(79,195,247,0.2);color:var(--text);}
.chip.on{border-color:rgba(79,195,247,0.35);background:rgba(79,195,247,0.07);color:var(--accent);}
.chip-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.chip-cnt{font-size:9.5px;opacity:0.55;margin-left:1px;}

/* BODY */
.crm-body{flex:1;overflow:hidden;display:flex;border-top:1px solid var(--border);}
.list-col{width:320px;min-width:320px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.search-bar{padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.search-bar input{width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:7px;padding:6px 11px;color:var(--text);font-family:var(--font-data);font-size:12px;outline:none;transition:border-color 0.15s;}
.search-bar input:focus{border-color:rgba(79,195,247,0.3);}
.search-bar input::placeholder{color:var(--text-dim);}
.lead-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(79,195,247,0.1) transparent;}
.lead-list::-webkit-scrollbar{width:3px;}
.lead-list::-webkit-scrollbar-thumb{background:rgba(79,195,247,0.12);border-radius:3px;}
.lead-row{display:flex;align-items:center;gap:9px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:background 0.12s;border-left:2px solid transparent;}
.lead-row:hover{background:rgba(255,255,255,0.02);}
.lead-row.sel{background:rgba(79,195,247,0.05);border-left-color:var(--accent);}
.l-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.l-info{flex:1;min-width:0;}
.l-handle{font-family:var(--font-data);font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.l-sub{font-family:var(--font-data);font-size:10px;color:var(--text-muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.l-right{text-align:right;flex-shrink:0;}
.urg{font-family:var(--font-data);font-size:9px;font-weight:600;letter-spacing:0.3px;text-transform:uppercase;}
.urg-overdue{color:var(--red);}
.urg-today{color:var(--yellow);}
.urg-date{color:var(--text-dim);font-size:9px;font-family:var(--font-data);}
.quill-tag{font-family:var(--font-data);font-size:9px;color:rgba(79,195,247,0.45);margin-top:2px;}
.empty{display:flex;align-items:center;justify-content:center;height:100%;font-family:var(--font-data);font-size:12px;color:var(--text-dim);}

/* DETAIL */
.detail-col{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(79,195,247,0.1) transparent;}
.detail-col::-webkit-scrollbar{width:3px;}
.detail-col::-webkit-scrollbar-thumb{background:rgba(79,195,247,0.12);border-radius:3px;}
.detail-placeholder{display:flex;align-items:center;justify-content:center;height:100%;font-family:var(--font-data);font-size:12px;color:var(--text-dim);}
.detail-inner{padding:22px 26px;display:flex;flex-direction:column;gap:18px;}
.d-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.d-handle{font-family:var(--font-head);font-size:22px;font-weight:900;letter-spacing:-0.5px;}
.d-name{font-family:var(--font-data);font-size:11px;color:var(--text-muted);margin-top:3px;}
.d-stage-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);font-family:var(--font-data);font-size:11px;font-weight:500;white-space:nowrap;color:var(--text-muted);}
.sec-head{font-family:var(--font-head);font-size:9px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.sec-head::after{content:'';flex:1;height:1px;background:var(--border);}
.d-grid{display:grid;grid-template-columns:100px 1fr;gap:5px 10px;}
.d-lbl{font-family:var(--font-data);font-size:10px;color:var(--text-dim);padding-top:1px;}
.d-val{font-family:var(--font-data);font-size:10.5px;color:var(--text-muted);line-height:1.4;}
.stage-sel{width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-family:var(--font-data);font-size:11px;outline:none;cursor:pointer;transition:border-color 0.15s;}
.stage-sel:focus{border-color:rgba(79,195,247,0.3);}
.stage-sel option{background:#0D1117;color:#fff;}
.notes-ta{width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text-muted);font-family:var(--font-data);font-size:11px;resize:none;outline:none;line-height:1.5;transition:border-color 0.15s;min-height:75px;}
.notes-ta:focus{border-color:rgba(79,195,247,0.3);color:var(--text);}
.save-btn{padding:6px 16px;background:var(--accent);border:none;border-radius:7px;font-family:var(--font-data);font-size:10px;font-weight:700;color:var(--bg);cursor:pointer;transition:all 0.15s;}
.save-btn:hover{box-shadow:0 0 12px rgba(79,195,247,0.3);}
.save-btn:disabled{opacity:0.4;cursor:default;}
.ig-btn{display:block;width:100%;padding:7px 0;text-align:center;border:1px solid var(--border);border-radius:8px;font-family:var(--font-data);font-size:10.5px;color:var(--text-muted);text-decoration:none;transition:all 0.15s;}
.ig-btn:hover{border-color:rgba(79,195,247,0.25);color:var(--accent);}
@keyframes pulse{0%,100%{opacity:0.3;}50%{opacity:0.7;}}
.loading{animation:pulse 1.2s ease-in-out infinite;}
</style>

      <div class="nav-item" onclick="location.href='/'+(function(){var v=document.cookie.match('(^|;) ?ctrl_slug=([^;]*)(;|$)');var s=v?v[2]:'';if(!s){var pages=['dashboard','agents','pipeline','performance','research','clients','sales-calls','sops','org-chart','crm','login'];var p=window.location.pathname.split('/').filter(Boolean);var seg=p[0]||'';s=pages.indexOf(seg)===-1?seg:'';}if(!s){window.location.href='/login';return '';}return s;})()+'/org-chart'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/><path d="M12 7v3M12 10l-5 7M12 10l5 7"/></svg>Org Chart</div>
    </div>
    <div class="sidebar-bottom"><div class="mk-avatar-wrap" onclick="window.__settingsOpen&&window.__settingsOpen()"><img src="/micko.jpg" alt="MK" style="width:32px;height:32px;object-fit:cover;border-radius:50%;border:1px solid rgba(79,195,247,0.2);"/><div><div class="mk-name">Micko Cruz</div><div class="mk-role">Founder · InboundOS</div></div></div></div>
  </nav>

  <main class="main">
    <div class="page-header">
      <div>
        <h1>Outreach <span>CRM</span></h1>
        <div class="sub" id="crm-sub">Loading leads…</div>
      </div>
      <div class="header-right">
        <div class="pill pill-warn" id="followup-pill" style="display:none"></div>
        <div class="pill" onclick="loadLeads()">↻ Refresh</div>
      </div>
    </div>

    <div class="stage-filters" id="stage-filters"></div>

    <div class="crm-body">
      <div class="list-col">
        <div class="search-bar"><input id="search" placeholder="Search handle, name, niche…" oninput="renderList()"></div>
        <div class="lead-list" id="lead-list"><div class="empty loading">Loading…</div></div>
      </div>
      <div class="detail-col" id="detail-col">
        <div class="detail-placeholder">Select a lead to view details</div>
      </div>
    </div>
  </main>
</div>

<script>
const SLUG_FN = `(function(){var v=document.cookie.match('(^|;) ?ctrl_slug=([^;]*)(;|$)');var s=v?v[2]:'';if(!s){var pages=['dashboard','agents','pipeline','performance','research','clients','sales-calls','sops','org-chart','crm','login'];var p=window.location.pathname.split('/').filter(Boolean);var seg=p[0]||'';s=pages.indexOf(seg)===-1?seg:'';}if(!s){window.location.href='/login';return '';}return s;})()`;

const STAGES=[
  {stage:-1,label:'All',dot:'#ffffff40'},
  {stage:1,label:'Opener Sent',dot:'#ffffff60'},
  {stage:2,label:'Quill Offer',dot:'#fbbf24'},
  {stage:3,label:'Setup Qs',dot:'#60a5fa'},
  {stage:4,label:'Quill Delivered',dot:'#a78bfa'},
  {stage:5,label:'Transition Sent',dot:'#fb923c'},
  {stage:6,label:'Call Booked',dot:'#4ade80'},
  {stage:0,label:'Dead',dot:'#ffffff20'},
  {stage:9,label:'Closed',dot:'#4FC3F7'},
];
const STAGE_LABEL={0:'Dead',1:'Opener Sent',2:'Quill Offer Sent',3:'Setup Questions Asked',4:'Quill Delivered',5:'Transition Sent',6:'Call Booked',9:'Closed'};

let leads=[],filter=-1,selId=null;

function dot(stage){return STAGES.find(s=>s.stage===stage)?.dot||'#ffffff30';}
function urgency(l){
  if(!l.next_followup_at||l.stage===0||l.stage===9)return null;
  const t=new Date().toISOString().slice(0,10);
  if(l.next_followup_at<t)return'overdue';
  if(l.next_followup_at===t)return'today';
  return'upcoming';
}

function getSupabaseToken(){
  try{const s=JSON.parse(localStorage.getItem('sb_session')||'null');return s?.access_token||'';}catch(e){return'';}
}

function renderFilters(){
  document.getElementById('stage-filters').innerHTML=STAGES.map(s=>{
    const cnt=s.stage===-1?leads.length:leads.filter(l=>l.stage===s.stage).length;
    return`<div class="chip ${filter===s.stage?'on':''}" onclick="setFilter(${s.stage})">
      ${s.stage!==-1?`<span class="chip-dot" style="background:${s.dot}"></span>`:''}
      ${s.label}<span class="chip-cnt">${cnt}</span>
    </div>`;
  }).join('');
}

function setFilter(s){filter=s;renderFilters();renderList();}

function renderList(){
  const q=document.getElementById('search').value.toLowerCase();
  const rows=leads.filter(l=>{
    const ms=filter===-1||l.stage===filter;
    const mq=!q||l.ig_handle.toLowerCase().includes(q)||(l.full_name||'').toLowerCase().includes(q)||(l.niche||'').toLowerCase().includes(q);
    return ms&&mq;
  });
  const el=document.getElementById('lead-list');
  if(!rows.length){el.innerHTML='<div class="empty">No leads</div>';return;}
  el.innerHTML=rows.map(l=>{
    const u=urgency(l);
    const ub=u==='overdue'?`<div class="urg urg-overdue">Overdue</div>`:u==='today'?`<div class="urg urg-today">Today</div>`:l.next_followup_at&&u==='upcoming'?`<div class="urg-date">${l.next_followup_at}</div>`:'';
    const qt=l.quill_built?'<div class="quill-tag">Quill built</div>':'';
    return`<div class="lead-row ${l.id===selId?'sel':''}" onclick="selectLead('${l.id}')">
      <span class="l-dot" style="background:${dot(l.stage)}"></span>
      <div class="l-info">
        <div class="l-handle">@${l.ig_handle}</div>
        <div class="l-sub">${[l.niche,STAGE_LABEL[l.stage]].filter(Boolean).join(' · ')}</div>
      </div>
      <div class="l-right">${ub}${qt}</div>
    </div>`;
  }).join('');
}

function selectLead(id){selId=id;renderList();renderDetail(leads.find(l=>l.id===id));}

function renderDetail(l){
  const col=document.getElementById('detail-col');
  if(!l){col.innerHTML='<div class="detail-placeholder">Select a lead to view details</div>';return;}
  const stageOpts=[1,2,3,4,5,6,0,9].map(v=>`<option value="${v}" ${l.stage==v?'selected':''}>${STAGE_LABEL[v]}</option>`).join('');
  const profile=[[l.niche,'Niche'],[l.follower_count&&l.follower_count.toLocaleString(),'Followers'],[l.location,'Location'],[l.bio_notes,'Bio note']].filter(r=>r[0]);
  const timeline=[[l.opener_sent_at,'Opener sent'],[l.last_message_at,'Last message'],[l.next_followup_at,'Next follow-up'],[String(l.followup_count||0),'Follow-ups']].filter(r=>r[0]);
  const intel=[[l.their_offer,'Offer'],[l.their_icp,'ICP'],[l.their_result,'Result'],[l.their_pain,'Pain'],[l.their_content_style,'Style'],[l.their_phrases,'Phrases']].filter(r=>r[0]);
  const rows=arr=>arr.map(([v,lb])=>`<div class="d-lbl">${lb}</div><div class="d-val">${v}</div>`).join('');
  col.innerHTML=`<div class="detail-inner">
    <div class="d-head">
      <div><div class="d-handle">@${l.ig_handle}</div>${l.full_name?`<div class="d-name">${l.full_name}</div>`:''}</div>
      <div class="d-stage-pill"><span class="chip-dot" style="background:${dot(l.stage)}"></span>${STAGE_LABEL[l.stage]||'Unknown'}</div>
    </div>
    ${profile.length?`<div><div class="sec-head">Profile</div><div class="d-grid">${rows(profile)}</div></div>`:''}
    <div><div class="sec-head">Timeline</div><div class="d-grid">${rows(timeline)}</div></div>
    ${intel.length?`<div><div class="sec-head">Intel (Stage 3)</div><div class="d-grid">${rows(intel)}</div></div>`:''}
    <div><div class="sec-head">Update Stage</div><select class="stage-sel" id="ssel-${l.id}">${stageOpts}</select></div>
    <div><div class="sec-head">Notes</div><textarea class="notes-ta" id="notes-${l.id}" placeholder="Add notes…">${l.notes||''}</textarea></div>
    <div style="display:flex;justify-content:flex-end"><button class="save-btn" id="sbtn-${l.id}" onclick="save('${l.id}')">Save</button></div>
    <a class="ig-btn" href="https://instagram.com/${l.ig_handle}" target="_blank" rel="noopener">View on Instagram ↗</a>
  </div>`;
}

async function save(id){
  const l=leads.find(x=>x.id===id);if(!l)return;
  const btn=document.getElementById(`sbtn-${id}`);
  btn.disabled=true;btn.textContent='Saving…';
  const patch={stage:parseInt(document.getElementById(`ssel-${id}`).value),notes:document.getElementById(`notes-${id}`).value};
  try{
    const token=getSupabaseToken();
    const r=await fetch(`https://cscfbuhwlfhblxprkwnh.supabase.co/rest/v1/outreach_leads?id=eq.${id}`,{
      method:'PATCH',
      headers:{'Content-Type':'application/json','apikey':'sb_publishable_1ZqIVolUXpUocXTtHP3yBA_UFNidOD8','Authorization':`Bearer ${token||'sb_publishable_1ZqIVolUXpUocXTtHP3yBA_UFNidOD8'}`,'Prefer':'return=minimal'},
      body:JSON.stringify(patch)
    });
    if(!r.ok)throw new Error(await r.text());
    l.stage=patch.stage;l.notes=patch.notes;
    btn.textContent='Saved ✓';renderFilters();renderList();
    setTimeout(()=>{if(btn){btn.textContent='Save';btn.disabled=false;}},1500);
  }catch(e){btn.textContent='Error';btn.disabled=false;console.error(e);}
}

async function loadLeads(){
  document.getElementById('lead-list').innerHTML='<div class="empty loading">Loading…</div>';
  try{
    const token=getSupabaseToken();
    const r=await fetch('https://cscfbuhwlfhblxprkwnh.supabase.co/rest/v1/outreach_leads?select=*&order=updated_at.desc',{
      headers:{'apikey':'sb_publishable_1ZqIVolUXpUocXTtHP3yBA_UFNidOD8','Authorization':`Bearer ${token||'sb_publishable_1ZqIVolUXpUocXTtHP3yBA_UFNidOD8'}`}
    });
    if(!r.ok)throw new Error(await r.text());
    leads=await r.json();
    const overdue=leads.filter(l=>urgency(l)==='overdue').length;
    const today=leads.filter(l=>urgency(l)==='today').length;
    document.getElementById('crm-sub').textContent=`${leads.length} leads · ${leads.filter(l=>l.stage===9).length} closed · ${leads.filter(l=>l.stage>0&&l.stage<9).length} active`;
    const pill=document.getElementById('followup-pill');
    if(overdue+today>0){pill.style.display='flex';pill.textContent=`${overdue+today} follow-up${overdue+today>1?'s':''} due`;}
    renderFilters();renderList();
    if(selId){const u=leads.find(l=>l.id===selId);if(u)renderDetail(u);}
  }catch(e){
    document.getElementById('crm-sub').textContent='Error loading — is the outreach_leads table created?';
    document.getElementById('lead-list').innerHTML=`<div class="empty" style="color:var(--red);padding:16px;text-align:center;font-size:11px;">${e.message}</div>`;
  }
}

loadLeads();
</script>
</body>
</html>
