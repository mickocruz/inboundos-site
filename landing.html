  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

tion: column; gap: 24px; }\n    .check-list, .x-list { display: flex; flex-direction: column; gap: 14px; }\n    .check-item, .x-item { display: flex; align-items: flex-start; gap: 14px; font-size: 15px; line-height: 1.5; }\n    .check-item { color: var(--white); }\n    .x-item { color: var(--cool-gray); }\n    .ci-icon {\n      width: 18px; height: 18px;\n      border: 1px solid var(--ice-blue);\n      border-radius: 4px;\n      display: flex; align-items: center; justify-content: center;\n      flex-shrink: 0; margin-top: 2px;\n    }\n    .xi-icon {\n      width: 18px; height: 18px;\n      border: 1px solid rgba(255,255,255,0.14);\n      border-radius: 4px;\n      display: flex; align-items: center; justify-content: center;\n      flex-shrink: 0; margin-top: 2px;\n    }\n    .ci-icon svg { width: 10px; height: 10px; stroke: var(--ice-blue); fill: none; }\n    .xi-icon svg { width: 10px; height: 10px; stroke: var(--cool-gray); fill: none; }\n    .list-sep { height: 1px; background: var(--border); }\n\n    /* ─── OFFER ─── */\n    #offer { border-bottom: 1px solid var(--border); }\n    .offer-layout { display: grid; grid-template-columns: 1fr 380px; gap: 72px; align-items: start; }\n    #offer h2 { font-size: clamp(34px, 5vw, 52px); margin-bottom: 40px; }\n    .deliverables { display: flex; flex-direction: column; }\n    .del {\n      display: flex; align-items: flex-start; gap: 16px;\n      font-size: 15px; color: var(--white); line-height: 1.55;\n      padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.045);\n    }\n    .del:first-child { padding-top: 0; }\n    .del:last-child  { border-bottom: none; }\n    .del-dot { width: 4px; height: 4px; background: var(--ice-blue); border-radius: 50%; flex-shrink: 0; margin-top: 9px; }\n\n    .offer-box {\n      background: rgba(22, 38, 54, 0.85);\n      border: 1px solid rgba(79,195,247,0.15);\n      border-radius: 18px;\n      padding: 40px;\n      position: sticky; top: 90px;\n      backdrop-filter: blur(16px);\n  background 0.22s ease;\n    }\n    .faq-item:hover { border-color: rgba(255,255,255,0.12); background: rgba(28,44,59,0.8); }\n    .faq-item.open { border-color: rgba(79,195,247,0.2); background: rgba(28,44,59,0.8); }\n    .faq-q {\n      font-family: var(--font-display);\n      font-weight: 700; font-size: 15px; letter-spacing: -0.01em;\n      display: flex; justify-content: space-between; align-items: flex-start; gap: 16px;\n      margin-bottom: 0;\n    }\n    .faq-icon {\n      width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px;\n      stroke: var(--slate-gray); fill: none;\n      transition: transform 0.25s ease, stroke 0.2s ease;\n    }\n    .faq-item.open .faq-icon { transform: rotate(45deg); stroke: var(--ice-blue); }\n    .faq-a {\n      font-size: 14px; color: var(--slate-gray); line-height: 1.7;\n      max-height: 0; overflow: hidden;\n      transition: max-height 0.35s cubic-bezier(0.16,1,0.3,1), opacity 0.3s ease, margin-top 0.3s ease;\n      opacity: 0; margin-top: 0;\n    }\n    .faq-item.open .faq-a { max-height: 320px; opacity: 1; margin-top: 12px; }\n\n    /* ─── FINAL CTA ─── */\n    #final-cta { padding: 128px 0; }\n    #final-cta h2 { font-size: clamp(40px, 6vw, 72px); max-width: 720px; margin-bottom: 24px; }\n    #final-cta h2 em { font-style: normal; color: var(--ice-blue); }\n    .cta-sub { font-size: 18px; color: var(--slate-gray); max-width: 440px; line-height: 1.6; margin-bottom: 44px; }\n    .scarcity { margin-top: 18px; font-size: 12px; color: var(--cool-gray); letter-spacing: 0.02em; }\n\n    /* ─── FOOTER ─── */\n    footer {\n      padding: 36px 48px; border-top: 1px solid var(--border);\n      display: flex; align-items: center; justify-content: space-between;\n    }\n    .footer-copy { font-size: 12px; color: var(--cool-gray); }\n\n    /* ─── TRANSFORM ROWS ─── */\n    .t-header { text-align: left; margin-bottom: 64px; max-width: 720px; }\n    .t-header h2 { font-size: clamp(34px, 5vw, 52px); margin-bottom: 14px; }\n    .t-header .t-sub { font-size: 17px; color: var(--slate-gray); max-width: 480px; margin: 0; }\n\n    .t-rows .t-row {\n      display: grid; grid-template-columns: 1fr 1fr;\n      gap: 64px; align-items: center;\n      padding: 72px 0; border-top: 1px solid var(--border);\n    }\n    .t-rows .t-row:first-child { border-top: none; }\n    .t-rows .t-row:last-child { padding-bottom: 0; }\n\n    .t-tag {\n      font-size: 10px; font-weight: 500; letter-spacing: 0.14em;\n      text-transform: uppercase; color: var(--ice-blue);\n      display: flex; align-items: center; gap: 12px;\n      margin-bottom: 14px;\n    }\n    .t-num { color: var(--cool-gray); }\n    .t-week {\n      margin-left: auto; font-size: 11px; color: var(--cool-gray);\n      background: rgba(255,255,255,0.05); border: 1px solid var(--border);\n      padding: 3px 10px; border-radius: 6px; letter-spacing: 0.02em;\n    }\n    .t-title {\n      font-family: var(--font-display);\n      font-weight: 700; font-size: clamp(24px, 2.8vw, 34px);\n      letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 14px;\n    }\n    .t-desc {\n      font-size: 16px; color: var(--slate-gray);\n      line-height: 1.65; margin-bottom: 22px; max-width: 400px;\n    }\n    .t-checks { display: flex; flex-direction: column; gap: 9px; }\n    .t-check-item { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; color: rgba(255,255,255,0.82); line-height: 1.45; }\n    .t-ci {\n      width: 16px; height: 16px;\n      border: 1px solid rgba(79,195,247,0.4); border-radius: 4px;\n      display: flex; align-items: center; justify-content: center;\n      flex-shrink: 0; margin-top: 1px;\n    }\n    .t-ci svg { width: 8px; height: 8px; stroke: var(--ice-blue); fill: none; }\n\n    /* ─── MOCK CARD BASE ─── */\n    .mc {\n      background: rgba(11, 16, 23, 0.98);\n      border: 1px solid rgba(255,255,255,0.09);\n      border-radius: 14px; overflow: hidden;\n      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);\n    }\n    .mc-chrome {\n      display: flex; align-items: center; gap: 7px;\n      padding: 12px 16px;\n      border-bottom: 1px solid rgba(255,255,255,0.06);\n      background: rgba(16,22,32,0.96);\n    }\n    .mc-d { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }\n    .mc-d1 { background: #FF5F57; }\n    .mc-d2 { background: #FEBC2E; }\n    .mc-d3 { background: #28C840; }\n    .mc-ttl { flex: 1; text-align: center; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; color: var(--slate-gray); }\n    .mc-live {\n      font-size: 10px; font-weight: 600; letter-spacing: 0.06em;\n      color: #28C840; display: flex; align-items: center; gap: 4px;\n    }\n    .mc-live::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: #28C840; animation: mc-pulse 2s ease-in-out infinite; }\n    @keyframes mc-pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }\n    .mc-body { padding: 16px 18px; }\n\n    /* card 1 — strategy */\n    .c1-icp {\n      display: flex; align-items: center; justify-content: space-between;\n      padding: 8px 12px; margin-bottom: 16px;\n      background: rgba(79,195,247,0.05); border: 1px solid rgba(79,195,247,0.12); border-radius: 8px;\n    }\n    .c1-icp-lbl { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--cool-gray); }\n    .c1-icp-val { font-size: 11px; font-weight: 500; color: var(--white); }\n    .c1-icp-tag { font-size: 9px; padding: 2px 8px; background: rgba(79,195,247,0.12); color: var(--ice-blue); border-radius: 100px; font-weight: 600; }\n    .c1-pillars { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }\n    .c1-p { display: flex; flex-direction: column; gap: 5px; }\n    .c1-p-top { display: flex; justify-content: space-between; }\n    .c1-p-name { font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase; }\n    .c1-p-pct { font-size: 9px; color: var(--slate-gray); }\n    .c1-track { height: 3px; background: rgba(255,255,255,0.06); border-radius: 100px; overflow: hidden; }\n    .c1-fill { height: 100%; border-radius: 100px; width: 0; }\n    .c1-f1 { background: var(--ice-blue); --fw: 78%; }\n    .c1-f2 { background: #A8F0C6; --fw: 64%; }\n    .c1-f3 { background: #F7B84B; --fw: 71%; }\n    .c1-f4 { background: #F87171; --fw: 52%; }\n    @keyframes bar-fill {\n      0%,4%   { width: 0; }\n      42%,68% { width: var(--fw); }\n      84%,100%{ width: 0; }\n    }\n    .mc.anim .c1-f1 { animation: bar-fill 5s ease-in-out 0s infinite; }\n    .mc.anim .c1-f2 { animation: bar-fill 5s ease-in-out 0.2s infinite; }\n    .mc.anim .c1-f3 { animation: bar-fill 5s ease-in-out 0.4s infinite; }\n    .mc.anim .c1-f4 { animation: bar-fill 5s ease-in-out 0.6s infinite; }\n    .c1-p1 .c1-p-name { color: var(--ice-blue); }\n    .c1-p2 .c1-p-name { color: #A8F0C6; }\n    .c1-p3 .c1-p-name { color: #F7B84B; }\n    .c1-p4 .c1-p-name { color: #F87171; }\n    .c1-rm-lbl { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--cool-gray); margin-bottom: 8px; }\n    .c1-rm-track { display: flex; align-items: center; padding-bottom: 14px; }\n    .c1-node {\n      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;\n      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18);\n      position: relative;\n    }\n    .c1-node::after { content: attr(data-lbl); position: absolute; top: 13px; left: 50%; transform: translateX(-50%); font-size: 8px; color: var(--cool-gray); white-space: nowrap; }\n    .c1-line { flex: 1; height: 1px; background: rgba(255,255,255,0.08); }\n    @keyframes cnode-lp {\n      0%,4%   { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.18); }\n      18%,60% { background: var(--ice-blue); border-color: var(--ice-blue); }\n      76%,100%{ background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.18); }\n    }\n    @keyframes cline-lp {\n      0%,4%   { background: rgba(255,255,255,0.08); }\n      18%,60% { background: var(--ice-blue); }\n      76%,100%{ background: rgba(255,255,255,0.08); }\n    }\n    .mc.anim .c1-node:nth-child(1) { animation: cnode-lp 6s ease-in-out 0s infinite; }\n    .mc.anim .c1-line:nth-child(2)  { animation: cline-lp 6s ease-in-out 0.5s infinite; }\n    .mc.anim .c1-node:nth-child(3) { animation: cnode-lp 6s ease-in-out 1.0s infinite; }\n    .mc.anim .c1-line:nth-child(4)  { animation: cline-lp 6s ease-in-out 1.5s infinite; }\n    .mc.anim .c1-node:nth-child(5) { animation: cnode-lp 6s ease-in-out 2.0s infinite; }\n    .mc.anim .c1-line:nth-child(6)  { animation: cline-lp 6s ease-in-out 2.5s infinite; }\n    .mc.anim .c1-node:nth-child(7) { animation: cnode-lp 6s ease-in-out 3.0s infinite; }\n\n    /* card 2 — ai agents */\n    .c2-prompt {\n      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);\n      border-radius: 8px; padding: 10px 12px; margin-bottom: 12px;\n    }\n    .c2-plbl { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--cool-gray); margin-bottom: 5px; }\n    .c2-ptxt { font-size: 11px; color: var(--slate-gray); line-height: 1.5; }\n    .c2-output {\n      background: rgba(79,195,247,0.04); border: 1px solid rgba(79,195,247,0.1);\n      border-radius: 8px; padding: 12px; min-height: 84px;\n    }\n    .c2-olbl {\n      font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;\n      color: var(--ice-blue); margin-bottom: 8px;\n    }\n    .c2-line {\n      font-size: 11px; line-height: 1.7; color: rgba(255,255,255,0.88);\n      white-space: nowrap; overflow: hidden; max-width: 0;\n    }\n    @keyframes tw-lp {\n      0%,2%   { max-width: 0; }\n      36%     { max-width: 100%; }\n      76%     { max-width: 100%; }\n      79%,100%{ max-width: 0; }\n    }\n    .mc.anim .c2-line:nth-child(2) { animation: tw-lp 8s steps(100,end) 0.1s infinite; }\n    .mc.anim .c2-line:nth-child(3) { animation: tw-lp 8s steps(100,end) 0.9s infinite; }\n    .mc.anim .c2-line:nth-child(4) { animation: tw-lp 8s steps(100,end) 1.7s infinite; }\n    .c2-cursor { display: inline-block; width: 2px; height: 11px; background: var(--ice-blue); margin-left: 1px; vertical-align: text-bottom; animation: blink 0.8s step-end infinite; }\n    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }\n    .c2-footer { display: flex; gap: 7px; margin-top: 10px; }\n    .c2-tag { font-size: 9px; font-weight: 600; padding: 3px 9px; border-radius: 100px; letter-spacing: 0.04em; }\n    .c2-tg { background: rgba(40,200,64,0.1); color: #28C840; }\n    .c2-tb { background: rgba(79,195,247,0.1); color: var(--ice-blue); }\n\n    /* card 3 — review queue */\n    .c3-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }\n    .c3-hlbl { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--slate-gray); }\n    .c3-hval { font-size: 10px; color: var(--ice-blue); font-weight: 600; }\n    .c3-items { display: flex; flex-direction: column; gap: 7px; margin-bottom: 12px; }\n    .c3-item {\n      display: flex; align-items: center; gap: 10px;\n      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);\n      border-radius: 8px; padding: 9px 12px;\n    }\n    .c3-item.c3-cur { border-color: rgba(247,184,75,0.2); }\n    .c3-in { font-size: 9px; color: var(--cool-gray); min-width: 16px; letter-spacing: 0.06em; }\n    .c3-itxt { flex: 1; }\n    .c3-ititle { font-size: 11px; color: var(--white); }\n    .c3-isub { font-size: 9px; color: var(--slate-gray); margin-top: 2px; }\n    .c3-badge { font-size: 9px; font-weight: 600; letter-spacing: 0.05em; padding: 3px 8px; border-radius: 100px; }\n    .c3-done   { background: rgba(40,200,64,0.1); color: #28C840; }\n    .c3-active { background: rgba(247,184,75,0.12); color: #F7B84B; }\n    .c3-queue  { background: rgba(255,255,255,0.05); color: var(--slate-gray); }\n    .mc.anim .c3-active { /* glow removed for calm */ }\n    @keyframes badge-glow { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 10px rgba(247,184,75,0.35)} }\n    .c3-fb { padding: 9px 12px; background: rgba(79,195,247,0.04); border: 1px solid rgba(79,195,247,0.1); border-radius: 8px; font-size: 10px; color: var(--slate-gray); line-height: 1.6; }\n    .c3-fb strong { color: var(--ice-blue); }\n\n    /* card 4 — conversion */\n    .c4-funnel { display: grid; grid-template-columns: repeat(4,1fr); gap: 5px; margin-bottom: 14px; }\n    .c4-stage { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; padding: 10px 6px; text-align: center; }\n    .c4-sn { font-family: var(--font-display); font-weight: 700; font-size: 20px; letter-spacing: -0.02em; line-height: 1; margin-bottom: 4px; }\n    .c4-sn em { font-style: normal; color: var(--ice-blue); font-size: 13px; }\n    .c4-sl { font-size: 8px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--slate-gray); }\n    .c4-flow { position: relative; height: 22px; margin-bottom: 12px; }\n    .c4-track { position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: rgba(255,255,255,0.07); transform: translateY(-50%); }\n    .c4-dot { position: absolute; top: 50%; width: 6px; height: 6px; background: var(--ice-blue); border-radius: 50%; transform: translate(-50%,-50%); left: 0; opacity: 0; }\n    .mc.anim .c4-dot:nth-child(2) { animation: dot-flow 3s linear 0.1s infinite; }\n    .mc.anim .c4-dot:nth-child(3) { animation: dot-flow 3s linear 1.1s infinite; }\n    .mc.anim .c4-dot:nth-child(4) { animation: dot-flow 3s linear 2.1s infinite; }\n    @keyframes dot-flow { 0%{left:0%;opacity:0} 5%{opacity:1} 95%{opacity:1} 100%{left:100%;opacity:0} }\n    .c4-dms { display: flex; flex-direction: column; gap: 6px; }\n    .c4-dm { display: flex; align-items: flex-start; gap: 7px; font-size: 10px; color: var(--slate-gray); line-height: 1.5; opacity: 0; transform: translateX(-5px); }\n    .c4-dm-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--ice-blue); flex-shrink: 0; margin-top: 4px; }\n    @keyframes dm-lp {\n      0%,4%   { opacity: 0; transform: translateX(-5px); }\n      16%,70% { opacity: 1; transform: translateX(0); }\n      82%,100%{ opacity: 0; transform: translateX(0); }\n    }\n    .mc.anim .c4-dm:nth-child(1) { animation: dm-lp 6s ease 0.3s infinite; }\n    .mc.anim .c4-dm:nth-child(2) { animation: dm-lp 6s ease 0.9s infinite; }\n    .mc.anim .c4-dm:nth-child(3) { animation: dm-lp 6s ease 1.5s infinite; }\n\n    /* ─── RESPONSIVE ─── */\n    @media (max-width: 900px) {\n      .container { padding: 0 24px; }\n      nav { padding: 16px 24px; }\n      section { padding: 72px 0; }\n      .pain-grid, .phases, .proof-grid,\n      .offer-layout, .icp-layout, .faq-layout,\n      .stat-row, .proof-bar, .leak-row,\n      .team-stack, .team-grid, .receipt-band { grid-template-columns: 1fr; }\n      .t-rows .t-row { grid-template-columns: 1fr; gap: 28px; padding: 48px 0; }\n      .system-header { flex-direction: column; gap: 24px; }\n      .includes-bar { flex-direction: column; align-items: flex-start; gap: 12px; }\n      .offer-box { position: static; }\n      .floating-cta { bottom: 18px; right: 14px; left: 14px; }\n      .floating-cta .btn { width: 100%; }\n      footer { flex-direction: column; gap: 12px; text-align: center; }\n    }\n    @media (max-width: 540px) {\n      #hero { padding-top: 132px; }\n      nav { gap: 14px; }\n      .nav-links { display: none; }\n      nav .btn { white-space: nowrap; padding: 9px 13px; font-size: 12px; }\n      .hero-actions { flex-direction: column; align-items: stretch; gap: 12px; }\n      #hero h1 { font-size: clamp(38px, 10vw, 58px); }\n      .audit-result { /* deprecated */ }\n      .audit-bar { /* deprecated */ }\n      .role-card { min-height: auto; }\n      .role-top { flex-direction: column; gap: 8px; }\n      .cost-summary { position: static; }\n    }\n    @media (min-width: 901px) {\n      .floating-cta { display: none; }\n    }\n  <\u002Fstyle>\n<\u002Fhead>\n\n\n<body>\n\n<!-- Background texture (brand rule: flat color, no gradients) -->\n<div class=\"bg-texture\" aria-hidden=\"true\"><\u002Fdiv>\n\n<!-- ─── NAV ─── -->\n<nav id=\"main-nav\" role=\"navigation\" aria-label=\"Main navigation\">\n  <a href=\"#\" class=\"logo\" aria-label=\"InboundOS home\">\n    <span class=\"l1\">Inbound<\u002Fspan><span class=\"l2\">OS<\u002Fspan>\n  <\u002Fa>\n  <div class=\"nav-links\">\n    <a href=\"#system\" class=\"nav-link\">The System<\u002Fa>\n    <a href=\"#process\" class=\"nav-link\">How It Works<\u002Fa>\n    <a href="/client-wins.html" class=\"nav-link\">Client Wins<\u002Fa>\n  <\u002Fdiv>\n  <a href=\"https://calendly.com/inboundos/discovery-call\" target=\"_blank\" rel=\"noopener noreferrer\" class=\"btn\">Get My Plan →<\u002Fa>\n<\u002Fnav>\n\n<!-- Floating CTA -->\n<div class=\"floating-cta\" id=\"floating-cta\" aria-hidden=\"true\">\n  <a href=\"https://calendly.com/inboundos/discovery-call\" target=\"_blank\" rel=\"noopener noreferrer\" class=\"btn btn-primary btn-lg\" tabindex=\"-1\">Get My Plan →<\u002Fa>\n<\u002Fdiv>\n\n<main>\n\n<!-- ══════════════ HERO ══════════════ -->\n<section id=\"hero\" aria-labelledby=\"hero-heading\">\n  <div class=\"container\">\n    <div class=\"hero-top\">\n      <div class=\"eyebrow\" aria-label=\"Program type\">\n        <span class=\"eyebrow-dot\" aria-hidden=\"true\"><\u002Fspan>\n        90-Day Done-With-You Installation\n      <\u002Fdiv>\n      <h1 id=\"hero-heading\" class=\"display\">\n        <span class=\"hero-line\">Stop running content manually.<\u002Fspan>\n        <span class=\"hero-line\"><em>Own the system that does it.<\u002Fem><\u002Fspan>\n      <\u002Fh1>\n      <p class=\"hero-sub\">\n        We map your company database, then build custom AI agents and automated workflows that run your content — so inbound leads keep arriving even when you're not posting.\n      <\u002Fp>\n      <div class=\"hero-actions\">\n        <a href=\"https://calendly.com/inboundos/discovery-call\" target=\"_blank\" rel=\"noopener noreferrer\" class=\"btn btn-primary btn-lg\">Get My Content Flywheel Plan →<\u002Fa>\n        <a href=\"#proof\" class=\"btn btn-secondary btn-lg\">See Receipts<\u002Fa>\n      <\u002Fdiv>\n      <p class=\"hero-note\" style=\"margin-top:14px;\">30-minute audit. Limited spots. Application required.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"audit-card-wrap\">\n      <aside class=\"chat-card\" id=\"chat-card\" aria-label=\"Sample bottleneck conversation with InboundOS\">\n        <div class=\"chat-head\">\n          <div class=\"chat-id\">\n            <span class=\"chat-avatar\" aria-hidden=\"true\">iO<\u002Fspan>\n            <div>\n              <div class=\"chat-name\">InboundOS Agent<\u002Fdiv>\n              <div class=\"chat-status\">Online<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"chat-step\" id=\"chat-step\">01 / 03<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"chat-body\">\n          <p class=\"chat-prompt\">What's your current bottleneck in content creation?<\u002Fp>\n          <div class=\"chat-bubble chat-user\" id=\"chat-user\"><span class=\"chat-user-text\"><\u002Fspan><\u002Fdiv>\n          <div class=\"chat-bubble chat-agent\" id=\"chat-agent\">\n            <span class=\"chat-typing\" id=\"chat-typing\" hidden=\"\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fspan>\n            <span class=\"chat-agent-text\" id=\"chat-agent-text\"><\u002Fspan>\n            <div class=\"chat-viz\" id=\"chat-viz\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Faside>\n    <\u002Fdiv>\n    <div class=\"proof-bar\">\n      <div class=\"proof-chip\"><strong>3.2M<\u002Fstrong><span>views from one installed content system<\u002Fspan><\u002Fdiv>\n      <div class=\"proof-chip\"><strong>597<\u002Fstrong><span>member content-led buyer community<\u002Fspan><\u002Fdiv>\n      <div class=\"proof-chip\"><strong>$20M+<\u002Fstrong><span>deal volume created from inbound attention<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n<!-- ══════════════ PROBLEM ══════════════ -->\n<section id=\"problem\" aria-labelledby=\"problem-heading\">\n  <div class=\"container\">\n    <span class=\"label\" aria-hidden=\"true\">The Problem<\u002Fspan>\n    <h2 id=\"problem-heading\" class=\"section-heading reveal\">You're good at what you do.<br>Content is eating your week anyway.<\u002Fh2>\n    <div class=\"pain-grid\" role=\"list\">\n      <div class=\"pain-item reveal\" role=\"listitem\"><span class=\"pain-num\" aria-hidden=\"true\">01<\u002Fspan><p>10–15 hours a week on content that barely turns into clients.<\u002Fp><\u002Fdiv>\n      <div class=\"pain-item reveal reveal-delay-1\" role=\"listitem\"><span class=\"pain-num\" aria-hidden=\"true\">02<\u002Fspan><p>The moment delivery gets busy, posting dies — and so do the leads.<\u002Fp><\u002Fdiv>\n      <div class=\"pain-item reveal reveal-delay-2\" role=\"listitem\"><span class=\"pain-num\" aria-hidden=\"true\">03<\u002Fspan><p>Nothing compounds. Every week feels like starting from scratch.<\u002Fp><\u002Fdiv>\n      <div class=\"pain-item reveal\" role=\"listitem\"><span class=\"pain-num\" aria-hidden=\"true\">04<\u002Fspan><p>Cold DMs feel gross. But consistent content feels impossible to sustain.<\u002Fp><\u002Fdiv>\n      <div class=\"pain-item reveal reveal-delay-1\" role=\"listitem\"><span class=\"pain-num\" aria-hidden=\"true\">05<\u002Fspan><p>You've tried editors, templates, gurus. Still no consistent inbound flow.<\u002Fp><\u002Fdiv>\n      <div class=\"pain-item reveal reveal-delay-2\" role=\"listitem\"><span class=\"pain-num\" aria-hidden=\"true\">06<\u002Fspan><p>You know content works. You just can't build the system while running a business.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"bridge reveal\">It's an <em>operating system gap<\u002Fem>. No capture layer, no batching workflow, no AI agents pulling from your data — just you, starting from scratch every week.<\u002Fp>\n    <div class=\"leak-row reveal reveal-delay-1\" aria-label=\"Content system leaks\">\n      <div class=\"leak-item\"><strong>10–15h<\u002Fstrong><span>lost each week to manual scripting, posting, and restarting.<\u002Fspan><\u002Fdiv>\n      <div class=\"leak-item\"><strong>0x<\u002Fstrong><span>compounding when every content push begins from scratch.<\u002Fspan><\u002Fdiv>\n      <div class=\"leak-item\"><strong>2%<\u002Fstrong><span>cold DM reply rates when inbound demand is left undeveloped.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n<!-- ══════════════ SHIFT ══════════════ -->\n<section id=\"shift\" aria-labelledby=\"shift-heading\">\n  <div class=\"container\">\n    <span class=\"label\" aria-hidden=\"true\">The Difference<\u002Fspan>\n    <h2 id=\"shift-heading\" class=\"section-heading reveal\">What changes when<br>the system is installed.<\u002Fh2>\n    <div class=\"shift-wrap reveal reveal-delay-1\">\n      <table class=\"shift-table\" role=\"table\" aria-label=\"Before and after comparison\">\n        <thead>\n          <tr>\n            <th class=\"col-before\" scope=\"col\">Without InboundOS<\u002Fth>\n            <th class=\"col-after\" scope=\"col\">With InboundOS<\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr><td>Filming whenever you feel like it<\u002Ftd><td>Custom AI workflows handle your batching rhythm. Film once. A month of content follows.<\u002Ftd><\u002Ftr>\n          <tr><td>Writing captions and scripts from scratch every time<\u002Ftd><td>AI agents trained on your voice, your company data, your frameworks. Type a prompt, get a script.<\u002Ftd><\u002Ftr>\n          <tr><td>Starting from zero every single week<\u002Ftd><td>Automated workflows pull from your company database and keep the system fed without you.<\u002Ftd><\u002Ftr>\n          <tr><td>Zero compounding. Resets every week.<\u002Ftd><td>Agents run. Workflows run. Audience builds. Leads arrive without the daily manual grind.<\u002Ftd><\u002Ftr>\n          <tr><td>Cold DM grind with 2% reply rates<\u002Ftd><td>Inbound DMs from people who already watched your content and want to work with you.<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══════════════ COMPARISON ══════════════ -->\n<section id=\"comparison\" aria-labelledby=\"comparison-heading\">\n  <div class=\"container\">\n    <span class=\"label\" aria-hidden=\"true\">The Economics<\u002Fspan>\n    <h2 id=\"comparison-heading\" class=\"section-heading reveal\">To build this in-house, you'd need a full content department.<\u002Fh2>\n    <p class=\"comparison-sub reveal reveal-delay-1\">Research, scripting, editing, posting, DM follow-up — that's usually 6 full-time roles. We build the AI agents and workflows that handle it without adding 6 people to your payroll.<\u002Fp>\n    <div class=\"team-stack\">\n      <div class=\"team-grid\" role=\"list\" aria-label=\"In-house content team salary stack\">\n        <div class=\"role-card reveal\" role=\"listitem\">\n          <div class=\"role-top\"><h3 class=\"role-name\" style=\"font-size: 22px\">Researcher<\u002Fh3><span class=\"role-cost\">$7.3K/mo<\u002Fspan><\u002Fdiv>\n          <p>Finds market angles, customer pain, competitor hooks, objections, and proof points before anything gets written.<\u002Fp>\n          <span class=\"role-tag\">Research<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"role-card reveal reveal-delay-1\" role=\"listitem\">\n          <div class=\"role-top\"><h3 class=\"role-name\" style=\"font-size: 22px\">Scriptwriter<\u002Fh3><span class=\"role-cost\">$7.3K/mo<\u002Fspan><\u002Fdiv>\n          <p>Turns research into hooks, short-form scripts, captions, story prompts, and offer-led content sequences.<\u002Fp>\n          <span class=\"role-tag\">Writing<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"role-card reveal reveal-delay-2\" role=\"li               <div class=\"c1-node\" data-lbl=\"W12\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"t-text\">\n          <div class=\"t-tag\"><span class=\"t-num\">01<\u002Fspan>STRATEGY<span class=\"t-week\">Weeks 1–2<\u002Fspan><\u002Fdiv>\n          <h3 class=\"t-title\">Positioning OS<\u002Fh3>\n          <p class=\"t-desc\">Your ICP, your company database, your voice — all mapped before we touch any tool. We build the strategic foundation the agents will run on. Everything that gets created is grounded in your actual business.<\u002Fp>\n          <ul class=\"t-checks\">\n            <li class=\"t-check-item\"><span class=\"t-ci\"><svg viewBox=\"0 0 10 10\" xmlns=\"http://www.w3.org/2000/svg\"><polyline points=\"1.5,5 4,7.5 8.5,2.5\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>ICP and company database mapped from your actual clients<\u002Fli>\n            <li class=\"t-check-item\"><span class=\"t-ci\"><svg viewBox=\"0 0 10 10\" xmlns=\"http://www.w3.org/2000/svg\"><polyline points=\"1.5,5 4,7.5 8.5,2.5\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>Content pillars built from your frameworks, not generic templates<\u002Fli>\n            <li class=\"t-check-item\"><span class=\"t-ci\"><svg viewBox=\"0 0 10 10\" xmlns=\"http://www.w3.org/2000/svg\"><polyline points=\"1.5,5 4,7.5 8.5,2.5\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>Agent architecture designed around how your business actually works<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ROW 2: AI AGENTS -->\n      <div class=\"t-row reveal\">\n        <div class=\"mc\" data-mc=\"\">\n          <div class=\"mc-chrome\">\n            <div class=\"mc-d mc-d1\"><\u002Fdiv><div class=\"mc-d mc-d2\"><\u002Fdiv><div class= k-item\"><span class=\"t-ci\"><svg viewBox=\"0 0 10 10\" xmlns=\"http://www.w3.org/2000/svg\"><polyline points=\"1.5,5 4,7.5 8.5,2.5\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>Scripts, hooks, and captions generated in seconds — not hours<\u002Fli>\n            <li class=\"t-check-item\"><span class=\"t-ci\"><svg viewBox=\"0 0 10 10\" xmlns=\"http://www.w3.org/2000/svg\"><polyline points=\"1.5,5 4,7.5 8.5,2.5\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>No coding. Fully handed over. You own everything we build.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ROW 3: CONTENT REVIEW -->\n      <div class=\"t-row reveal\">\n        <div class=\"mc\" data-mc=\"\">\n          <div class=\"mc-chrome\">\n            <div class=\"mc-d mc-d1\"><\u002Fdiv><div class=\"mc-d mc-d2\"><\u002Fdiv><div class=\"mc-d mc-d3\"><\u002Fdiv>\n            <span class=\"mc-ttl\">Review Queue<\u002Fspan>\n            <span class=\"mc-live\">3 / 10<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"mc-body\">\n            <div class=\"c3-hdr\">\n              <span class=\"c3-hlbl\">This Month<\u002Fspan>\n              <span class=\"c3-hval\">7 remaining<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"c3-items\">\n              <div class=\"c3-item\">\n                <span class=\"c3-in\">01<\u002Fspan>\n                <div class=\"c3-itxt\"><div class=\"c3-ititle\">Hook — Reel #23<\u002Fdiv><div class=\"c3-isub\">Script · 45 sec<\u002Fdiv><\u002Fdiv>\n                <span class=\"c3-badge c3-done\">DONE<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"c3-item c3-cur\">\n                <span class=\"c3-in\">02<\u002Fspan>\n                <div class=\"c3-itxt\"><div class=\"c3-ititle\">Script — Reel #24<\u002Fdiv><div class=\"c3-isub\">Full script · 60 sec<\u002Fdiv><\u002Fdiv>\n                <span class=\"c3-badge c3-active\">REVIEWING<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"c3-item\">\n                <span class=\"c3-in\">03<\u002Fspan>\n                <div class=\"c3-itxt\"><div class=\"c3-ititle\">Caption — Story<\u002Fdiv><div class=\"c3-isub\">Caption + CTA<\u002Fdiv><\u002Fdiv>\n                <span class=\"c3-badge c3-queue\">QUEUE<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"c3-fb\"><strong>Feedback #24:<\u002Fstrong> Open stronger — lead with the specific pain. Move CTA to second line.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"t-text\">\n          <div class=\"t-tag\"><span class=\"t-num\">03<\u002Fspan>REVIEW SYSTEM<span class=\"t-week\">Weeks 3–12<\u002Fspan><\u002Fdiv>\n          <h3 class=\"t-title\">Content Review OS<\u002Fh3>\n          <p class=\"t-desc\">Up to 10 pieces reviewed per month. Scripts, hooks, and edits checked before they go live. You stop posting and hoping — we make sure it works first.<\u002Fp>\n          <ul class=\"t-checks\">\n            <li class=\"t-check-item\"><span class=\"t-ci\"><svg viewBox=\"0 0 10 10\" xmlns=\"http://www.w3.org/2000/svg\"><polyline points=\"1.5,5 4,7.5 8.5,2.5\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>Scripts reviewed before you film<\u002Fli>\n            <li class=\"t-check-item\"><span class=\"t-ci\"><svg viewBox=\"0 0 10 10\" xmlns=\"http://www.w3.org/2000/svg\"><polyline points=\"1.5,5 4,7.5 8.5,2.5\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>Hook strength scored + rewritten if needed<\u002Fli>\n            <li class=\"t-check-item\"><span class=\"t-ci\"><svg viewBox=\"0 0 10 10\" xmlns=\"http://www.w3.org/2000/svg\"><polyline points=\"1.5,5 4,7.5 8.5,2.5\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>Async feedback within 24 hours<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ROW 4: LEAD CONVERSION -->\n      <div class=\"t-row reveal\">\n        <div class=\"mc\" data-mc=\"\">\n          <div class=\"mc-chrome\">\n            <div class=\"mc-d mc-d1\"><\u002Fdiv><div class=\"mc-d mc-d2\"><\u002Fdiv><div class=\"mc-d mc-d3\"><\u002Fdiv>\n            <span class=\"mc-ttl\">Lead Pipeline<\u002Fspan>\n            <span class=\"mc-live\">LIVE<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"mc-body\">\n            <div class=\"c4-funnel\">\n              <div class=\"c4-stage\"><div class=\"c4-sn\">12.4<em>K<\u002Fem><\u002Fdiv><div class=\"c4-sl\">Views<\u002Fdiv><\u002Fdiv>\n              <div class=\"c4-stage\"><div class=\"c4-sn\">47<\u002Fdiv><div class=\"c4-sl\">DMs<\u002Fdiv><\u002Fdiv>\n              <div class=\"c4-stage\"><div class=\"c4-sn\">8<\u002Fdiv><div class=\"c4-sl\">Calls<\u002Fdiv><\u002Fdiv>\n              <div class=\"c4-stage\"><div class=\"c4-sn\" style=\"color:var(--ice-blue)\">2<\u002Fdiv><div class=\"c4-sl\">Clients<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"c4-flow\">\n              <div class=\"c4-track\"><\u002Fdiv>\n              <div class=\"c4-dot\"><\u002Fdiv>\n              <div class=\"c4-dot\"><\u002Fdiv>\n              <div class=\"c4-dot\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"c4-dms\">\n              <div class=\"c4-dm\"><div class=\"c4-dm-dot\"><\u002Fdiv><span>Hey, saw your reel about content systems — this is exactly my situation...<\u002Fspan><\u002Fdiv>\n              <div class=\"c4-dm\"><div class=\"c4-dm-dot\"><\u002Fdiv><span>I've been burning weekends on content. Would love to know more.<\u002Fspan><\u002Fdiv>\n              <div class=\"c4-dm\"><div class=\"c4-dm-dot\"><\u002Fdiv><span>DM sequence sent · follow-up 48h ✓<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"t-text\">\n          <div class=\"t-tag\"><span class=\"t-num\">04<\u002Fspan>CONVERSION<span class=\"t-week\">Weeks 6–12<\u002Fspan><\u002Fdiv>\n          <h3 class=\"t-title\">Lead Conversion OS<\u002Fh3>\n          <p class=\"t-desc\">DM sequences, story sequences, and CTA strategy built around your offer. Views turn into conversations. Conversations turn into calls. Calls turn into clients.<\u002Fp>\n          <ul class=\"t-checks\">\n            <li class=\"t-check-item\"><span class=\"t-ci\"><svg viewBox=\"0 0 10 10\" xmlns=\"http://www.w3.org/2000/svg\"><polyline points=\"1.5,5 4,7.5 8.5,2.5\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>DM sequence built and tested<\u002Fli>\n            <li class=\"t-check-item\"><span class=\"t-ci\"><svg viewBox=\"0 0 10 10\" xmlns=\"http://www.w3.org/2000/svg\"><polyline points=\"1.5,5 4,7.5 8.5,2.5\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>Story-to-call flow installed<\u002Fli>\n            <li class=\"t-check-item\"><span class=\"t-ci\"><svg viewBox=\"0 0 10 10\" xmlns=\"http://www.w3.org/2000/svg\"><polyline points=\"1.5,5 4,7.5 8.5,2.5\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>CTA rotation schedule tested and live<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n<!-- ══════════════ PROCESS ══════════════ -->\n<section id=\"process\" aria-labelledby=\"process-heading\">\n  <div class=\"container\">\n    <span class=\"label\" aria-hidden=\"true\">How We Work<\u002Fspan>\n    <h2 id=\"process-heading\" class=\"section-heading reveal\">Here's exactly how we build it.<\u002Fh2>\n    <p class=\"process-sub reveal reveal-delay-1\">We map your business first. Then we build the agents and workflows around it. You own everything when we're done.<\u002Fp>\n    <div class=\"phases\" role=\"list\">\n      <div class=\"phase reveal\" role=\"listitem\"><span class=\"phase-tag\" aria-hidden=\"true\">Step 1<\u002Fspan><span class=\"phase-week\">Discovery Call<\u002Fspan><h3>We audit your business<\u002Fh3><p>30 minutes. We map your ICP, your offer, how you currently create content, and where leads are leaking. You walk away with a clear picture of what gets built — before we touch anything.<\u002Fp><\u002Fdiv>\n      <div class=\"phase reveal reveal-delay-1\" role=\"listitem\"><span class=\"phase-tag\" aria-hidden=\"true\">Step 2<\u002Fspan><span class=\"phase-week\">Database Mapping<\u002Fspan><h3>We extract your brand<\u002Fh3><p>Your calls, your frameworks, your clients, your voice. We build the knowledge base the agents run on. Garbage in, garbage out — so we start here. This is what makes the agents actually sound like you.<\u002Fp><\u002Fdiv>\n      <div class=\"phase reveal reveal-delay-2\" role=\"listitem\"><span class=\"phase-tag\" aria-hidden=\"true\">Step 3<\u002Fspan><span class=\"phase-week\">Agent Build + Workflow Setup<\u002Fspan><h3>We build and wire the system<\u002Fh3><p>Custom AI agents. Automated workflows. Review loop. Each piece is designed around how your business actually runs — then handed to you fully operational.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"includes-bar reveal\">\n      <span class=\"inc-label\">Included<\u002Fspan>\n      <div class=\"inc-items\">\n        <span class=\"inc-item\"><span class=\"inc-dot\" aria-hidden=\"true\"><\u002Fspan>4 weekly 1:1 calls/month<\u002Fspan>\n        <span class=\"inc-item\"><span class=\"inc-dot\" aria-hidden=\"true\"><\u002Fspan>Unlimited async 24/7<\u002Fspan>\n        <span class=\"inc-item\"><span class=\"inc-dot\" aria-hidden=\"true\"><\u002Fspan>10 piece reviews/month<\u002Fspan>\n        <span class=\"inc-item\"><span class=\"inc-dot\" aria-hidden=\"true\"><\u002Fspan>Everything done-with-you<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n<!-- ══════════════ PROOF ══════════════ -->\n<section id=\"proof\" aria-labelledby=\"proof-heading\">\n  <div class=\"container\">\n    <span class=\"label\" aria-hidden=\"true\">Results<\u002Fspan>\n    <h2 id=\"proof-heading\" class=\"section-heading reveal\">What happens when<br>the system is running.<\u002Fh2>\n    <div class=\"receipt-band reveal reveal-delay-1\" role=\"list\" aria-label=\"Result metrics\">\n      <div class=\"receipt\" role=\"listitem\"><strong>3.2M<\u002Fstrong><span>views from a single content asset after the system was installed.<\u002Fspan><\u002Fdiv>\n      <div class=\"receipt\" role=\"listitem\"><strong>10,000+<\u002Fstrong><span>patients booked for a telehealth dermatology practice — inbound only, zero ads.<\u002Fspan><\u002Fdiv>\n      <div class=\"receipt\" role=\"listitem\"><strong>597<\u002Fstrong><span>buyers pulled into a content-led WhatsApp community.<\u002Fspan><\u002Fdiv>\n      <div class=\"receipt\" role=\"listitem\"><strong>$20M+<\u002Fstrong><span>deal volume connected to content, community, and follow-up.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"proof-grid\" role=\"list\">\n      <div class=\"proof-card reveal\" role=\"listitem\">\n        <div class=\"proof-stat\" data-count=\"3.2\" data-suffix=\"M\">3.2<em style=\"color: rgb(255, 255, 255)\">M<\u002Fem><\u002Fdiv>\n        <p class=\"proof-stat-label\">Views — and hundreds of inbound patient inquiries that followed<\u002Fp>\n        <p class=\"proof-body\">Dr. Meenal runs a telehealth dermatology practice — she consults patients online on their skin. She started with 7 TikTok followers, 38 on Instagram, and no content system. We built custom AI agents and workflows around her practice. A single video hit 3.2M views. The inbound patient inquiries that followed helped her build a patient base of 10,000+. Zero ads. Zero cold outreach.<\u002Fp>\n        <p class=\"proof-client\"><strong>Dr. Meenal Kheterpal, MD, FAAD<\u002Fstrong> — Telehealth Dermatologist &amp; Obesity Medicine Specialist, Univ. of Michigan<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"proof-card reveal reveal-delay-1\" role=\"listitem\">\n        <div class=\"proof-stat\" aria-label=\"20 million dollars plus\">$20<em style=\"color: rgb(255, 255, 255)\">M+<\u002Fem><\u002Fdiv>\n        <p class=\"proof-stat-label\">Off-market deal volume closed from a 597-member content community<\u002Fp>\n        <p class=\"proof-body\">Christian had 247 Instagram followers and no community. We built a content system from scratch. Within 90 days: a 597-member WhatsApp group filled entirely from content. That community closes 1–2 off-market properties every week — 39+ confirmed wire transfers, deals sold sight unseen within 24 hours of posting. Total volume: $20M+ in Florida real estate. Zero cold outreach.<\u002Fp>\n        <p class=\"proof-client\"><strong>Christian Pombo<\u002Fstrong> — Founder, Creative Deals<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n<!-- ══════════════ ICP ══════════════ -->\n<section id=\"icp\" aria-labelledby=\"icp-heading\">\n  <div class=\"container\">\n    <div class=\"icp-layout\">\n      <div class=\"reveal\">\n        <span class=\"label\" aria-hidden=\"true\">Who This Is For<\u002Fspan>\n        <h2 id=\"icp-heading\" class=\"section-heading\">Built for one type of person.<\u002Fh2>\n        <p class=\"icp-desc\">We work with service providers who already have clients and want a real system — custom agents, automated workflows, the whole thing. No general advice. No templates.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"icp-lists reveal reveal-delay-1\">\n        <ul class=\"check-list\" aria-label=\"This is for you if\">\n          <li class=\"check-item\"><span class=\"ci-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 10 10\" xmlns=\"http://www.w3.org/2000/svg\"><polyline points=\"1.5,5 4,7.5 8.5,2.5\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg><\u002Fspan><span>Coach, consultant, or agency owner<\u002Fspan><\u002Fli>\n          <li class=\"check-item\"><span class=\"ci-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 10 10\" xmlns=\"http://www.w3.org/2000/svg\"><polyline points=\"1.5,5 4,7.5 8.5,2.5\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg><\u002Fspan><span>Doing $8K–$15K/month (or building toward it)<\u002Fspan><\u002Fli>\n          <li class=\"check-item\"><span class=\"ci-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 10 10\" xmlns=\"http://www.w3.org/2000/svg\"><polyline points=\"1.5,5 4,7.5 8.5,2.5\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg><\u002Fspan><span>Spending 10+ hours/week on manual content with nothing to show<\u002Fspan><\u002Fli>\n          <li class=\"check-item\"><span class=\"ci-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 10 10\" xmlns=\"http://www.w3.org/2000/svg\"><polyline points=\"1.5,5 4,7.5 8.5,2.5\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg><\u002Fspan><span>Want inbound leads — not a cold DM grind<\u002Fspan><\u002Fli>\n          <li class=\"check-item\"><span class=\"ci-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 10 10\" xmlns=\"http://www.w3.org/2000/svg\"><polyline points=\"1.5,5 4,7.5 8.5,2.5\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg><\u002Fspan><span>Ready to invest in a system, not another course<\u002Fspan><\u002Fli>\n          <li class=\"check-item\"><span class=\"ci-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 10 10\" xmlns=\"http://www.w3.org/2000/svg\"><polyline points=\"1.5,5 4,7.5 8.5,2.5\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg><\u002F on-heading\">The Content Flywheel Installation<\u002Fh2>\n        <ul class=\"deliverables\" aria-label=\"What's included\">\n          <li class=\"del\"><span class=\"del-dot\" aria-hidden=\"true\"><\u002Fspan><span>90-day done-with-you build program<\u002Fspan><\u002Fli>\n          <li class=\"del\"><span class=\"del-dot\" aria-hidden=\"true\"><\u002Fspan><span>4 weekly 1:1 strategy calls per month<\u002Fspan><\u002Fli>\n          <li class=\"del\"><span class=\"del-dot\" aria-hidden=\"true\"><\u002Fspan><span>Company database mapped from your clients, calls, and frameworks<\u002Fspan><\u002Fli>\n          <li class=\"del\"><span class=\"del-dot\" aria-hidden=\"true\"><\u002Fspan><span>Custom AI agents built and trained on your data — scripts, hooks, captions in your voice<\u002Fspan><\u002Fli>\n          <li class=\"del\"><span class=\"del-dot\" aria-hidden=\"true\"><\u002Fspan><span>Automated content workflows wired to your batching rhythm<\u002Fspan><\u002Fli>\n          <li class=\"del\"><span class=\"del-dot\" aria-hidden=\"true\"><\u002Fspan><span>Script and hook reviews — up to 10 pieces per month<\u002Fspan><\u002Fli>\n          <li class=\"del\"><span class=\"del-dot\" aria-hidden=\"true\"><\u002Fspan><span>Unlimited async support Monday through Friday<\u002Fspan><\u002Fli>\n          <li class=\"del\"><span class=\"del-dot\" aria-hidden=\"true\"><\u002Fspan><span>DM conversion flow and story sequence built and tested<\u002Fspan><\u002Fli>\n          <li class=\"del\"><span class=\"del-dot\" aria-hidden=\"true\"><\u002Fspan><span>Every agent and workflow lives in your business — you own all of it<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"offer-box reveal reveal-delay-1\">\n        <p class=\"offer-box-label\">90-Day Done-With-You Installation<\u002Fp>\n        <p class=\"fit-line\">Built for coaches, consultants, and agency owners doing $8K–$30K/mo who want inbound leads — and a real AI system to generate them.<\u002 d conversion layer. You show up on camera. We build the machine around you.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"faq-item\" tabindex=\"0\" aria-expanded=\"false\" role=\"listitem\">\n          <p class=\"faq-q\">How much time does this take per week? <svg class=\"faq-icon\" viewBox=\"0 0 16 16\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\"><line x1=\"8\" y1=\"2\" x2=\"8\" y2=\"14\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fline><line x1=\"2\" y1=\"8\" x2=\"14\" y2=\"8\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fline><\u002Fsvg><\u002Fp>\n          <p class=\"faq-a\">One 60-minute 1:1 call per week, plus one monthly filming session you batch in advance. Everything else is async. You're not adding a second job — you're replacing the chaos with structure.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"faq-item\" tabindex=\"0\" aria-expanded=\"false\" role=\"listitem\">\n          <p class=\"faq-q\">I'm not technical. Will I be able to use the AI agents? <svg class=\"faq-icon\" viewBox=\"0 0 16 16\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\"><line x1=\"8\" y1=\"2\" x2=\"8\" y2=\"14\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fline><line x1=\"2\" y1=\"8\" x2=\"14\" y2=\"8\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fline><\u002Fsvg><\u002Fp>\n          <p class=\"faq-a\">They're built specifically for you. Type a one-line prompt, get a full script in your voice. No coding. No setup. No learning curve. We build it and hand it over.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"faq-item\" tabindex=\"0\" aria-expanded=\"false\" role=\"listitem\">\n          <p class=\"faq-q\">We already tried ChatGPT. Why would this be different? <svg class=\"faq-icon\" viewBox=\"0 0 16 16\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\"><line x1=\"8\" y1=\"2\" x2=\"8\" y2=\"14\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fline><line x1=\"2\" y1=\"8\" x2=\"14\" y2=\"8\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fline><\u002Fsvg><\u002Fp>\n          <p class=\"faq-a\">ChatGPT is a blank tool. We build the entire operating layer around it — your company database, your voice data, your custom agents, your batching workflow, your review process, your conversion sequences. The power is in what surrounds the AI, not the AI itself.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"faq-item\" tabindex=\"0\" aria-expanded=\"false\" role=\"listitem\">\n          <p class=\"faq-q\">Will the content actually sound like me? <svg class=\"faq-icon\" viewBox=\"0 0 16 16\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\"><line x1=\"8\" y1=\"2\" x2=\"8\" y2=\"14\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fline><line x1=\"2\" y1=\"8\" x2=\"14\" y2=\"8\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fline><\u002Fsvg><\u002Fp>\n          <p class=\"faq-a\">Yes. We train the system on your calls, posts, frameworks, offers, objections, and stories. Then we review scripts and hooks before they go live so the output sounds like you on your sharpest day.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"faq-item\" tabindex=\"0\" aria-expanded=\"false\" role=\"listitem\">\n          <p class=\"faq-q\">What if I already have an editor or VA? <svg class=\"faq-icon\" viewBox=\"0 0 16 16\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\"><line x1=\"8\" y1=\"2\" x2=\"8\" y2=\"14\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fline><line x1=\"2\" y1=\"8\" x2=\"14\" y2=\"8\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fline><\u002Fsvg><\u002Fp>\n          <p class=\"faq-a\">Even better. We give them a clearer machine to operate: content pillars, scripts, batching rhythm, review standards, and CTA flow. They stop guessing and start executing against a system.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"faq-item\" tabindex=\"0\" aria-expanded=\"false\" role=\"listitem\">\n          <p class=\"faq-q\">D one.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n<!-- ══════════════ FINAL CTA ══════════════ -->\n<section id=\"final-cta\" aria-labelledby=\"final-cta-heading\">\n  <div class=\"container\" style=\"font-family: &quot;Neue Haas Grotesk Display&quot;\">\n    <span class=\"label reveal\" aria-hidden=\"true\">Ready?<\u002Fspan>\n    <h2 id=\"final-cta-heading\" class=\"section-heading reveal\">90 days from now, you'll have a flywheel running,&nbsp;or you'll still be doing it manually.<\u002Fh2>\n    <p class=\"cta-sub reveal reveal-delay-1\" style=\"font-family: &quot;DM Sans&quot;\">30-minute call. We figure out what gets built for your specific business. If it's a fit, we start. If it's not, we'll tell you straight.<\u002Fp>\n    <div class=\"reveal reveal-delay-2\">\n      <a href=\"https://calendly.com/inboundos/discovery-call\" target=\"_blank\" rel=\"noopener noreferrer\" class=\"btn btn-primary btn-lg\" style=\"font-family: &quot;DM Sans&quot;\"><span style=\"color: rgb(255, 255, 255);\"><span><span style=\"color: rgb(13, 17, 23);\">Get My Content Flywheel Plan →<\u002Fspan><\u002Fspan><\u002Fspan><\u002Fa>\n      <p class=\"scarcity\" style=\"font-family: &quot;DM Sans&quot;\">Taking a limited number of clients this quarter.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fmain>\n\n<!-- ─── FOOTER ─── -->\n<footer role=\"contentinfo\">\n  <a href=\"#\" class=\"logo\" aria-label=\"InboundOS home\"><span class=\"l1\">Inbound<\u002Fspan><span class=\"l2\">OS<\u002Fspan><\u002Fa>\n  <p class=\"footer-copy\">© 2026 InboundOS. All rights reserved.<\u002Fp>\n<\u002Ffooter>\n\n\n<script>\n/* ══════ SKIP ON REDUCED MOTION ══════ */\nconst reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n/* ══════ NAV SCROLL STATE ══════ */\nconst nav = document.getElementById('main-nav');\nconst floatingCta = document.getElementById('floating-cta');\nconst heroEl = document.getElementById('hero');\nwindow.addEventListener('scroll', () => {\n  nav.classList.toggle('scrolled', window.scrollY > 40);\n  const heroGone = heroEl.getBoundingClientRect().bottom < 0;\n  floatingCta.classList.toggle('visible', heroGone);\n  floatingCta.setAttribute('aria-hidden', String(!heroGone));\n}, { passive: true });\n\n/* ══════ SCROLL REVEAL ══════ */\nconst revealObs = new IntersectionObserver(entries => {\n  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); revealObs.unobserve(e.target); } });\n}, { threshold: 0.1, rootMargin: '0px 0px -36px 0px' });\ndocument.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));\n\n/* ══════ COUNT-UP ANIMATION ══════ */\nif (!reducedMotion) {\n  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }\n\n  function countUp(el) {\n    const raw    = parseFloat(el.dataset.count);\n    const suffix = el.dataset.suffix || '';\n    const isDecimal = String(raw).includes('.');\n    const emEl   = el.querySelector('em');\n    const emHTML = emEl ? emEl.outerHTML : '';\n    const dur    = 1600;\n    const start  = performance.now();\n\n    function frame(now) {\n      const p = Math.min((now - start) / dur, 1);\n      const v = raw * easeOut(p);\n      const display = isDecimal ? v.toFixed(1) : Math.floor(v);\n      el.innerHTML = emEl ? (display + emHTML) : (display + suffix);\n      if (p < 1) requestAnimationFrame(frame);\n    }\n    requestAnimationFrame(frame);\n  }\n\n  const countObs = new IntersectionObserver(entries => {\n    entries.forEach(e => {\n      if (e.isIntersecting && e.target.dataset.count) {\n        countUp(e.target);\n        countObs.unobserve(e.target);\n      }\n    });\n  }, { threshold: 0.6 });\n  document.querySelectorAll('[data-count]').forEach(el => countObs.observe(el));\n}\n\n/* ══════ MOCK CARD ANIMATIONS ══════ */\nconst mcObs = new IntersectionObserver(entries => {\n  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('anim'); mcObs.unobserve(e.target); } });\n}, { threshold: 0.3 });\ndocument.querySelectorAll('[data-mc]').forEach(el => mcObs.observe(el));\n\n/* ══════ CHAT SCENE LOOP ══════ */\n(function () {\n  const card = document.getElementById('chat-card');\n  if (!card) return;\n\n  const userBubble = document.getElementById('chat-user');\n  const userText   = userBubble.querySelector('.chat-user-text');\n  const agentBub   = document.getElementById('chat-agent');\n  const typing     = document.getElementById('chat-typing');\n  const agentText  = document.getElementById('chat-agent-text');\n  const viz        = document.getElementById('chat-viz');\n  const stepEl     = document.getElementById('chat-step');\n\n  const cursorHTML = '<span class=\"chat-cursor\" aria-hidden=\"true\"><\u002Fspan>';\n\n  const scenes = [\n    {\n      user: \"I waste 12 hours a week writing scripts from scratch.\",\n      agent: \"Building a custom script agent trained on your voice data. Per-script time drops from 90 minutes to under 3.\",\n      viz: `\n        <div class=\"viz-label\">Time per script<\u002Fdiv>\n        <div class=\"viz-time\">\n          <div class=\"vt-row vt-before\"><span class=\"vt-lbl\">Before<\u002Fspan><span class=\"vt-bar\"><span class=\"vt-fill\" style=\"--w:100%\"><\u002Fspan><\u002Fspan><span class=\"vt-val\">90 min<\u002Fspan><\u002Fdiv>\n          <div class=\"vt-row vt-after\"><span class=\"vt-lbl\">After<\u002Fspan><span class=\"vt-bar\"><span class=\"vt-fill\" style=\"--w:6%\"><\u002Fspan><\u002Fspan><span class=\"vt-val\">3 min<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>`\n    },\n    {\n      user: \"When I delegate, the content stops sounding like me.\",\n      agent: \"Training agents on your call transcripts, posts, and frameworks. Voice match locked at 94% before anything ships.\",\n      viz: `\n        <div class=\"viz-label\">Voice match · trained on your data<\u002Fdiv>\n        <div class=\"viz-voice\">\n          <div class=\"vv-track\"><span class=\"vv-fill\"><\u002Fspan><\u002Fdiv>\n          <div class=\"vv-foot\"><span>0%<\u002Fspan><strong>94%<\u002Fstrong><\u002Fdiv>\n        <\u002Fdiv>`\n    },\n    {\n      user: \"I'm getting views but no DMs, no calls, no clients.\",\n      agent: \"Installing the DM sequence and story-to-call flow. Views start converting through the funnel within weeks.\",\n      viz: `\n        <div class=\"viz-label\">Last 30 days · conversion path<\u002Fdiv>\n        <div class=\"viz-funnel\">\n          <div class=\"vf-stage\"><div class=\"vf-n\">12.4K<\u002Fdiv><div class=\"vf-l\">Views<\u002Fdiv><\u002Fdiv>\n          <div class=\"vf-stage\"><div class=\"vf-n\">47<\u002Fdiv><div class=\"vf-l\">DMs<\u002Fdiv><\u002Fdiv>\n          <div class=\"vf-stage\"><div class=\"vf-n\">8<\u002Fdiv><div class=\"vf-l\">Calls<\u002Fdiv><\u002Fdiv>\n          <div class=\"vf-stage\"><div class=\"vf-n\">2<\u002Fdiv><div class=\"vf-l\">Clients<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>`\n    }\n  ];\n\n  const sleep = ms => new Promise(r => setTimeout(r, ms));\n  let running = true;\n  let typeToken = 0;\n\n  async function typeInto(el, text, perChar) {\n    const token = ++typeToken;\n    el.textContent = '';\n    el.insertAdjacentHTML('beforeend', cursorHTML);\n    for (let i = 0; i < text.length; i++) {\n      if (token !== typeToken || !running) return;\n      const cursor = el.querySelector('.chat-cursor');\n      cursor.insertAdjacentText('beforebegin', text[i]);\n      await sleep(perChar);\n    }\n    // remove cursor at end\n    const cursor = el.querySelector('.chat-cursor');\n    if (cursor) cursor.remove();\n  }\n\n  function reset() {\n    userBubble.classList.remove('is-in', 'is-out');\n    agentBub.classList.remove('is-in', 'is-out');\n    viz.classList.remove('is-in');\n    viz.innerHTML = '';\n    userText.textContent = '';\n    agentText.textContent = '';\n    typing.hidden = true;\n  }\n\n  async function playScene(i) {\n    if (!running) return;\n    const s = scenes[i];\n    stepEl.textContent = String(i + 1).padStart(2, '0') + ' / ' + String(scenes.length).padStart(2, '0');\n\n    reset();\n    await sleep(150);\n\n    // 1. user bubble appears + types (≈1.6s)\n    userBubble.classList.add('is-in');\n    await sleep(200);\n    await typeInto(userText, s.user, 22);\n    if (!running) return;\n    await sleep(450);\n\n    // 2. agent typing dots (≈1.0s)\n    agentBub.classList.add('is-in');\n    typing.hidden = false;\n    await sleep(950);\n    typing.hidden = true;\n\n    // 3. agent reply types (≈2.2s)\n    await typeInto(agentText, s.agent, 18);\n    if (!running) return;\n\n    // 4. viz drops in (≈0.6s build)\n    viz.innerHTML = s.viz;\n    await sleep(30);\n    viz.classList.add('is-in');\n    // trigger inner fills\n    requestAnimationFrame(() => {\n      viz.querySelectorAll('.vt-fill, .vv-fill').forEach(el => el.classList.add('is-in'));\n    });\n\n    // 5. hold for read time. Total scene ~10s; consumed ~4.6s above → hold ~4.6s, fade .8s\n    await sleep(4600);\n    if (!running) return;\n\n    // 6. fade out\n    userBubble.classList.add('is-out');\n    agentBub.classList.add('is-out');\n    viz.classList.remove('is-in');\n    await sleep(700);\n  }\n\n  async function loop() {\n    let i = 0;\n    while (running) {\n      await playScene(i);\n      i = (i + 1) % scenes.length;\n    }\n  }\n\n  // only run when the card is on screen, pause when off\n  const io = new IntersectionObserver(entries => {\n    entries.forEach(e => {\n      if (e.isIntersecting && !card.dataset.started) {\n        card.dataset.started = '1';\n        loop();\n      }\n    });\n  }, { threshold: 0.25 });\n  io.observe(card);\n\n  document.addEventListener('visibilitychange', () => {\n    running = !document.hidden;\n    if (running && card.dataset.started) {\n      // restart loop if it was paused\n      // (existing loop will exit when running=false; restart fresh)\n      card.dataset.started = '';\n      io.unobserve(card);\n      io.observe(card);\n    }\n  });\n})();\n\n/* ══════ FAQ ACCORDION ══════ */\ndocument.querySelectorAll('.faq-item').forEach(item => {\n  function toggle() {\n    const wasOpen = item.classList.contains('open');\n    document.querySelectorAll('.faq-item').forEach(i => { i.classList.remove('open'); i.setAttribute('aria-expanded','false'); });\n    if (!wasOpen) { item.classList.add('open'); item.setAttribute('aria-expanded','true'); }\n  }\n  item.addEventListener('click', toggle);\n  item.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); } });\n});\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
