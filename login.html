<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InboundOS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#0D1117;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;padding:16px;}
.card{width:100%;max-width:320px;border:1px solid rgba(255,255,255,0.07);background:rgba(28,44,59,0.4);border-radius:16px;overflow:hidden;}
.card-top{height:1px;width:100%;background:#4FC3F7;opacity:0.5;}
.card-header{padding:32px 32px 24px;border-bottom:1px solid rgba(255,255,255,0.06);}
.logo{font-size:24px;font-weight:900;letter-spacing:-0.02em;color:#fff;line-height:1;}
.logo span{color:#4FC3F7;}
.subtitle{font-size:10px;color:#8899A6;text-transform:uppercase;letter-spacing:0.15em;margin-top:8px;}
.card-body{padding:24px 32px;}
.field-label{font-size:10px;color:#8899A6;text-transform:uppercase;letter-spacing:0.15em;margin-bottom:8px;}
.field{margin-bottom:12px;}
.input-wrap{position:relative;}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#8899A6;padding:0;width:auto;margin:0;filter:none;display:flex;align-items:center;}
.eye-btn:hover{color:#fff;filter:none;}
input{width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 44px 12px 16px;font-size:14px;color:#fff;outline:none;transition:border-color 0.15s;font-family:'DM Sans',sans-serif;}
input::placeholder{color:rgba(255,255,255,0.2);}
input:focus{border-color:rgba(79,195,247,0.4);}
.error{font-size:11px;color:#f87171;margin-bottom:10px;display:none;}
button{width:100%;padding:12px;background:#4FC3F7;color:#0D1117;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;border:none;border-radius:12px;cursor:pointer;margin-top:4px;transition:filter 0.15s;font-family:'DM Sans',sans-serif;}
button:hover{filter:brightness(1.1);}
button:disabled{opacity:0.4;cursor:not-allowed;}
</style>
</head>
<body>
<div class="card">
  <div class="card-top"></div>
  <div class="card-header">
    <div class="logo">Inbound<span>OS</span></div>
    <div class="subtitle">Sign in to continue</div>
  </div>
  <div class="card-body">
    <div class="field">
      <div class="field-label">Username</div>
      <input type="text" id="username" placeholder="your-username" autofocus autocapitalize="none" autocorrect="off">
    </div>
    <div class="field">
      <div class="field-label">Password</div>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Enter password">
        <button type="button" class="eye-btn" onclick="togglePw()" tabindex="-1" id="eyebtn">
          <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>
    <div class="error" id="error">Incorrect password</div>
    <button id="btn" onclick="login()">Sign In</button>
  </div>
</div>
<script>
function getSession() {
  try { return JSON.parse(localStorage.getItem('sb_session') || 'null'); } catch { return null; }
}
const _s = getSession();
if (_s && _s.access_token && _s.client_slug) {
  const exp = _s.expires_at ? _s.expires_at * 1000 : 0;
  if (!exp || exp > Date.now()) {
    window.location.href = '/' + _s.client_slug + '/dashboard';
  }
}
document.getElementById('username').addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('password').focus(); });
document.getElementById('password').addEventListener('keydown', function(e) { if (e.key === 'Enter') login(); });
function togglePw() {
  const inp = document.getElementById('password');
  const icon = document.getElementById('eye-icon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  } else {
    inp.type = 'password';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  }
}
const EDGE_URL = 'https://cscfbuhwlfhblxprkwnh.supabase.co/functions/v1/login';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNzY2ZidWh3bGZoYmx4cHJrd25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NjMyMjUsImV4cCI6MjA5NTAzOTIyNX0.TNIW7H0iR7WxtPJSJi9LPBmqIiQu8w1xJ2MY4eDYVsA';

async function login() {
  const un = document.getElementById('username').value.trim().toLowerCase();
  const pw = document.getElementById('password').value;
  const err = document.getElementById('error');
  const btn = document.getElementById('btn');

  err.style.display = 'none';
  btn.textContent = 'Signing in...';
  btn.disabled = true;

  try {
    const res = await fetch(EDGE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + ANON_KEY },
      body: JSON.stringify({ username: un, password: pw }),
    });
    const data = await res.json();

    if (!res.ok) {
      err.style.display = 'block';
      err.textContent = data.error || 'Login failed';
      btn.textContent = 'Sign In';
      btn.disabled = false;
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
      return;
    }

    localStorage.setItem('sb_session', JSON.stringify({
      access_token: data.access_token,
      refresh_token: data.refresh_token,
      expires_at: data.expires_at,
      client_id: data.client_id,
      client_slug: data.client_slug,
    }));

    const params = new URLSearchParams(window.location.search);
    const from = params.get('from');
    window.location.href = from || '/' + data.client_slug + '/dashboard';
  } catch (e) {
    err.style.display = 'block';
    err.textContent = 'Network error. Try again.';
    btn.textContent = 'Sign In';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
