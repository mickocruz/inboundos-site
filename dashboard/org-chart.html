<style>
@font-face{font-family:'NHGrotesk';src:url('/dashboard/fonts/NHGrotesk-Black.otf') format('opentype');font-weight:900;}
:root{
  --bg:#0D1117;--surface:rgba(255,255,255,0.015);--card:rgba(255,255,255,0.02);--card-hover:rgba(255,255,255,0.035);
  --border:rgba(255,255,255,0.07);
  --accent:#4FC3F7;
  --text:#ffffff;--text-muted:rgba(255,255,255,0.3);--text-dim:rgba(255,255,255,0.22);
  --sidebar-w:180px;
  --font-head:'NHGrotesk','Arial Black',Arial,sans-serif;
  --font-data:'DM Sans',sans-serif;--font-body:'Outfit',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 40% at 50% -5%,rgba(79,195,247,0.06) 0%,transparent 70%);pointer-events:none;z-index:0;}
.layout{display:flex;height:100vh;position:relative;z-index:1;}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:rgba(7,11,18,0.97);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0 0 16px;backdrop-filter:blur(24px);z-index:10;overflow-y:auto;scrollbar-width:none;}
.sidebar::-webkit-scrollbar{display:none;}
.sidebar-logo-wrap{padding:18px 16px 14px;border-bottom:1px solid var(--border);margin-bottom:8px;cursor:pointer;}
.sidebar-logo-wrap img{width:100%;height:auto;max-height:36px;object-fit:contain;object-position:left center;}
.sidebar-logo-text{font-family:var(--font-head);font-size:17px;font-weight:900;letter-spacing:-0.5px;line-height:1;user-select:none;}
.nav-section{padding:10px 0 4px;}
.nav-section-label{font-family:var(--font-data);font-size:9px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--text-dim);padding:0 16px;margin-bottom:4px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;transition:all 0.15s ease;color:var(--text-muted);position:relative;user-select:none;font-family:var(--font-data);font-size:12.5px;font-weight:500;border-left:2px solid transparent;}
.nav-item svg{width:14px;height:14px;flex-shrink:0;opacity:0.7;}
.nav-item:hover{background:rgba(79,195,247,0.04);color:rgba(255,255,255,0.75);}
.nav-item.active{color:#4FC3F7;border-left-color:#4FC3F7;background:rgba(79,195,247,0.06);}
.nav-item.active svg{opacity:1;}
.sidebar-bottom{margin-top:auto;padding:12px 16px 0;border-top:1px solid var(--border);}
.mk-avatar-wrap{display:flex;align-items:center;gap:10px;}
.mk-name{font-family:var(--font-data);font-size:12px;font-weight:600;color:#ffffff;line-height:1.2;}
.mk-role{font-family:var(--font-data);font-size:10px;color:rgba(255,255,255,0.42);}
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px 28px 40px;display:flex;flex-direction:column;gap:20px;scrollbar-width:thin;scrollbar-color:rgba(79,195,247,0.12) transparent;}
.main::-webkit-scrollbar{width:3px;}.main::-webkit-scrollbar-thumb{background:rgba(79,195,247,0.15);border-radius:3px;}
.header-title{font-family:var(--font-head);font-size:28px;font-weight:900;letter-spacing:-1px;line-height:1;}
.header-sub{font-family:var(--font-data);font-size:11px;color:var(--text-muted);margin-top:5px;}
.section-label{font-family:var(--font-head);font-size:10px;font-weight:900;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-muted);display:flex;align-items:center;gap:10px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* Org chart layout */
.org-wrap{display:flex;flex-direction:column;align-items:center;gap:0;padding:10px 0 20px;}
.founder-node{background:var(--card);border:2px solid rgba(79,195,247,0.4);border-radius:14px;padding:18px 28px;text-align:center;min-width:200px;position:relative;}
.founder-node::after{content:'';position:absolute;bottom:-32px;left:50%;transform:translateX(-50%);width:2px;height:32px;background:rgba(79,195,247,0.25);}
.founder-name{font-family:var(--font-head);font-size:16px;font-weight:900;letter-spacing:0.5px;color:#ffffff;}
.founder-role{font-family:var(--font-data);font-size:11px;color:#4FC3F7;margin-top:3px;}
.founder-tag{font-family:var(--font-head);font-size:8px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-top:6px;}

.connector-row{position:relative;width:100%;display:flex;justify-content:center;height:32px;}
.connector-row::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:2px;height:100%;background:rgba(79,195,247,0.15);}

.tree-row{display:flex;justify-content:center;align-items:flex-start;gap:0;position:relative;width:100%;padding:0 20px;}
.tree-row::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(79,195,247,0.2) 15%,rgba(79,195,247,0.2) 85%,transparent);pointer-events:none;}

.agent-col{display:flex;flex-direction:column;align-items:center;flex:1;min-width:120px;max-width:160px;}
.agent-col-connector{width:2px;height:20px;background:rgba(79,195,247,0.15);}
.agent-node{background:var(--card);border-radius:10px;padding:14px 12px;text-align:center;width:100%;transition:border-color 0.2s,background 0.2s;}
.agent-node:hover{background:var(--card-hover);}
.agent-color-bar{width:28px;height:3px;border-radius:2px;margin:0 auto 10px;}
.agent-node-name{font-family:var(--font-head);font-size:11px;font-weight:900;letter-spacing:1px;text-transform:uppercase;}
.agent-node-role{font-family:var(--font-data);font-size:10px;color:var(--text-muted);margin-top:3px;line-height:1.3;}

.legend-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:8px;}
.legend-item{display:flex;align-items:center;gap:6px;font-family:var(--font-data);font-size:10px;color:var(--text-muted);}
.legend-dot{width:8px;height:8px;border-radius:50%;}
</style>
<style>
@media(max-width:768px){
  .agent-map{grid-template-columns:1fr 1fr!important;}
  .founder-node{min-width:0!important;width:100%!important;}
  html,body{overflow:auto!important;height:auto!important;}
  .layout{flex-direction:column;height:auto!important;}
  .sidebar{width:100%!important;min-width:0!important;max-height:none!important;height:auto!important;border-right:none;border-bottom:1px solid rgba(255,255,255,0.07);display:flex!important;flex-direction:row!important;flex-wrap:nowrap!important;align-items:center;padding:0;overflow-x:auto!important;overflow-y:hidden!important;-webkit-overflow-scrolling:touch;}
  .sidebar-logo-wrap{padding:10px 14px;border-bottom:none!important;margin-bottom:0!important;flex-shrink:0;}
  .nav-section{display:contents;}
  .nav-section-label{display:none!important;}
  .nav-item{padding:10px 12px;font-size:12px;white-space:nowrap!important;flex-shrink:0;border-left:none!important;border-bottom:2px solid transparent;border-radius:0;}
  .nav-item.active{border-bottom-color:#4FC3F7!important;background:none!important;}
  .sidebar-bottom{display:none!important;}
  .main{flex:none!important;width:100%!important;padding:16px 14px 60px;overflow-x:hidden;}
}

/* ── FONT SCALE UP ── */
html,body{font-size:16px!important;}
.header-title{font-size:36px!important;}
.header-sub{font-size:14px!important;}
.section-label{font-size:13px!important;}
.nav-item{font-size:15px!important;}
.nav-section-label{font-size:11px!important;}
.mk-name{font-size:14px!important;}
.mk-role{font-size:12px!important;}
/* table / card content */
td,th,.cell,.value,.metric-val,.kpi-val{font-size:15px!important;}
.metric-label,.kpi-label,.col-header{font-size:13px!important;}
/* sops */
.sop-title{font-size:18px!important;}
.sop-meta{font-size:14px!important;}
.sop-num{font-size:14px!important;}
.sop-step{font-size:15px!important;}
.step-num{font-size:12px!important;}
.sop-owner-label{font-size:11px!important;}
.owner-badge{font-size:11px!important;}
/* script/detail cards */
.detail-title,.script-title,.sop-detail-title,.modal-title{font-size:22px!important;}
.detail-body,.script-body,.sop-detail-body,.modal-body{font-size:16px!important;line-height:1.8!important;}
.detail-label,.script-label,.sop-detail-label{font-size:13px!important;}

.sop-body{font-size:16px!important;}
.sop-steps li,.sop-steps{font-size:16px!important;}
</style></head>
<body>

  <nav class="sidebar">

    <div class="nav-section"><div class="nav-section-label">Command</div>

      <div style="font-family:var(--font-data);font-size:11px;color:var(--text-muted);margin-top:5px;">InboundOS team structure — 1 founder, 7 AI agents</div>

    <div class="org-wrap" id="orgWrap">

    </div>
    <div class="section-label">Agent Map</div>
    <div id="agentMap" style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;"></div>
  </main>

<script>
const SB_URL = 'https://cscfbuhwlfhblxprkwnh.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNzY2ZidWh3bGZoYmx4cHJrd25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NjMyMjUsImV4cCI6MjA5NTAzOTIyNX0.TNIW7H0iR7WxtPJSJi9LPBmqIiQu8w1xJ2MY4eDYVsA';
const SB_HEADERS = { 'apikey': SB_ANON, 'Authorization': `Bearer ${SB_ANON}` };

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function loadOrgChart() {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/agent_roster?select=*&active=eq.true&order=sort_order.asc`, { headers: SB_HEADERS });
    if (!res.ok) throw new Error(res.status);
    const rows = await res.json();
    const founder = rows.find(r => r.type === 'founder');
    const agents = rows.filter(r => r.type === 'agent');
    renderOrgChart(founder, agents);
    renderAgentMap(agents);
  } catch(e) {
    document.getElementById('orgWrap').innerHTML = `<div style="font-family:var(--font-data);font-size:12px;color:var(--text-muted);padding:40px;text-align:center;">Run schema SQL first — table not found</div>`;
  }
}

function renderOrgChart(founder, agents) {
  const wrap = document.getElementById('orgWrap');
  const founderHtml = founder ? `
    <div class="founder-node">
      <div class="founder-name">${escH(founder.name)}</div>
      <div class="founder-role">${escH(founder.role)}</div>
      ${founder.description ? `<div class="founder-tag">${escH(founder.description)}</div>` : ''}
    </div>
    <div class="connector-row"></div>` : '';

  const agentCols = agents.map(a => {
    const rgb = hexToRgb(a.color || '#ffffff');
    return `<div class="agent-col">
      <div class="agent-col-connector"></div>
      <div class="agent-node" style="border:1px solid rgba(${rgb},0.25);">
        <div class="agent-color-bar" style="background:${escH(a.color)};"></div>
        <div class="agent-node-name" style="color:${escH(a.color)};">${escH(a.name)}</div>
        <div class="agent-node-role">${escH(a.role)}</div>
      </div>
    </div>`;
  }).join('');

  wrap.innerHTML = founderHtml + `<div class="tree-row">${agentCols}</div>`;
}

function renderAgentMap(agents) {
  const map = document.getElementById('agentMap');
  map.innerHTML = agents.map(a => {
    const rgb = hexToRgb(a.color || '#ffffff');
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(${rgb},0.04);border-radius:8px;border:1px solid rgba(${rgb},0.1);">
      <div style="width:8px;height:8px;border-radius:50%;background:${escH(a.color)};flex-shrink:0;"></div>
      <div>
        <div style="font-family:var(--font-head);font-size:11px;font-weight:900;letter-spacing:1px;color:${escH(a.color)};">${escH(a.name)}</div>
        <div style="font-family:var(--font-data);font-size:10px;color:var(--text-muted);">${escH(a.description||a.role)}</div>
      </div>
    </div>`;
  }).join('');
}

loadOrgChart();
</script>
<script>
(function() {
  fetch('http://localhost:3001/agent/chat', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ agent: '_check', messages: [] }),
  }).then(res => res.json()).then(data => {
    if (!data.error) {
      const el = document.getElementById('nav-chat-item');
      if (!el) return;
      el.onclick = function() { location.href = 'chat.html'; };
      el.style.opacity = ''; el.style.cursor = ''; el.style.pointerEvents = '';
      el.removeAttribute('title');
    }
  }).catch(() => {});
})();
</script>
