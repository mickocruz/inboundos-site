<style>
@font-face { font-family:'NHGrotesk'; src:url('/dashboard/fonts/NHGrotesk-Black.otf') format('opentype'); font-weight:900; }
:root {
  --bg:#0D1117; --surface:rgba(255,255,255,0.015); --card:rgba(255,255,255,0.02); --border:rgba(255,255,255,0.07); --border-glow:rgba(79,195,247,0.2);
  --accent:#4FC3F7; --accent-dim:rgba(79,195,247,0.07); --text:#ffffff; --text-muted:rgba(255,255,255,0.3); --text-dim:rgba(255,255,255,0.22);
  --green:#4ade80; --yellow:#fbbf24; --red:#f87171; --purple:#a78bfa; --orange:#fb923c;
  --sidebar-w:180px; --font-head:'NHGrotesk','Arial Black',Arial,sans-serif; --font-data:'DM Sans',sans-serif; --font-body:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;overflow:hidden;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 55% at 50% -5%,rgba(79,195,247,0.07) 0%,transparent 65%),radial-gradient(ellipse 45% 50% at 95% 15%,rgba(79,195,247,0.04) 0%,transparent 55%),radial-gradient(ellipse 35% 40% at 5% 80%,rgba(74,222,128,0.025) 0%,transparent 55%);pointer-events:none;z-index:0;}
.layout{display:flex;height:100vh;position:relative;z-index:1;}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:rgba(7,11,18,0.82);border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;padding:0 0 16px;backdrop-filter:blur(32px) saturate(160%);-webkit-backdrop-filter:blur(32px) saturate(160%);z-index:10;overflow-y:auto;scrollbar-width:none;box-shadow:inset -1px 0 0 rgba(255,255,255,0.04);}
.sidebar::-webkit-scrollbar{display:none;}
.sidebar-logo-wrap{padding:18px 16px 14px;border-bottom:1px solid var(--border);margin-bottom:8px;cursor:pointer;}
.sidebar-logo-text{font-family:var(--font-head);font-size:17px;font-weight:900;letter-spacing:-0.5px;line-height:1;user-select:none;}
.nav-section{padding:10px 0 4px;}
.nav-section-label{font-family:var(--font-data);font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--text-dim);padding:0 16px;margin-bottom:4px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;transition:all 0.15s ease;color:var(--text-muted);position:relative;user-select:none;font-family:var(--font-data);font-size:13px;font-weight:500;border-left:2px solid transparent;}
.nav-item svg{width:14px;height:14px;flex-shrink:0;opacity:0.7;}
.nav-item:hover{background:rgba(79,195,247,0.04);color:rgba(255,255,255,0.75);}
.nav-item.active{color:#4FC3F7;border-left-color:#4FC3F7;background:rgba(79,195,247,0.06);}
.nav-item.active svg{opacity:1;}
.sidebar-bottom{margin-top:auto;padding:12px 16px 0;border-top:1px solid var(--border);}
.mk-avatar-wrap{display:flex;align-items:center;gap:10px;cursor:pointer;}
.mk-name{font-family:var(--font-data);font-size:12px;font-weight:600;color:#ffffff;line-height:1.2;}
.mk-role{font-family:var(--font-data);font-size:11px;color:rgba(255,255,255,0.42);}

/* MAIN */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.page-header{padding:22px 24px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.page-header h1{font-family:var(--font-head);font-size:28px;font-weight:900;letter-spacing:-1.2px;line-height:1;}
.page-header h1 span{color:var(--text);}
.page-header .sub{font-family:var(--font-data);font-size:11px;color:var(--text-muted);margin-top:4px;}
.header-right{display:flex;gap:8px;align-items:center;}
.pill{display:flex;align-items:center;gap:6px;border-radius:20px;padding:6px 13px;font-family:var(--font-data);font-size:12px;font-weight:600;border:1px solid rgba(79,195,247,0.3);background:rgba(79,195,247,0.08);color:var(--accent);cursor:pointer;transition:all 0.15s;}
.pill:hover{background:rgba(79,195,247,0.16);}
.pill svg{width:13px;height:13px;}

/* VIEW SWITCHER */
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 24px 14px;flex-shrink:0;flex-wrap:wrap;}
.view-tabs{display:flex;gap:2px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:9px;padding:3px;}
.view-tab{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;font-family:var(--font-data);font-size:12px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all 0.15s;border:none;background:transparent;}
.view-tab svg{width:13px;height:13px;}
.view-tab:hover{color:rgba(255,255,255,0.7);}
.view-tab.active{background:rgba(79,195,247,0.12);color:var(--accent);}
.filters{display:flex;gap:8px;align-items:center;}
.filter-sel{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font-data);font-size:12px;padding:6px 10px;cursor:pointer;outline:none;}
.filter-sel:focus{border-color:var(--border-glow);}

.view-wrap{flex:1;overflow:auto;padding:0 24px 24px;}
.view-wrap::-webkit-scrollbar{height:8px;width:8px;}
.view-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:4px;}

/* KANBAN */
.board{display:flex;gap:14px;height:100%;min-height:0;align-items:flex-start;}
.column{flex:1;min-width:230px;max-width:300px;background:rgba(255,255,255,0.012);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;max-height:100%;}
.column.drag-over{border-color:var(--border-glow);background:rgba(79,195,247,0.04);}
.col-head{display:flex;align-items:center;gap:8px;padding:13px 14px 10px;flex-shrink:0;}
.col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.col-title{font-family:var(--font-data);font-size:12px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:rgba(255,255,255,0.6);}
.col-count{font-family:var(--font-data);font-size:11px;font-weight:600;color:var(--text-dim);background:rgba(255,255,255,0.04);border-radius:10px;padding:1px 7px;}
.col-add{margin-left:auto;width:20px;height:20px;border-radius:5px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.col-add:hover{background:rgba(79,195,247,0.1);color:var(--accent);}
.col-body{flex:1;overflow-y:auto;padding:0 10px 10px;display:flex;flex-direction:column;gap:9px;scrollbar-width:none;}
.col-body::-webkit-scrollbar{display:none;}

/* TASK CARD */
.card{background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:10px;padding:11px 12px;cursor:grab;transition:border-color 0.15s,transform 0.1s,box-shadow 0.15s;}
.card:hover{border-color:rgba(79,195,247,0.25);box-shadow:0 4px 14px rgba(0,0,0,0.25);}
.card.dragging{opacity:0.4;}
.card-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px;}
.card-prio{width:3px;align-self:stretch;border-radius:3px;flex-shrink:0;}
.card-title{font-family:var(--font-data);font-size:13px;font-weight:600;color:#fff;line-height:1.35;flex:1;}
.card-desc{font-family:var(--font-data);font-size:11.5px;color:var(--text-muted);line-height:1.4;margin-bottom:8px;}
.card-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-data);font-size:10px;font-weight:700;color:#fff;flex-shrink:0;border:1px solid rgba(255,255,255,0.12);}
.due{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-data);font-size:10.5px;font-weight:600;color:var(--text-muted);border:1px solid var(--border);border-radius:6px;padding:2px 7px;}
.due svg{width:10px;height:10px;}
.due.overdue{color:var(--red);border-color:rgba(248,113,113,0.3);background:rgba(248,113,113,0.08);}
.due.soon{color:var(--yellow);border-color:rgba(251,191,36,0.3);}
.tag{font-family:var(--font-data);font-size:10px;font-weight:600;color:var(--accent);background:rgba(79,195,247,0.08);border-radius:5px;padding:2px 6px;}
.card-empty{font-family:var(--font-data);font-size:11.5px;color:var(--text-dim);text-align:center;padding:18px 0;}

/* LIST VIEW */
.list-table{width:100%;border-collapse:collapse;}
.list-table th{text-align:left;font-family:var(--font-data);font-size:10.5px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:var(--text-dim);padding:8px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);}
.list-table td{padding:11px 12px;border-bottom:1px solid rgba(255,255,255,0.04);font-family:var(--font-data);font-size:13px;vertical-align:middle;}
.list-row{cursor:pointer;transition:background 0.12s;}
.list-row:hover{background:rgba(79,195,247,0.03);}
.status-pill{display:inline-block;font-family:var(--font-data);font-size:10.5px;font-weight:700;border-radius:20px;padding:3px 10px;}
.prio-pill{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-data);font-size:11px;font-weight:600;}
.prio-dot{width:7px;height:7px;border-radius:50%;}

/* CALENDAR */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-nav{display:flex;gap:6px;align-items:center;}
.cal-nav button{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--text);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.cal-nav button:hover{border-color:var(--border-glow);color:var(--accent);}
.cal-month{font-family:var(--font-head);font-size:18px;font-weight:900;letter-spacing:-0.5px;min-width:160px;text-align:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-dow{font-family:var(--font-data);font-size:10.5px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:var(--text-dim);text-align:center;padding:4px 0;}
.cal-cell{min-height:92px;background:rgba(255,255,255,0.012);border:1px solid var(--border);border-radius:9px;padding:6px;display:flex;flex-direction:column;gap:4px;overflow:hidden;}
.cal-cell.empty{background:transparent;border-color:transparent;}
.cal-cell.today{border-color:var(--border-glow);background:rgba(79,195,247,0.04);}
.cal-date{font-family:var(--font-data);font-size:11px;font-weight:600;color:var(--text-muted);}
.cal-cell.today .cal-date{color:var(--accent);}
.cal-task{font-family:var(--font-data);font-size:10.5px;font-weight:600;color:#fff;background:rgba(79,195,247,0.1);border-left:2px solid var(--accent);border-radius:4px;padding:2px 5px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-task:hover{background:rgba(79,195,247,0.2);}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60%;gap:10px;color:var(--text-dim);}
.empty-state svg{width:42px;height:42px;opacity:0.4;}
.empty-state .es-title{font-family:var(--font-head);font-size:18px;font-weight:900;color:rgba(255,255,255,0.5);}
.empty-state .es-sub{font-family:var(--font-data);font-size:12px;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;backdrop-filter:blur(3px);}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:#0f1923;border:1px solid rgba(79,195,247,0.18);border-radius:16px;padding:24px;width:520px;max-width:92vw;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;gap:15px;}
.modal-head{display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:var(--font-head);font-size:19px;font-weight:900;}
.modal-title span{color:var(--text);}
.modal-close{background:transparent;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;line-height:1;transition:color 0.15s;}
.modal-close:hover{color:#fff;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-family:var(--font-data);font-size:11px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:var(--text-dim);}
.field input,.field textarea,.field select{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;color:#fff;font-family:var(--font-data);font-size:13px;padding:9px 11px;outline:none;transition:border-color 0.15s;width:100%;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--border-glow);}
.field textarea{resize:vertical;min-height:64px;}
.field-row{display:flex;gap:12px;}
.field-row .field{flex:1;}
.modal-actions{display:flex;gap:8px;justify-content:space-between;align-items:center;margin-top:4px;}
.btn{font-family:var(--font-data);font-size:13px;font-weight:600;border-radius:8px;padding:9px 18px;cursor:pointer;border:1px solid transparent;transition:all 0.15s;}
.btn-primary{background:var(--accent);color:#06121b;}
.btn-primary:hover{background:#6fd0fb;}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--text-muted);}
.btn-ghost:hover{color:#fff;border-color:rgba(255,255,255,0.2);}
.btn-danger{background:transparent;border-color:rgba(248,113,113,0.3);color:var(--red);}
.btn-danger:hover{background:rgba(248,113,113,0.1);}

@media(max-width:760px){
  .sidebar{display:none;}
  .board{flex-direction:column;}.column{max-width:none;width:100%;}
  .field-row{flex-direction:column;}
}
</style>

      <div class="nav-item" onclick="location.href='/'+(function(){var v=document.cookie.match('(^|;) ?ctrl_slug=([^;]*)(;|$)');var s=v?v[2]:'';if(!s){var pages=['dashboard','agents','pipeline','performance','research','clients','sales-calls','crm','tasks','roi','chat','metrics','login','activity'];var p=window.location.pathname.split('/').filter(Boolean);var seg=p[0]||'';s=pages.indexOf(seg)===-1?seg:'';}if(!s){window.location.href='/login';return '';}return s;})()+'/metrics'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Metrics</div>

  <main class="main">

<!-- TASK MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">New <span>Task</span></div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <input type="hidden" id="f-id">
    <div class="field"><label>Title</label><input type="text" id="f-title" placeholder="What needs doing?" autocomplete="off"></div>
    <div class="field"><label>Description</label><textarea id="f-desc" placeholder="Details, context, links…"></textarea></div>
    <div class="field-row">
      <div class="field"><label>Status</label><select id="f-status">
        <option value="backlog">Backlog</option><option value="todo" selected>To Do</option>
        <option value="in_progress">In Progress</option><option value="review">Review</option><option value="done">Done</option>
      </select></div>
      <div class="field"><label>Priority</label><select id="f-prio">
        <option value="low">Low</option><option value="medium" selected>Medium</option>
        <option value="high">High</option><option value="urgent">Urgent</option>
      </select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Assignee</label><select id="f-assignee">
        <option value="">Unassigned</option><option value="micko">Micko</option><option value="argus">Argus</option>
        <option value="apollo">Apollo</option><option value="hermes">Hermes</option><option value="clio">Clio</option>
      </select></div>
      <div class="field"><label>Due date</label><input type="date" id="f-due"></div>
    </div>
    <div class="field"><label>Tags (comma separated)</label><input type="text" id="f-tags" placeholder="content, urgent, client" autocomplete="off"></div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="btn-delete" onclick="deleteTask()" style="visibility:hidden;">Delete</button>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveTask()">Save</button>
      </div>
    </div>
  </div>

<script>
// ── Slug helper (matches dashboard nav pattern) ─────────────
function navSlug(){var v=document.cookie.match('(^|;) ?ctrl_slug=([^;]*)(;|$)');var s=v?v[2]:'';if(!s){var pages=['dashboard','agents','pipeline','performance','research','clients','sales-calls','crm','tasks','roi','chat','metrics','login','activity','planner'];var p=window.location.pathname.split('/').filter(Boolean);var seg=p[0]||'';s=pages.indexOf(seg)===-1?seg:'';}if(!s){window.location.href='/login';return '';}return s;}

// ── Supabase REST ──────────────────────────────────────────
function SB(){
  const sess=JSON.parse(localStorage.getItem('sb_session')||'{}');
  const anon=sess.client_supabase_anon||'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNzY2ZidWh3bGZoYmx4cHJrd25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NjMyMjUsImV4cCI6MjA5NTAzOTIyNX0.TNIW7H0iR7WxtPJSJi9LPBmqIiQu8w1xJ2MY4eDYVsA';
  const tok=(sess.access_token&&sess.access_token!=='local')?sess.access_token:anon;
  const url=sess.client_supabase_url||'https://cscfbuhwlfhblxprkwnh.supabase.co';
  return{url,anon,tok,hdrs:{'apikey':anon,'Authorization':'Bearer '+tok,'Content-Type':'application/json','Prefer':'return=representation'}};
}

// ── Constants ──────────────────────────────────────────────
const COLUMNS=[
  {key:'backlog',  label:'Backlog',     color:'#8b95a5'},
  {key:'todo',     label:'To Do',       color:'#4FC3F7'},
  {key:'in_progress',label:'In Progress',color:'#fbbf24'},
  {key:'review',   label:'Review',      color:'#a78bfa'},
  {key:'done',     label:'Done',        color:'#4ade80'}
];
const PRIO={low:'#8b95a5',medium:'#4FC3F7',high:'#fb923c',urgent:'#f87171'};
const PEOPLE={
  micko:{name:'Micko', color:'#4FC3F7'}, argus:{name:'Argus', color:'#a78bfa'},
  apollo:{name:'Apollo',color:'#4ade80'}, hermes:{name:'Hermes',color:'#fb923c'},
  clio:{name:'Clio',  color:'#fbbf24'}
};
const STATUS_LABEL={backlog:'Backlog',todo:'To Do',in_progress:'In Progress',review:'Review',done:'Done'};

let TASKS=[];
let VIEW='board';
let calRef=new Date();
let dragId=null;

// ── Data ───────────────────────────────────────────────────
async function loadTasks(){
  const sb=SB();
  try{
    const r=await fetch(`${SERVER_BASE}/api/sb/pm_tasks?select=*&order=sort_order.asc.nullslast,created_at.asc`);
    TASKS=r.ok?await r.json():[];
  }catch(e){TASKS=[];}
  updateSubtitle();
  render();
}
function updateSubtitle(){
  const active=TASKS.filter(t=>t.status!=='done').length;
  const overdue=TASKS.filter(t=>isOverdue(t)).length;
  document.getElementById('subtitle').textContent=
    `${active} active · ${overdue} overdue · ${TASKS.length} total`;
}
async function patchTask(id,body){
  await fetch(`${SERVER_BASE}/api/tasks/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
}

// ── Filters ────────────────────────────────────────────────
function filtered(){
  const a=document.getElementById('filter-assignee').value;
  const p=document.getElementById('filter-prio').value;
  return TASKS.filter(t=>(!a||t.assignee===a)&&(!p||t.priority===p));
}
function isOverdue(t){return t.due_date&&t.status!=='done'&&t.due_date<today();}
function today(){return new Date().toISOString().slice(0,10);}

// ── View switch ────────────────────────────────────────────
function setView(v){
  VIEW=v;
  document.querySelectorAll('.view-tab').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  render();
}
function render(){
  if(VIEW==='board')renderBoard();
  else if(VIEW==='list')renderList();
  else renderCalendar();
}

// ── escape ─────────────────────────────────────────────────
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

// ── BOARD ──────────────────────────────────────────────────
function renderBoard(){
  const w=document.getElementById('view-wrap');
  const data=filtered();
  w.innerHTML=`<div class="board">${COLUMNS.map(col=>{
    const items=data.filter(t=>t.status===col.key);
    return `<div class="column" data-status="${col.key}"
        ondragover="event.preventDefault();this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="dropTask(event,'${col.key}')">
      <div class="col-head">
        <span class="col-dot" style="background:${col.color}"></span>
        <span class="col-title">${col.label}</span>
        <span class="col-count">${items.length}</span>
        <button class="col-add" title="Add" onclick="openModal(null,'${col.key}')">+</button>
      </div>
      <div class="col-body">
        ${items.length?items.map(cardHTML).join(''):'<div class="card-empty">No tasks</div>'}
      </div>
    </div>`;
  }).join('')}</div>`;
}
function cardHTML(t){
  const p=PEOPLE[t.assignee];
  const due=dueBadge(t);
  const tags=(t.tags||[]).slice(0,3).map(x=>`<span class="tag">${esc(x)}</span>`).join('');
  return `<div class="card" draggable="true"
      ondragstart="dragId='${t.id}';this.classList.add('dragging')"
      ondragend="this.classList.remove('dragging')"
      onclick="openModal('${t.id}')">
    <div class="card-top">
      <span class="card-prio" style="background:${PRIO[t.priority]||'#8b95a5'}"></span>
      <span class="card-title">${esc(t.title)}</span>
    </div>
    ${t.description?`<div class="card-desc">${esc(t.description).slice(0,120)}</div>`:''}
    <div class="card-meta">
      ${p?`<span class="avatar" style="background:${p.color}33;color:${p.color};border-color:${p.color}55" title="${p.name}">${p.name[0]}</span>`:''}
      ${due}${tags}
    </div>
  </div>`;
}
function dueBadge(t){
  if(!t.due_date)return '';
  const cls=isOverdue(t)?'overdue':(t.due_date<=addDays(today(),2)&&t.status!=='done'?'soon':'');
  return `<span class="due ${cls}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${fmtDate(t.due_date)}</span>`;
}
async function dropTask(e,status){
  e.preventDefault();
  document.querySelectorAll('.column').forEach(c=>c.classList.remove('drag-over'));
  if(!dragId)return;
  const t=TASKS.find(x=>x.id===dragId);
  if(t&&t.status!==status){
    if(status==='done'){
      // Done = delete from DB entirely
      const _id=dragId;
      TASKS=TASKS.filter(x=>x.id!==_id);
      render();updateSubtitle();
      fetch(`${SERVER_BASE}/api/tasks/${_id}`,{method:'DELETE'}).catch(()=>{});
    } else {
      t.status=status;render();updateSubtitle();await patchTask(dragId,{status});
    }
  }
  dragId=null;
}

// ── LIST ───────────────────────────────────────────────────
function renderList(){
  const w=document.getElementById('view-wrap');
  const data=filtered().slice().sort((a,b)=>{
    const o={backlog:0,todo:1,in_progress:2,review:3,done:4};
    return (o[a.status]-o[b.status])||((a.due_date||'9999')<(b.due_date||'9999')?-1:1);
  });
  if(!data.length){w.innerHTML=emptyState();return;}
  w.innerHTML=`<table class="list-table"><thead><tr>
    <th>Task</th><th>Status</th><th>Priority</th><th>Assignee</th><th>Due</th>
  </tr></thead><tbody>${data.map(t=>{
    const p=PEOPLE[t.assignee];const col=COLUMNS.find(c=>c.key===t.status);
    return `<tr class="list-row" onclick="openModal('${t.id}')">
      <td><div style="font-weight:600;color:#fff;">${esc(t.title)}</div>${t.tags&&t.tags.length?`<div style="margin-top:3px;display:flex;gap:4px;flex-wrap:wrap;">${t.tags.map(x=>`<span class="tag">${esc(x)}</span>`).join('')}</div>`:''}</td>
      <td><span class="status-pill" style="background:${col.color}1f;color:${col.color}">${STATUS_LABEL[t.status]}</span></td>
      <td><span class="prio-pill"><span class="prio-dot" style="background:${PRIO[t.priority]}"></span>${t.priority}</span></td>
      <td>${p?`<span style="display:inline-flex;align-items:center;gap:6px;"><span class="avatar" style="background:${p.color}33;color:${p.color};border-color:${p.color}55">${p.name[0]}</span>${p.name}</span>`:'<span style="color:var(--text-dim)">—</span>'}</td>
      <td>${t.due_date?`<span class="${isOverdue(t)?'due overdue':'due'}">${fmtDate(t.due_date)}</span>`:'<span style="color:var(--text-dim)">—</span>'}</td>
    </tr>`;
  }).join('')}</tbody></table>`;
}

// ── CALENDAR ───────────────────────────────────────────────
function renderCalendar(){
  const w=document.getElementById('view-wrap');
  const y=calRef.getFullYear(),m=calRef.getMonth();
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const monthName=calRef.toLocaleString('default',{month:'long',year:'numeric'});
  const data=filtered().filter(t=>t.due_date);
  const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let cells='';
  for(let i=0;i<first;i++)cells+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayTasks=data.filter(t=>t.due_date===ds);
    const isToday=ds===today();
    cells+=`<div class="cal-cell ${isToday?'today':''}">
      <div class="cal-date">${d}</div>
      ${dayTasks.slice(0,4).map(t=>`<div class="cal-task" style="border-left-color:${PRIO[t.priority]}" onclick="openModal('${t.id}')" title="${esc(t.title)}">${esc(t.title)}</div>`).join('')}
      ${dayTasks.length>4?`<div style="font-size:10px;color:var(--text-dim);">+${dayTasks.length-4} more</div>`:''}
    </div>`;
  }
  w.innerHTML=`
    <div class="cal-head">
      <div class="cal-nav">
        <button onclick="calMove(-1)">&lsaquo;</button>
        <div class="cal-month">${monthName}</div>
        <button onclick="calMove(1)">&rsaquo;</button>
      </div>
      <button class="pill" onclick="calRef=new Date();renderCalendar()">Today</button>
    </div>
    <div class="cal-grid">${dow.map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells}</div>`;
}
function calMove(n){calRef=new Date(calRef.getFullYear(),calRef.getMonth()+n,1);renderCalendar();}

function emptyState(){
  return `<div class="empty-state">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="5" height="16" rx="1"/><rect x="10" y="4" width="5" height="10" rx="1"/><rect x="17" y="4" width="4" height="13" rx="1"/></svg>
    <div class="es-title">No tasks yet</div>
    <div class="es-sub">Hit "New Task" to start your board.</div>
  </div>`;
}

// ── date helpers ───────────────────────────────────────────
function fmtDate(ds){const d=new Date(ds+'T00:00:00');return d.toLocaleString('default',{month:'short',day:'numeric'});}
function addDays(ds,n){const d=new Date(ds+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}

// ── MODAL ──────────────────────────────────────────────────
function openModal(id,presetStatus){
  const o=document.getElementById('overlay');
  const del=document.getElementById('btn-delete');
  if(id){
    const t=TASKS.find(x=>x.id===id);if(!t)return;
    document.getElementById('modal-title').innerHTML='Edit <span>Task</span>';
    document.getElementById('f-id').value=t.id;
    document.getElementById('f-title').value=t.title||'';
    document.getElementById('f-desc').value=t.description||'';
    document.getElementById('f-status').value=t.status;
    document.getElementById('f-prio').value=t.priority;
    document.getElementById('f-assignee').value=t.assignee||'';
    document.getElementById('f-due').value=t.due_date||'';
    document.getElementById('f-tags').value=(t.tags||[]).join(', ');
    del.style.visibility='visible';
  }else{
    document.getElementById('modal-title').innerHTML='New <span>Task</span>';
    document.getElementById('f-id').value='';
    document.getElementById('f-title').value='';
    document.getElementById('f-desc').value='';
    document.getElementById('f-status').value=presetStatus||'todo';
    document.getElementById('f-prio').value='medium';
    document.getElementById('f-assignee').value='';
    document.getElementById('f-due').value='';
    document.getElementById('f-tags').value='';
    del.style.visibility='hidden';
  }
  o.classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),60);
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}

async function saveTask(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').focus();return;}
  const tags=document.getElementById('f-tags').value.split(',').map(s=>s.trim()).filter(Boolean);
  const body={
    title,
    description:document.getElementById('f-desc').value.trim()||null,
    status:document.getElementById('f-status').value,
    priority:document.getElementById('f-prio').value,
    assignee:document.getElementById('f-assignee').value||null,
    due_date:document.getElementById('f-due').value||null,
    tags
  };
  const id=document.getElementById('f-id').value;
  if(id){
    await patchTask(id,body);
    Object.assign(TASKS.find(x=>x.id===id),body);
  }else{
    body.sort_order=Date.now();
    const r=await fetch(`${SERVER_BASE}/api/tasks`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok){const d=await r.json();if(d&&d.data&&d.data[0])TASKS.push(d.data[0]);}
  }
  closeModal();updateSubtitle();render();
}
async function deleteTask(){
  const id=document.getElementById('f-id').value;if(!id)return;
  if(!confirm('Delete this task?'))return;
  await fetch(`${SERVER_BASE}/api/tasks/${id}`,{method:'DELETE'});
  TASKS=TASKS.filter(x=>x.id!==id);
  closeModal();updateSubtitle();render();
}

// close modal on overlay click / esc
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

loadTasks();

// ── Sidebar live agent status (matches other dashboard pages) ─
(function sidebarAgentStatus(){
  var AGENTS=[
    {name:'Atlas',color:'#4FC3F7'},{name:'Argus',color:'#4FC3F7'},{name:'Apollo',color:'#fbbf24'},
    {name:'Hermes',color:'#f472b6'},{name:'Clio',color:'#a78bfa'}
  ];
  function getStatuses(){
    var s={};AGENTS.forEach(function(a){s[a.name]='idle';});
    try{
      var tasks=JSON.parse(localStorage.getItem('ctrl_agent_tasks_v1')||'{}');
      Object.values(tasks).forEach(function(t){
        if(t.status==='running')s[t.agent]='working';
        else if(t.status==='queued'&&s[t.agent]!=='working')s[t.agent]='queued';
      });
    }catch(e){}
    return s;
  }
  function render(){
    var el=document.getElementById('sidebar-agent-status-list');
    if(!el)return;
    var statuses=getStatuses();
    el.innerHTML=AGENTS.map(function(a){
      var st=statuses[a.name]||'idle';
      var dotColor=st==='working'?'#fbbf24':st==='queued'?'#fbbf24':'rgba(255,255,255,0.15)';
      var stLabel=st==='working'?'running':st==='queued'?'queued':'idle';
      return '<div style="display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;" onclick="window.location.href=window.location.href.replace(/\/[^\/]*$/, \'/agents\')">'
        +'<div style="width:9px;height:9px;border-radius:50%;flex-shrink:0;background:'+dotColor+';"></div>'
        +'<span style="font-family:var(--font-data);font-size:13px;font-weight:600;color:rgba(255,255,255,0.6);flex:1;">'+a.name+'</span>'
        +'<span style="font-family:var(--font-data);font-size:10px;color:rgba(255,255,255,0.3);">'+stLabel+'</span>'
        +'</div>';
    }).join('');
  }
  render();
  setInterval(render,5000);
})();
</script>
