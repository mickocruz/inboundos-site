<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D1117">
<title>InboundOS — Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/dashboard/planner/planner.css">
</head>
<body>
<div class="layout">
  <div id="sidebar-slot"></div>
  <main class="main">
    <div class="header">
      <div class="header-left">
        <h1>Life <span>Planner</span></h1>
        <div class="date" id="hdr-date"></div>
      </div>
      <div class="header-right">
        <div class="view-toggle" id="lane-toggle">
          <button class="view-btn active" data-lane="all">All</button>
          <button class="view-btn" data-lane="inboundos">InboundOS</button>
          <button class="view-btn" data-lane="music">Music</button>
          <button class="view-btn" data-lane="personal">Personal</button>
        </div>
        <div class="view-toggle" id="view-toggle">
          <button class="view-btn active" data-view="board">Board</button>
          <button class="view-btn" data-view="table">Table</button>
          <button class="view-btn" data-view="calendar">Calendar</button>
        </div>
        <div class="status-pill"><div class="status-dot"></div><span id="block-now">—</span></div>
      </div>
    </div>

    <div class="quick-add">
      <input type="text" id="qa-input" placeholder="Add task… then pick block + lane" autocomplete="off">
      <button class="btn" id="qa-btn" onclick="quickAdd()">Add</button>
    </div>
    <div id="qa-picker" style="display:none;flex-shrink:0;align-items:center;gap:10px;flex-wrap:wrap;font-family:var(--font-data);font-size:13px;">
      <span id="qa-q" style="color:var(--text-muted);"></span>
      <span id="qa-opts" style="display:flex;gap:6px;flex-wrap:wrap;"></span>
      <button class="btn-ghost" onclick="qaCancel()">Cancel</button>
    </div>

    <div class="stat-row" id="stat-row"></div>

    <div class="board" id="view-board"></div>
    <div class="tbl-wrap" id="view-table" style="display:none;"></div>
    <div class="cal-wrap" id="view-calendar" style="display:none;"></div>
  </main>
</div>

<script src="/dashboard/planner/shared.js"></script>
<script>
document.getElementById('sidebar-slot').outerHTML = plSidebar('board');
document.getElementById('hdr-date').textContent = plDateLabel() + ' · cycle ' + plToday();

let TASKS = [];
let LANE = 'all';
let VIEW = 'board';

const blockNow = plCurrentBlock();
document.getElementById('block-now').textContent = blockNow ? blockNow.toUpperCase() + ' BLOCK' : 'OFF BLOCK';

document.getElementById('lane-toggle').addEventListener('click', e => {
  const b = e.target.closest('[data-lane]'); if (!b) return;
  LANE = b.dataset.lane;
  document.querySelectorAll('#lane-toggle .view-btn').forEach(x => x.classList.toggle('active', x === b));
  render();
});
document.getElementById('view-toggle').addEventListener('click', e => {
  const b = e.target.closest('[data-view]'); if (!b) return;
  VIEW = b.dataset.view;
  document.querySelectorAll('#view-toggle .view-btn').forEach(x => x.classList.toggle('active', x === b));
  ['board','table','calendar'].forEach(v => {
    document.getElementById('view-' + v).style.display = v === VIEW ? (v==='board'?'grid':v==='table'?'block':'grid') : 'none';
  });
  render();
});
document.getElementById('qa-input').addEventListener('keydown', e => { if (e.key === 'Enter') quickAdd(); });

async function load() {
  TASKS = await plGet('planner_tasks', `cycle_date=eq.${plToday()}&order=position.asc,created_at.asc`);
  render();
}

function filtered() { return LANE === 'all' ? TASKS : TASKS.filter(t => t.lane === LANE); }

function render() {
  const ts = filtered();
  // stats
  const done = ts.filter(t => t.status === 'done').length;
  const carried = ts.filter(t => t.carried).length;
  document.getElementById('stat-row').innerHTML = `
    <div class="stat-card"><div class="stat-val">${ts.length}</div><div class="stat-lbl">Tasks Today</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--green);">${done}</div><div class="stat-lbl">Done</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--orange);">${carried}</div><div class="stat-lbl">Carried Over</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--accent);">${ts.length ? Math.round(done / ts.length * 100) : 0}%</div><div class="stat-lbl">Completion</div></div>`;
  if (VIEW === 'board') renderBoard(ts);
  if (VIEW === 'table') renderTable(ts);
  if (VIEW === 'calendar') renderCal(ts);
}

function cardHTML(t) {
  const lane = t.lane !== 'inboundos' ? `<span class="ktag lane-${t.lane}">${t.lane}</span>` : '';
  const carried = t.carried ? '<span class="ktag carried">carried</span>' : '';
  const src = t.source !== 'manual' ? `<span class="ktag src">${plEsc(t.source)}</span>` : '';
  return `<div class="kcard${t.status==='done'?' done':''}" draggable="true" data-id="${t.id}"
    ondragstart="onDragStart(event,'${t.id}')" ondragend="this.classList.remove('dragging')">
    <div class="kcard-title">${plEsc(t.title)}</div>
    <div class="kcard-meta">
      <span class="ktag p${t.priority}">P${t.priority}</span>${lane}${carried}${src}
      <span class="kcard-actions">
        <button class="icon-btn done-btn" onclick="toggleDone('${t.id}')" title="toggle done">✓</button>
        <button class="icon-btn del-btn" onclick="delTask('${t.id}')" title="delete">×</button>
      </span>
    </div></div>`;
}

function renderBoard(ts) {
  document.getElementById('view-board').innerHTML = PL_BLOCKS.map(b => {
    const cards = ts.filter(t => t.block === b.id);
    return `<div class="col${blockNow === b.id ? ' now' : ''}">
      <div class="col-header"><span class="col-title">${b.label}<span class="col-hours">${b.hours}</span></span><span class="col-count">${cards.length}</span></div>
      <div class="col-body" data-col="${b.id}" ondragover="onDragOver(event)" ondragleave="this.classList.remove('drag-over')" ondrop="onDrop(event,'${b.id}')">
        ${cards.map(cardHTML).join('')}
      </div></div>`;
  }).join('');
}

let SORT = { key: 'block', dir: 1 };
function renderTable(ts) {
  const rows = [...ts].sort((a, b) => (a[SORT.key] > b[SORT.key] ? 1 : -1) * SORT.dir);
  document.getElementById('view-table').innerHTML = `<table class="ptable"><thead><tr>
    ${['title','block','lane','priority','status','source'].map(k => `<th onclick="setSort('${k}')">${k}</th>`).join('')}
    </tr></thead><tbody>
    ${rows.map(t => `<tr><td>${plEsc(t.title)}</td><td>${t.block}</td><td>${t.lane}</td><td>P${t.priority}</td>
      <td style="color:${t.status==='done'?'var(--green)':'var(--text-muted)'}">${t.status}</td><td>${plEsc(t.source)}</td></tr>`).join('')}
    </tbody></table>`;
}
function setSort(k) { SORT.dir = SORT.key === k ? -SORT.dir : 1; SORT.key = k; render(); }

function renderCal(ts) {
  const days = [];
  const start = new Date();
  start.setDate(start.getDate() - start.getDay() + 1); // Monday
  for (let i = 0; i < 7; i++) { const d = new Date(start); d.setDate(d.getDate() + i); days.push(d); }
  const slots = [{ id:'promote', t:'1–5PM' }, { id:'fulfill', t:'6–10PM' }, { id:'build', t:'11PM–3AM' }];
  let html = '<div class="cal-head"></div>' + days.map(d => `<div class="cal-head">${d.toLocaleDateString('en-US',{weekday:'short', day:'numeric'})}</div>`).join('');
  for (const s of slots) {
    html += `<div class="cal-cell cal-time">${s.t}</div>`;
    for (const d of days) {
      const iso = plLocalISO(d);
      const items = (iso === plToday()) ? ts.filter(t => t.block === s.id) : [];
      html += `<div class="cal-cell">${items.map(t => `<div class="cal-block ${s.id}">${plEsc(t.title)}</div>`).join('')}</div>`;
    }
  }
  document.getElementById('view-calendar').innerHTML = html;
}

// drag & drop
let DRAG_ID = null;
function onDragStart(e, id) { DRAG_ID = id; e.target.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
async function onDrop(e, block) {
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  if (!DRAG_ID) return;
  const t = TASKS.find(x => x.id === DRAG_ID);
  if (t && t.block !== block) { t.block = block; render(); await plPatch('planner_tasks', `id=eq.${DRAG_ID}`, { block, updated_at: new Date().toISOString() }); }
  DRAG_ID = null;
}

async function toggleDone(id) {
  const t = TASKS.find(x => x.id === id); if (!t) return;
  t.status = t.status === 'done' ? 'todo' : 'done';
  render();
  await plPatch('planner_tasks', `id=eq.${id}`, { status: t.status, updated_at: new Date().toISOString() });
}
async function delTask(id) {
  TASKS = TASKS.filter(x => x.id !== id); render();
  await plDelete('planner_tasks', `id=eq.${id}`);
}

// Quick-add: 2-step manual picker — block, then lane
let QA = null; // { title, block }

function quickAdd() {
  const inp = document.getElementById('qa-input');
  const text = inp.value.trim(); if (!text) return;
  QA = { title: text, block: null };
  qaAsk('Which block?', [
    { v: 'promote', label: 'Promote 1–5PM' },
    { v: 'fulfill', label: 'Fulfill 6–10PM' },
    { v: 'build', label: 'Build 11PM–3AM' },
  ], qaPickBlock);
}

function qaAsk(q, opts, cb) {
  document.getElementById('qa-q').textContent = `"${QA.title}" — ${q}`;
  document.getElementById('qa-opts').innerHTML = opts.map(o =>
    `<button class="btn" data-v="${o.v}">${o.label}</button>`).join('');
  document.getElementById('qa-opts').onclick = e => {
    const b = e.target.closest('[data-v]'); if (!b) return;
    cb(b.dataset.v);
  };
  document.getElementById('qa-picker').style.display = 'flex';
}

function qaPickBlock(block) {
  QA.block = block;
  qaAsk('Which lane?', [
    { v: 'inboundos', label: 'InboundOS' },
    { v: 'music', label: 'Music' },
    { v: 'personal', label: 'Personal' },
  ], qaPickLane);
}

async function qaPickLane(lane) {
  const row = { title: QA.title, block: QA.block, lane, priority: 2, cycle_date: plToday() };
  qaCancel();
  document.getElementById('qa-input').value = '';
  const [ins] = await plInsert('planner_tasks', [row]);
  TASKS.push(ins);
  render();
}

function qaCancel() {
  QA = null;
  document.getElementById('qa-picker').style.display = 'none';
}

plStartAnchors();
load();
</script>

<!-- ═══════════════════════════════════════════════════════════════
     INBOUNDOS GLOBAL UI — Command Palette · Search · Shortcuts · Dim · Collapse
     Self-contained. No conflicts with existing code.

<style id="iob-ui-styles">
/* ── BASE MODAL ── */
.iob-overlay{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.72);backdrop-filter:blur(12px);display:flex;align-items:flex-start;justify-content:center;padding-top:80px;opacity:0;pointer-events:none;transition:opacity 0.18s ease;}
.iob-overlay.open{opacity:1;pointer-events:all;}
.iob-modal{width:500px;max-width:calc(100vw - 32px);background:#0d1520;border:1px solid rgba(79,195,247,0.2);border-radius:14px;box-shadow:0 32px 80px rgba(0,0,0,0.8),0 0 0 1px rgba(79,195,247,0.06);overflow:hidden;transform:scale(0.94) translateY(-8px);transition:transform 0.22s cubic-bezier(0.34,1.56,0.64,1),opacity 0.18s;}
.iob-overlay.open .iob-modal{transform:scale(1) translateY(0);}
.iob-input-wrap{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.07);}
.iob-input-icon{color:rgba(79,195,247,0.6);flex-shrink:0;font-size:14px;}
.iob-input{flex:1;background:transparent;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:14px;color:#fff;}
.iob-input::placeholder{color:rgba(255,255,255,0.22);}
.iob-label-bar{font-family:'DM Sans',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.25);padding:10px 16px 4px;}
.iob-results{max-height:320px;overflow-y:auto;padding:4px 6px 8px;}
.iob-results::-webkit-scrollbar{width:3px;}
.iob-results::-webkit-scrollbar-thumb{background:rgba(79,195,247,0.15);border-radius:3px;}
.iob-result-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;transition:background 0.12s;}
.iob-result-item:hover,.iob-result-item.active{background:rgba(79,195,247,0.09);}
.iob-result-icon{font-size:14px;width:22px;text-align:center;flex-shrink:0;opacity:0.7;}
.iob-result-name{font-family:'DM Sans',sans-serif;font-size:13px;color:#fff;}
.iob-result-type{font-family:'DM Sans',sans-serif;font-size:10px;color:rgba(255,255,255,0.3);margin-left:auto;}
.iob-empty{font-family:'DM Sans',sans-serif;font-size:12px;color:rgba(255,255,255,0.25);text-align:center;padding:24px;}
/* ── SHORTCUTS MODAL ── */
.iob-shortcuts-box{background:#0d1520;border:1px solid rgba(79,195,247,0.18);border-radius:14px;padding:24px;width:360px;max-width:calc(100vw - 32px);box-shadow:0 32px 80px rgba(0,0,0,0.8);}
.iob-shortcuts-title{font-family:'NHGrotesk','Arial Black',sans-serif;font-size:16px;font-weight:900;letter-spacing:-0.3px;color:#fff;margin-bottom:18px;}
.iob-shortcut-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.iob-shortcut-row:last-child{border-bottom:none;}
.iob-shortcut-desc{font-family:'DM Sans',sans-serif;font-size:13px;color:rgba(255,255,255,0.65);}
.iob-kbd{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:5px;padding:3px 8px;color:rgba(255,255,255,0.5);}
/* ── DIM BUTTON ── */
/* ── COLLAPSE CHEVRON ── */
.iob-collapse-btn{background:transparent;border:none;cursor:pointer;color:rgba(255,255,255,0.3);font-size:11px;padding:0 4px;line-height:1;transition:transform 0.18s,color 0.15s;flex-shrink:0;}
.iob-collapse-btn:hover{color:rgba(79,195,247,0.8);}
.iob-collapse-btn.collapsed{transform:rotate(-90deg);}
.iob-section-body.collapsed{display:none!important;}
/* ── DIM MODE ── */
</style>

<script>
(function(){
'use strict';

/* ── SLUG HELPER (matches existing nav pattern) ── */
function getSlug(){
  var v=document.cookie.match('(^|;) ?ctrl_slug=([^;]*)(;|$)');
  var s=v?v[2]:'';
  if(!s){
    var pages=['dashboard','agents','pipeline','performance','research','clients','sales-calls','crm','tasks','roi','chat','metrics','login','activity'];
    var p=window.location.pathname.split('/').filter(Boolean);
    var seg=p[0]||'';
    s=pages.indexOf(seg)===-1?seg:'';
  }
  return s;
}
function navTo(page){
  var slug=getSlug();
  if(!slug){window.location.href='/login';return;}
  window.location.href='/'+slug+'/'+page;
}

/* ── PAGE REGISTRY ── */
var PAGES=[
  {name:'Agents',page:'agents',icon:'\u{1F916}'},
  {name:'Content Pipeline',page:'pipeline',icon:'\u{1F4CB}'},
  {name:'Clients',page:'clients',icon:'\u{1F465}'},
  {name:'Instagram',page:'performance',icon:'\u{1F4CA}'},
  {name:'Research',page:'research',icon:'\u{1F50D}'},
  {name:'Sales Calls',page:'sales-calls',icon:'\u{1F4DE}'},
  {name:'Tasks',page:'tasks',icon:'✅'},
  {name:'Live Activity',page:'activity',icon:'⚡'},
  {name:'Chat',page:'chat',icon:'\u{1F4AC}'},
  {name:'CRM',page:'crm',icon:'\u{1F5C2}️'},
  {name:'Metrics',page:'metrics',icon:'\u{1F4C8}'}
];

/* ═══════════════ DOM INJECTION ═══════════════ */
function inject(){
  /* ── COMMAND PALETTE ── */
  var cpEl=document.createElement('div');
  cpEl.id='iob-cp-overlay';
  cpEl.className='iob-overlay';
  cpEl.innerHTML='<div class="iob-modal"><div class="iob-input-wrap"><span class="iob-input-icon">⌘</span><input class="iob-input" id="iob-cp-input" placeholder="Go to page…" autocomplete="off" spellcheck="false"></div><div class="iob-results" id="iob-cp-results"></div></div>';
  document.body.appendChild(cpEl);
  cpEl.addEventListener('click',function(e){if(e.target===cpEl)closeCP();});

  /* ── SEARCH MODAL ── */
  var srEl=document.createElement('div');
  srEl.id='iob-sr-overlay';
  srEl.className='iob-overlay';
  srEl.innerHTML='<div class="iob-modal"><div class="iob-input-wrap"><span class="iob-input-icon">\u{1F50D}</span><input class="iob-input" id="iob-sr-input" placeholder="Search pipeline, clients…" autocomplete="off" spellcheck="false"></div><div class="iob-results" id="iob-sr-results"></div></div>';
  document.body.appendChild(srEl);
  srEl.addEventListener('click',function(e){if(e.target===srEl)closeSR();});

  /* ── SHORTCUTS MODAL ── */
  var scEl=document.createElement('div');
  scEl.id='iob-sc-overlay';
  scEl.className='iob-overlay';
  scEl.innerHTML='<div class="iob-shortcuts-box"><div class="iob-shortcuts-title">Keyboard Shortcuts</div>'+
    '<div class="iob-shortcut-row"><span class="iob-shortcut-desc">Command palette</span><span class="iob-kbd">⌘ K</span></div>'+
    '<div class="iob-shortcut-row"><span class="iob-shortcut-desc">Global search</span><span class="iob-kbd">⌘ /</span></div>'+
    '<div class="iob-shortcut-row"><span class="iob-shortcut-desc">Shortcuts panel</span><span class="iob-kbd">?</span></div>'+
    '<div style="margin-top:16px;"><button onclick="document.getElementById(\'iob-sc-overlay\').classList.remove(\'open\')" style="background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:7px;padding:6px 14px;font-family:\'DM Sans\',sans-serif;font-size:11px;color:rgba(255,255,255,0.4);cursor:pointer;">Close</button></div></div>';
  document.body.appendChild(scEl);
  scEl.addEventListener('click',function(e){if(e.target===scEl)scEl.classList.remove('open');});

  /* inject dim button into header-right or page-header */
  var hr=document.querySelector('.header-right');
  if(!hr) hr=document.querySelector('.page-header .header-right');
  if(hr){
  } else {
    /* fallback: fixed position top-right */
  }

}

/* ═══════════════ COMMAND PALETTE ═══════════════ */
var cpActiveIdx=-1;

function openCP(){
  document.getElementById('iob-cp-overlay').classList.add('open');
  var inp=document.getElementById('iob-cp-input');
  inp.value='';
  renderCPResults('');
  setTimeout(function(){inp.focus();},60);
}
function closeCP(){
  document.getElementById('iob-cp-overlay').classList.remove('open');
  cpActiveIdx=-1;
}
function renderCPResults(q){
  var res=document.getElementById('iob-cp-results');
  var list=PAGES.filter(function(p){return !q||p.name.toLowerCase().indexOf(q.toLowerCase())!==-1;});
  if(!list.length){res.innerHTML='<div class="iob-empty">No pages found</div>';return;}
  res.innerHTML=list.map(function(p){
    return '<div class="iob-result-item" data-page="'+p.page+'" onclick="(function(){window.__iobNavTo(\''+p.page+'\')})()">'+
      '<span class="iob-result-icon">'+p.icon+'</span>'+
      '<span class="iob-result-name">'+p.name+'</span>'+
    '</div>';
  }).join('');
  cpActiveIdx=-1;
}
window.__iobNavTo=navTo;

document.addEventListener('input',function(e){
  if(e.target.id==='iob-cp-input') renderCPResults(e.target.value);
});

/* ═══════════════ GLOBAL SEARCH ═══════════════ */
function openSR(){
  document.getElementById('iob-sr-overlay').classList.add('open');
  var inp=document.getElementById('iob-sr-input');
  inp.value='';
  document.getElementById('iob-sr-results').innerHTML='<div class="iob-empty">Type to search…</div>';
  setTimeout(function(){inp.focus();},60);
}
function closeSR(){
  document.getElementById('iob-sr-overlay').classList.remove('open');
}

var srTimer=null;
document.addEventListener('input',function(e){
  if(e.target.id!=='iob-sr-input') return;
  clearTimeout(srTimer);
  var q=e.target.value.trim();
  if(!q){document.getElementById('iob-sr-results').innerHTML='<div class="iob-empty">Type to search…</div>';return;}
  srTimer=setTimeout(function(){runSearch(q);},280);
});

function runSearch(q){
  var res=[];

  /* pipeline cards from localStorage */
  try{
    var board=JSON.parse(localStorage.getItem('ctrl_pipeline_board')||'{}');
    var cols=['scripting','filming','editing','scheduled','published'];
    cols.forEach(function(col){
      var cards=board[col];
      if(!Array.isArray(cards)) return;
      cards.forEach(function(card){
        var title=card.title||card.name||'';
        if(title.toLowerCase().indexOf(q.toLowerCase())!==-1){
          res.push({type:'Pipeline',name:title,icon:'\u{1F4CB}',page:'pipeline'});
        }
      });
    });
  }catch(e){}

  /* supabase clients */
  var sbUrl='https://cscfbuhwlfhblxprkwnh.supabase.co';
  var apikey='sb_publishable_1ZqIVolUXpUocXTtHP3yBA_UFNidOD8';
  fetch(sbUrl+'/rest/v1/clients?select=name,id&name=ilike.*'+encodeURIComponent(q)+'*',{
    headers:{'apikey':apikey,'Authorization':'Bearer '+apikey}
  }).then(function(r){return r.ok?r.json():[];}).then(function(clients){
    var clientRes=clients.map(function(c){return{type:'Client',name:c.name,icon:'\u{1F465}',page:'clients'};});
    renderSRResults(res.concat(clientRes),q);
  }).catch(function(){
    renderSRResults(res,q);
  });
}

function renderSRResults(items,q){
  var el=document.getElementById('iob-sr-results');
  if(!items.length){el.innerHTML='<div class="iob-empty">No results for "'+escHtml(q)+'"</div>';return;}

  /* group by type */
  var groups={};
  items.forEach(function(it){
    if(!groups[it.type]) groups[it.type]=[];
    groups[it.type].push(it);
  });

  var html='';
  Object.keys(groups).forEach(function(type){
    html+='<div class="iob-label-bar">'+escHtml(type)+'</div>';
    groups[type].forEach(function(it){
      html+='<div class="iob-result-item" onclick="(function(){window.__iobNavTo(\''+it.page+'\')})()">'+
        '<span class="iob-result-icon">'+it.icon+'</span>'+
        '<span class="iob-result-name">'+escHtml(it.name)+'</span>'+
      '</div>';
    });
  });
  el.innerHTML=html;
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}


/* ═══════════════ KEYBOARD ═══════════════ */
document.addEventListener('keydown',function(e){
  var tag=(document.activeElement||{}).tagName||'';
  var inInput=/^(INPUT|TEXTAREA|SELECT)$/i.test(tag);
  var isContentEditable=(document.activeElement||{}).isContentEditable;

  /* ESC */
  if(e.key==='Escape'){
    if(document.getElementById('iob-cp-overlay').classList.contains('open')){closeCP();e.preventDefault();return;}
    if(document.getElementById('iob-sr-overlay').classList.contains('open')){closeSR();e.preventDefault();return;}
    if(document.getElementById('iob-sc-overlay').classList.contains('open')){document.getElementById('iob-sc-overlay').classList.remove('open');e.preventDefault();return;}
  }

  /* Cmd+K */
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){
    e.preventDefault();
    if(document.getElementById('iob-cp-overlay').classList.contains('open')){closeCP();}else{openCP();}
    return;
  }

  /* Cmd+/ */
  if((e.metaKey||e.ctrlKey)&&e.key==='/'){
    e.preventDefault();
    if(document.getElementById('iob-sr-overlay').classList.contains('open')){closeSR();}else{openSR();}
    return;
  }

  /* ? */
  if(e.key==='?'&&!inInput&&!isContentEditable&&!e.metaKey&&!e.ctrlKey){
    e.preventDefault();
    var sc=document.getElementById('iob-sc-overlay');
    if(sc.classList.contains('open')){sc.classList.remove('open');}else{sc.classList.add('open');}
    return;
  }

  /* Arrow keys in command palette */
  if(document.getElementById('iob-cp-overlay').classList.contains('open')){
    var items=document.querySelectorAll('#iob-cp-results .iob-result-item');
    if(!items.length) return;
    if(e.key==='ArrowDown'){
      e.preventDefault();
      cpActiveIdx=Math.min(cpActiveIdx+1,items.length-1);
      items.forEach(function(el,i){el.classList.toggle('active',i===cpActiveIdx);});
    } else if(e.key==='ArrowUp'){
      e.preventDefault();
      cpActiveIdx=Math.max(cpActiveIdx-1,0);
      items.forEach(function(el,i){el.classList.toggle('active',i===cpActiveIdx);});
    } else if(e.key==='Enter'){
      e.preventDefault();
      var active=document.querySelector('#iob-cp-results .iob-result-item.active')||items[0];
      if(active) active.click();
    }
  }
});

/* ═══════════════ SECTION COLLAPSE ═══════════════ */
function initCollapse(){
  var PAGE=window.location.pathname.split('/').filter(Boolean).pop()||'page';
  var selectors=['.section-label','.kanban-col-head','.col-header','.ds-header','.tp-head','.dp-head'];
  var sectionIdx=0;

  selectors.forEach(function(sel){
    document.querySelectorAll(sel).forEach(function(header){
      if(header.dataset.iobCollapse) return;
      header.dataset.iobCollapse='1';
      var body=header.nextElementSibling;
      if(!body) return;
      if(!body.children.length&&!body.textContent.trim()) return;

      var idx=sectionIdx++;
      var key='ui_collapse_'+PAGE+'_'+idx;
      var isCollapsed=localStorage.getItem(key)==='1';

      var chevron=document.createElement('button');
      chevron.className='iob-collapse-btn'+(isCollapsed?' collapsed':'');
      chevron.innerHTML='▼';
      chevron.title='Collapse/expand';
      chevron.onclick=function(e){
        e.stopPropagation();
        isCollapsed=!isCollapsed;
        chevron.classList.toggle('collapsed',isCollapsed);
        body.classList.toggle('collapsed',isCollapsed);
        localStorage.setItem(key,isCollapsed?'1':'0');
      };

      if(getComputedStyle(header).display==='block'||!header.style.display){
        header.style.display='flex';
      }
      header.style.alignItems='center';
      header.appendChild(chevron);

      if(isCollapsed) body.classList.add('collapsed');
    });
  });
}

/* ═══════════════ INIT ═══════════════ */
function init(){
  inject();
  setTimeout(initCollapse,400);
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
} else {
  init();
}

})();
</script>
