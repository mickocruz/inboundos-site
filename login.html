<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InboundOS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#0D1117;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;padding:16px;}
.card{width:100%;max-width:320px;border:1px solid rgba(255,255,255,0.07);background:rgba(28,44,59,0.4);border-radius:16px;overflow:hidden;}
.card-top{height:1px;width:100%;background:#4FC3F7;opacity:0.5;}
.card-header{padding:32px 32px 24px;border-bottom:1px solid rgba(255,255,255,0.06);}
.logo{font-size:24px;font-weight:900;letter-spacing:-0.02em;color:#fff;line-height:1;}
.logo span{color:#4FC3F7;}
.subtitle{font-size:10px;color:#8899A6;text-transform:uppercase;letter-spacing:0.15em;margin-top:8px;}
.card-body{padding:24px 32px;}
.field-label{font-size:10px;color:#8899A6;text-transform:uppercase;letter-spacing:0.15em;margin-bottom:8px;}
.field{margin-bottom:12px;}
input{width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 16px;font-size:14px;color:#fff;outline:none;transition:border-color 0.15s;font-family:'DM Sans',sans-serif;}
input::placeholder{color:rgba(255,255,255,0.2);}
input:focus{border-color:rgba(79,195,247,0.4);}
.error{font-size:11px;color:#f87171;margin-bottom:10px;display:none;}
button{width:100%;padding:12px;background:#4FC3F7;color:#0D1117;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;border:none;border-radius:12px;cursor:pointer;margin-top:4px;transition:filter 0.15s;font-family:'DM Sans',sans-serif;}
button:hover{filter:brightness(1.1);}
button:disabled{opacity:0.4;cursor:not-allowed;}
</style>
</head>
<body>
<div class="card">
  <div class="card-top"></div>
  <div class="card-header">
    <div class="logo">Inbound<span>OS</span></div>
    <div class="subtitle">Sign in to continue</div>
  </div>
  <div class="card-body">
    <div class="field">
      <div class="field-label">Password</div>
      <input type="password" id="password" placeholder="Enter password" autofocus>
    </div>
    <div class="error" id="error">Incorrect password</div>
    <button id="btn" onclick="login()">Sign In</button>
  </div>
</div>
<script>
function setCookie(name, value, days) {
  const d = new Date();
  d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
  document.cookie = name + '=' + value + ';expires=' + d.toUTCString() + ';path=/';
}
function getCookie(name) {
  const v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
  return v ? v[2] : null;
}
if (getCookie('ctrl_auth') === 'ok') {
  window.location.href = '/dashboard';
}
document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') login();
});
function login() {
  const pw = document.getElementById('password').value;
  const err = document.getElementById('error');
  const btn = document.getElementById('btn');
  if (pw === 'ringotwo764') {
    setCookie('ctrl_auth', 'ok', 90);
    btn.textContent = 'Signing in...';
    btn.disabled = true;
    const params = new URLSearchParams(window.location.search);
    window.location.href = params.get('from') || '/dashboard';
  } else {
    err.style.display = 'block';
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  }
}
</script>
</body>
</html>
