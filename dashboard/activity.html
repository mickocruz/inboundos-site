<style>
@font-face { font-family:'NHGrotesk'; src:url('/dashboard/fonts/NHGrotesk-Black.otf') format('opentype'); font-weight:900; }
:root {
  --bg:#0D1117; --card:rgba(255,255,255,0.02); --border:rgba(255,255,255,0.07);
  --accent:#4FC3F7; --accent-dim:rgba(79,195,247,0.07); --text:#ffffff;
  --text-muted:rgba(255,255,255,0.3); --text-dim:rgba(255,255,255,0.22);
  --green:#4ade80; --red:#f87171;
  --sidebar-w:180px; --font-head:'NHGrotesk','Arial Black',Arial,sans-serif; --font-body:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;overflow:hidden;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(79,195,247,0.06) 0%,transparent 70%);pointer-events:none;z-index:0;}
.layout{display:flex;height:100vh;position:relative;z-index:1;}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:rgba(7,11,18,0.82);border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;padding:0 0 16px;backdrop-filter:blur(32px) saturate(160%);-webkit-backdrop-filter:blur(32px) saturate(160%);z-index:10;overflow-y:auto;scrollbar-width:none;box-shadow:inset -1px 0 0 rgba(255,255,255,0.04);}
.sidebar::-webkit-scrollbar{display:none;}
.sidebar-logo-wrap{padding:18px 16px 14px;border-bottom:1px solid var(--border);margin-bottom:8px;cursor:pointer;}
.sidebar-logo-text{font-family:var(--font-head);font-size:17px;font-weight:900;letter-spacing:-0.5px;line-height:1;}
.nav-section{padding:10px 0 4px;}
.nav-section-label{font-family:var(--font-body);font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--text-dim);padding:0 16px;margin-bottom:4px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;transition:all 0.15s;color:var(--text-muted);font-family:var(--font-body);font-size:13px;font-weight:500;border-left:2px solid transparent;}
.nav-item svg{width:14px;height:14px;flex-shrink:0;opacity:0.7;}
.nav-item:hover{background:rgba(79,195,247,0.04);color:rgba(255,255,255,0.75);}
.nav-item.active{color:#4FC3F7;border-left-color:#4FC3F7;background:rgba(79,195,247,0.06);}
.nav-item.active svg{opacity:1;}
.sidebar-agents{padding:10px 0 4px;}
.sidebar-bottom{margin-top:auto;padding:12px 16px 0;border-top:1px solid var(--border);}
.mk-avatar-wrap{display:flex;align-items:center;gap:10px;}
.mk-name{font-family:var(--font-body);font-size:12px;font-weight:600;color:#fff;line-height:1.2;}
.mk-role{font-family:var(--font-body);font-size:11px;color:rgba(255,255,255,0.42);}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* ── PAGE HEADER (matches other dashboard pages) ── */
.page-header{padding:22px 24px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--border);}
.page-header h1{font-family:var(--font-head);font-size:28px;font-weight:900;letter-spacing:-1.2px;line-height:1;}
.page-header h1 span{color:var(--text);}
.page-header .sub{font-family:var(--font-body);font-size:11px;color:var(--text-muted);margin-top:4px;display:flex;align-items:center;gap:6px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;animation:blink 2s infinite;}
@keyframes blink{0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,0.5);}70%{box-shadow:0 0 0 6px rgba(74,222,128,0);}}
.refresh-btn{font-size:11px;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(79,195,247,0.2);border-radius:7px;padding:5px 11px;cursor:pointer;font-family:var(--font-body);font-weight:600;}
.refresh-btn:hover{background:rgba(79,195,247,0.14);}
.clear-btn{font-size:11px;color:#f87171;background:rgba(248,113,113,0.07);border:1px solid rgba(248,113,113,0.2);border-radius:7px;padding:5px 11px;cursor:pointer;font-family:var(--font-body);font-weight:600;}
.clear-btn:hover{background:rgba(248,113,113,0.14);}

/* confirm modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;}
.modal-box{background:#131920;border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:28px 28px 22px;max-width:340px;width:90%;box-shadow:0 24px 60px rgba(0,0,0,0.5);}
.modal-title{font-family:var(--font-head);font-size:18px;font-weight:900;letter-spacing:-.5px;color:#fff;margin-bottom:10px;}
.modal-body{font-size:13px;color:rgba(255,255,255,0.55);line-height:1.5;margin-bottom:22px;}
.modal-body strong{color:#f87171;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;}
.modal-cancel{font-size:12px;color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:7px;padding:7px 16px;cursor:pointer;font-family:var(--font-body);font-weight:600;}
.modal-cancel:hover{background:rgba(255,255,255,0.09);}
.modal-confirm{font-size:12px;color:#fff;background:#ef4444;border:1px solid #ef4444;border-radius:7px;padding:7px 16px;cursor:pointer;font-family:var(--font-body);font-weight:600;}
.modal-confirm:hover{background:#dc2626;}

/* ── TYPING INDICATOR ── */
.typing-row{display:flex;align-items:center;gap:10px;padding:4px 0 8px;}
.typing-bubble{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:16px;border-top-left-radius:4px;padding:10px 14px;}
.typing-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.35);animation:tdot 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.35;}30%{transform:translateY(-5px);opacity:1;}}

/* ── MESSENGER FEED ── */
.feed{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:rgba(79,195,247,0.12) transparent;}
.feed::-webkit-scrollbar{width:3px;}.feed::-webkit-scrollbar-thumb{background:rgba(79,195,247,0.15);border-radius:3px;}

/* date divider */
.date-sep{display:flex;align-items:center;gap:10px;margin:10px 0 6px;color:var(--text-dim);font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border);}

/* message bubble row */
.msg-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;}
.msg-row.left{align-self:flex-start;max-width:72%;}
.msg-row.right{align-self:flex-end;flex-direction:row-reverse;max-width:72%;}
.msg-row.report-row{max-width:600px;}

/* avatar */
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700;border:1px solid rgba(255,255,255,0.1);}

/* bubble */
.bubble{display:flex;flex-direction:column;gap:2px;min-width:140px;max-width:100%;flex:1;}
.bubble-name{font-size:10px;font-weight:700;letter-spacing:.3px;padding:0 2px;margin-bottom:3px;text-transform:uppercase;}
.bubble-body{padding:8px 12px;border-radius:14px;font-size:13px;line-height:1.45;word-break:break-word;position:relative;overflow-wrap:break-word;}
.bubble-text{white-space:pre-wrap;word-break:break-word;overflow-wrap:break-word;}
.msg-row.left .bubble-body{border-top-left-radius:4px;}

/* tag pill */
.bubble-tag{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:2px 6px;border-radius:20px;}
.bubble-meta{display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.bubble-to-label{font-size:10px;opacity:.7;}

/* time below bubble */
.bubble-time{font-size:10px;color:var(--text-dim);padding:0 2px;margin-top:2px;}

/* report bubble — always expanded */
.report-body{position:relative;}
.read-more{display:none;}
.report-fade{display:none;}

.empty{display:flex;align-items:center;justify-content:center;height:100%;opacity:.35;font-size:13px;text-align:center;}

/* ── AGENT ROLE BADGE ── */
.agent-role{font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;opacity:.45;margin-left:7px;vertical-align:middle;}

/* ── TO CHIP — inline recipient inside bubble ── */
.to-chip{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:1px 7px;border-radius:20px;border:1px solid;margin-left:5px;letter-spacing:.2px;}

/* ── REPORT TITLE ── */
.report-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.3;}

/* ── REPORT BODY MARKDOWN ── */
.report-body p{margin:0 0 8px;line-height:1.55;}
.report-body p:last-child{margin-bottom:0;}
.report-body ul{margin:0 0 8px;padding-left:18px;}
.report-body li{margin-bottom:4px;line-height:1.5;}
.report-body strong{color:#fff;font-weight:600;}
.report-body br{display:block;content:'';margin-top:4px;}
.report-body code{background:rgba(255,255,255,0.08);padding:1px 5px;border-radius:4px;font-size:11px;}

@media(max-width:480px){.feed{padding:12px 10px;}.sidebar{display:none;}}
</style>
</head>

<script>
const KNOWN = new Set(['Atlas','Argus','Apollo','Hermes','Clio']);

const AGENT = {
  Atlas:  { c:'#4FC3F7', bg:'rgba(79,195,247,0.08)',  init:'At', role:'CIO' },
  Argus:  { c:'#a78bfa', bg:'rgba(167,139,250,0.08)', init:'Ar', role:'Intel' },
  Apollo: { c:'#60a5fa', bg:'rgba(96,165,250,0.08)',  init:'Ap', role:'Content' },
  Hermes: { c:'#34d399', bg:'rgba(52,211,153,0.08)',  init:'He', role:'Sales' },
  Clio:   { c:'#f472b6', bg:'rgba(244,114,182,0.08)', init:'Cl', role:'COO' },
};

const TAG = {
  report:  { label:'Report',  c:'#4FC3F7' },
  task:    { label:'Task',    c:'#fbbf24' },
  message: { label:'Message', c:'#a78bfa' },
  activity:{ label:'Ran',     c:'#4ade80' },
};

function norm(n){ if(!n)return n; n=n.trim(); if(n===n.toUpperCase()&&n.length>1) n=n[0]+n.slice(1).toLowerCase(); return n; }
function esc(t){ return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function stripMd(t){
  if(!t) return '';
  return t
    .replace(/\*\*(.+?)\*\*/g,'$1')
    .replace(/\*(.+?)\*/g,'$1')
    .replace(/#{1,6}\s+/g,'')
    .replace(/`{1,3}([^`]+)`{1,3}/g,'$1')
    .replace(/^\s*[-*]\s+/gm,'• ')
    .replace(/\[([^\]]+)\]\([^)]+\)/g,'$1')
    .replace(/\n{3,}/g,'\n\n')
    .trim();
}

function mdToHtml(t){
  if(!t) return '';
  const lines = t.split('\n');
  let html = '';
  let inList = false;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const isBullet = /^\s*[-*•]\s+/.test(line);
    if (isBullet) {
      if (!inList) { html += '<ul>'; inList = true; }
      const content = line.replace(/^\s*[-*•]\s+/, '');
      html += '<li>' + fmtInline(content) + '</li>';
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      const trimmed = line.trim();
      if (!trimmed) {
        html += '<br>';
      } else if (/^#{1,6}\s+/.test(trimmed)) {
        html += '<p><strong>' + fmtInline(trimmed.replace(/^#{1,6}\s+/,'')) + '</strong></p>';
      } else if (/^---+$/.test(trimmed)) {
        html += '<hr style="border:none;border-top:1px solid rgba(255,255,255,0.08);margin:8px 0;">';
      } else {
        html += '<p>' + fmtInline(trimmed) + '</p>';
      }
    }
  }
  if (inList) html += '</ul>';
  return html;
}

function fmtInline(t){
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>');
}

function timeStr(ts){
  if(!ts) return '';
  const d=new Date(ts), now=Date.now(), s=Math.floor((now-d)/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

function dayLabel(ts){
  const d=new Date(ts);
  const today=new Date(); today.setHours(0,0,0,0);
  const dd=new Date(d); dd.setHours(0,0,0,0);
  const diff=Math.round((today-dd)/86400000);
  if(diff===0) return 'Today';
  if(diff===1) return 'Yesterday';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

let expandState={};
function toggleReport(id){
  const rb=document.getElementById('rb-'+id);
  const btn=document.getElementById('rm-'+id);
  if(!rb) return;
  expandState[id]=!expandState[id];
  rb.classList.toggle('expanded', expandState[id]);
  if(btn) btn.textContent=expandState[id]?'Show less':'Read full report';
}

// scroll lock — true = user scrolled up, don't auto-scroll
let _userScrolledUp = false;

function isAtBottom(feed){
  return feed.scrollHeight - feed.scrollTop - feed.clientHeight < 60;
}

function updateScrollBtn(){
  const btn = document.getElementById('scroll-btn');
  if(btn) btn.style.display = _userScrolledUp ? 'block' : 'none';
}

function scrollToBottom(){
  const feed = document.getElementById('feed');
  feed.scrollTop = feed.scrollHeight;
  _userScrolledUp = false;
  updateScrollBtn();
}

document.addEventListener('DOMContentLoaded', function(){
  const feed = document.getElementById('feed');
  feed.addEventListener('scroll', function(){
    _userScrolledUp = !isAtBottom(feed);
    updateScrollBtn();
  });
});

function render(events){
  const feed=document.getElementById('feed');
  const filtered=events.filter(e=>KNOWN.has(norm(e.agent)));
  if(!filtered.length){
    feed.innerHTML='<div class="empty">No agent activity yet — check back once the agents have run.</div>';
    return;
  }

  // oldest first → newest at bottom (chat order)
  const ordered=[...filtered].reverse();
  let lastDay='', html='';

  ordered.forEach((e,i)=>{
    const agent=norm(e.agent);
    const to=norm(e.to||'');
    const a=AGENT[agent]||{c:'#9ca3af',bg:'rgba(156,163,175,0.08)',init:'??',role:''};
    const toA=AGENT[to]||null;
    const tag=TAG[e.kind]||TAG.activity;
    const isReport=e.kind==='report';
    const body=isReport ? mdToHtml(e.body||'') : esc(stripMd(e.body||'')).replace(/^\n+/,'').replace(/\n{3,}/g,'\n\n');
    const day=dayLabel(e.ts);

    if(day!==lastDay){
      html+=`<div class="date-sep">${day}</div>`;
      lastDay=day;
    }

    const uid='ev'+i;

    // Avatar
    const avHtml=`<div class="av" style="background:${a.bg};color:${a.c};border-color:${a.c}22;">${a.init}</div>`;

    // Tag pill
    const tagHtml=`<span class="bubble-tag" style="background:${tag.c}18;color:${tag.c};">${tag.label}</span>`;

    // "→ Recipient" inline in meta row — only when sent to a known agent
    const toChip = to && KNOWN.has(to) && toA
      ? `<span class="to-chip" style="color:${toA.c};border-color:${toA.c}33;">→ ${esc(to)}</span>`
      : '';

    // Meta row: tag + recipient
    const metaHtml=`<div class="bubble-meta">${tagHtml}${toChip}</div>`;

    // Report body (collapsible)
    let bodyHtml;
    if(isReport){
      const titleHtml=e.title?`<div class="report-title">${esc(stripMd(e.title))}</div>`:'';
      bodyHtml=`${titleHtml}<div class="report-body">${body}</div>`;
    } else {
      bodyHtml=`<div class="bubble-text">${body}</div>`;
    }

    // Role label
    const roleSpan=a.role?`<span class="agent-role">${a.role}</span>`:'';

    html+=`<div class="msg-row left${isReport?' report-row':''}">
      ${avHtml}
      <div class="bubble">
        <div class="bubble-name" style="color:${a.c};">${esc(agent)}${roleSpan}</div>
        <div class="bubble-body" style="background:${a.bg};border-color:${a.c}22;">
          ${metaHtml}${bodyHtml}
        </div>
        <div class="bubble-time">${timeStr(e.ts)}</div>
      </div>
    </div>`;
  });

  feed.innerHTML=html;
  if(!_userScrolledUp) feed.scrollTop=feed.scrollHeight;
  updateScrollBtn();
}

function showTyping(){
  const feed=document.getElementById('feed');
  if(feed.querySelector('.typing-row')) return;
  // Pick last active agent if we can, else Atlas
  const row=document.createElement('div');
  row.className='typing-row';
  row.id='typing-indicator';
  const a=AGENT['Atlas'];
  row.innerHTML=`<div class="av" style="background:${a.bg};color:${a.c};border-color:${a.c}22;">${a.init}</div><div class="typing-bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
  feed.appendChild(row);
  if(!_userScrolledUp) feed.scrollTop=feed.scrollHeight;
}
function hideTyping(){
  const el=document.getElementById('typing-indicator');
  if(el) el.remove();
}

let _firstLoad=true;
async function load(manual){
  if(_firstLoad) showTyping();
  try {
    const _s=JSON.parse(localStorage.getItem('sb_session')||'{}');
    const r=await fetch('/api/activity',{headers:{'Authorization':'Bearer '+(_s.access_token||'')}});
    if(!r.ok) throw new Error('offline');
    const {events}=await r.json();
    hideTyping();
    _firstLoad=false;
    render(events||[]);
  } catch(e){
    hideTyping();
    _firstLoad=false;
    if(manual) document.getElementById('feed').innerHTML='<div class="empty">Feed offline — make sure the server is running.</div>';
  }
}

load();
setInterval(load,30000);

function confirmClear(){
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.id='clear-modal';
  overlay.innerHTML=`<div class="modal-box">
    <div class="modal-title">Clear chat history?</div>
    <div class="modal-body">This permanently deletes all agent messages from the database.<br><br><strong>Cannot be undone.</strong> Daily reports and run logs are kept.</div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="document.getElementById('clear-modal').remove()">Cancel</button>
      <button class="modal-confirm" onclick="clearChat()">Delete messages</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

async function clearChat(){
  const modal=document.getElementById('clear-modal');
  if(modal) modal.remove();
  document.getElementById('feed').innerHTML='<div class="empty">Clearing…</div>';
  try {
    const _s=JSON.parse(localStorage.getItem('sb_session')||'{}');
    const r=await fetch('/api/activity/clear',{
      method:'POST',
      headers:{'Authorization':'Bearer '+(_s.access_token||''),'Content-Type':'application/json'}
    });
    if(!r.ok) throw new Error('Failed');
    await load(true);
  } catch(e){
    document.getElementById('feed').innerHTML='<div class="empty">Clear failed — server may be offline.</div>';
  }
}
</script>

<script>
// LIVE AGENT STATUS — sidebar dots
(function liveAgentStatus() {
  var AGENTS = [
    {name:'Atlas'},{name:'Argus'},{name:'Apollo'},{name:'Hermes'},{name:'Clio'}
  ];
  var _status = {}, _lastMsg = {};
  AGENTS.forEach(function(a){ _status[a.name]='idle'; _lastMsg[a.name]=''; });

  var SERVER_BASE = (location.hostname==='localhost'||location.hostname==='127.0.0.1'||/^192\.168\./.test(location.hostname)||/^10\./.test(location.hostname)) ? '' : '';

  function sbCfg() {
    var s={};try{s=JSON.parse(localStorage.getItem('sb_session')||'{}');}catch(e){}
    var key='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNzY2ZidWh3bGZoYmx4cHJrd25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NjMyMjUsImV4cCI6MjA5NTAzOTIyNX0.TNIW7H0iR7WxtPJSJi9LPBmqIiQu8w1xJ2MY4eDYVsA';
    var tok=(s.access_token&&s.access_token!=='local')?s.access_token:key;
    return {key:key,hdrs:{'apikey':key,'Authorization':'Bearer '+tok}};
  }

  async function fetchLiveStatus() {
    var sb=sbCfg();
    var since=new Date(Date.now()-5*60*1000).toISOString();
    try {
      var [sigRes,commsRes]=await Promise.all([
        fetch(SERVER_BASE+'/api/sb/agent_signals?status=eq.pending&created_at=gte.'+since+'&select=to_agent,created_at&order=created_at.desc&limit=20'),
        fetch(SERVER_BASE+'/api/sb/agent_comms?created_at=gte.'+since+'&select=from_agent,message,created_at&order=created_at.desc&limit=20')
      ]);
      var signals=sigRes.ok?await sigRes.json():[];
      var comms=commsRes.ok?await commsRes.json():[];
      AGENTS.forEach(function(a){_status[a.name]='idle';_lastMsg[a.name]='';});
      signals.forEach(function(s){if(_status[s.to_agent]!==undefined)_status[s.to_agent]='working';});
      comms.forEach(function(c){if(c.from_agent&&_lastMsg[c.from_agent]!==undefined&&!_lastMsg[c.from_agent])_lastMsg[c.from_agent]=(c.message||'').slice(0,60);});
    } catch(e) {}
  }

  function renderStatus() {
    var el=document.getElementById('sidebar-agent-status-list');
    if(!el) return;
    el.innerHTML=AGENTS.map(function(a){
      var st=_status[a.name]||'idle';
      var dot=st==='working'?'background:#4FC3F7;animation:pg 1.5s infinite;':'background:rgba(255,255,255,0.12);';
      var msg=_lastMsg[a.name]||'';
      return '<div style="display:flex;align-items:flex-start;gap:10px;padding:7px 16px;cursor:pointer;" onclick="location.href=location.href.replace(/\\/[^\\/]*$/,\'/agents\')">'
        +'<div style="width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;'+dot+'"></div>'
        +'<div style="flex:1;min-width:0;">'
          +'<div style="display:flex;justify-content:space-between;">'
            +'<span style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.6);">'+a.name+'</span>'
            +'<span style="font-size:10px;color:'+(st==='working'?'#4FC3F7':'rgba(255,255,255,0.25)')+';">'+(st==='working'?'active':'idle')+'</span>'
          +'</div>'
          +(msg?'<div style="font-size:10px;color:rgba(255,255,255,0.22);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;">'+msg+'</div>':'')
        +'</div></div>';
    }).join('');
  }

  async function tick(){ await fetchLiveStatus(); renderStatus(); }
  document.addEventListener('DOMContentLoaded',function(){ tick(); setInterval(tick,30000); });
  if(document.readyState!=='loading') tick();
})();
</script>

function initCollapse(){
  var PAGE=window.location.pathname.split('/').filter(Boolean).pop()||'page';
  var selectors=['.section-label','.kanban-col-head','.col-header','.ds-header','.tp-head','.dp-head'];
  var sectionIdx=0;

  selectors.forEach(function(sel){
    document.querySelectorAll(sel).forEach(function(header){
      if(header.dataset.iobCollapse) return;
      header.dataset.iobCollapse='1';
      var body=header.nextElementSibling;
      if(!body) return;
      if(!body.children.length&&!body.textContent.trim()) return;

      var idx=sectionIdx++;
      var key='ui_collapse_'+PAGE+'_'+idx;
      var isCollapsed=localStorage.getItem(key)==='1';

      var chevron=document.createElement('button');
      chevron.className='iob-collapse-btn'+(isCollapsed?' collapsed':'');
      chevron.innerHTML='▼';
      chevron.title='Collapse/expand';
      chevron.onclick=function(e){
        e.stopPropagation();
        isCollapsed=!isCollapsed;
        chevron.classList.toggle('collapsed',isCollapsed);
        body.classList.toggle('collapsed',isCollapsed);
        localStorage.setItem(key,isCollapsed?'1':'0');
      };

      if(getComputedStyle(header).display==='block'||!header.style.display){
        header.style.display='flex';
      }
      header.style.alignItems='center';
      header.appendChild(chevron);

      if(isCollapsed) body.classList.add('collapsed');
    });
  });
}

  inject();
  setTimeout(initCollapse,400);
}

} else {

}

      var isCollapsed=localStorage.getItem(key)==='1';

      var chevron=document.createElement('button');
      chevron.className='iob-collapse-btn'+(isCollapsed?' collapsed':'');
      chevron.innerHTML='▼';
      chevron.title='Collapse/expand';
      chevron.onclick=function(e){
        e.stopPropagation();
        isCollapsed=!isCollapsed;
        chevron.classList.toggle('collapsed',isCollapsed);
        body.classList.toggle('collapsed',isCollapsed);
        localStorage.setItem(key,isCollapsed?'1':'0');
      };

      if(getComputedStyle(header).display==='block'||!header.style.display){
        header.style.display='flex';
      }
      header.style.alignItems='center';
      header.appendChild(chevron);

      if(isCollapsed) body.classList.add('collapsed');
    });
  });
}

/* ═══════════════ INIT ═══════════════ */
function init(){
  inject();
  setTimeout(initCollapse,400);
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
} else {
  init();
}

})();
</script>

</body>
</html>
