<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InboundOS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Roboto:wght@500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#0D1117;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;padding:16px;}
.card{width:100%;max-width:320px;border:1px solid rgba(255,255,255,0.07);background:rgba(28,44,59,0.4);border-radius:16px;overflow:hidden;}
.card-top{height:3px;width:100%;background:#4FC3F7;opacity:0.8;}
.card-header{padding:32px 32px 24px;border-bottom:1px solid rgba(255,255,255,0.06);}
.logo{font-size:24px;font-weight:900;letter-spacing:-0.02em;color:#fff;line-height:1;}
.logo span{color:#4FC3F7;}
.subtitle{font-size:12px;color:#8899A6;text-transform:uppercase;letter-spacing:0.15em;margin-top:8px;}
.card-body{padding:24px 32px;}
.field-label{font-size:12px;color:#8899A6;text-transform:uppercase;letter-spacing:0.15em;margin-bottom:8px;}
.field{margin-bottom:12px;}
.input-wrap{position:relative;}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#8899A6;padding:0;width:auto;margin:0;filter:none;display:flex;align-items:center;}
.eye-btn:hover{color:#fff;filter:none;}
input{width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 44px 12px 16px;font-size:14px;color:#fff;outline:none;transition:border-color 0.2s,box-shadow 0.2s;font-family:'DM Sans',sans-serif;}
input::placeholder{color:rgba(255,255,255,0.2);}
input:focus{border-color:rgba(79,195,247,0.6);box-shadow:0 0 0 3px rgba(79,195,247,0.1);}
.error{font-size:11px;color:#f87171;margin-bottom:10px;display:none;}
button{width:100%;padding:12px;background:#4FC3F7;color:#0D1117;font-size:12px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;border:none;border-radius:12px;cursor:pointer;margin-top:4px;transition:filter 0.15s;font-family:'DM Sans',sans-serif;}
button:hover{filter:brightness(1.1);}
button:disabled{opacity:0.4;cursor:not-allowed;}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;background:rgba(255,255,255,0.05);color:#fff;font-size:14px;font-weight:500;letter-spacing:0.01em;text-transform:none;border:1px solid rgba(255,255,255,0.12);border-radius:12px;cursor:pointer;margin-top:0;transition:background 0.15s,border-color 0.15s;font-family:'Roboto',sans-serif;}
.google-btn:hover{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.2);filter:none;}
.divider{display:flex;align-items:center;gap:12px;margin:16px 0 4px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.07);}
.divider span{font-size:11px;color:#8899A6;text-transform:uppercase;letter-spacing:0.12em;}
</style>
</head>
<body>
<div class="card">
  <div class="card-top"></div>
  <div class="card-header">
    <div class="logo">Inbound<span>OS</span></div>
    <div class="subtitle">Dashboard Login</div>
  </div>
  <div class="card-body">
    <button class="google-btn" id="google-btn" onclick="loginWithGoogle()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <div class="divider"><span>or</span></div>
    <div class="field">
      <div class="field-label">Username</div>
      <input type="text" id="username" placeholder="your-username" autofocus autocapitalize="none" autocorrect="off">
    </div>
    <div class="field">
      <div class="field-label">Password</div>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Enter password">
        <button type="button" class="eye-btn" onclick="togglePw()" tabindex="-1" id="eyebtn">
          <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>
    <div class="error" id="error">Incorrect password</div>
    <button id="btn" onclick="login()">Sign In</button>
  </div>
</div>
<script>
const SB_URL = 'https://cscfbuhwlfhblxprkwnh.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNzY2ZidWh3bGZoYmx4cHJrd25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NjMyMjUsImV4cCI6MjA5NTAzOTIyNX0.TNIW7H0iR7WxtPJSJi9LPBmqIiQu8w1xJ2MY4eDYVsA';
const EDGE_URL = SB_URL + '/functions/v1/login';

function getSession() {
  try { return JSON.parse(localStorage.getItem('sb_session') || 'null'); } catch { return null; }
}
const _s = getSession();
if (_s && _s.access_token && _s.client_slug) {
  const exp = _s.expires_at ? _s.expires_at * 1000 : 0;
  if (!exp || exp > Date.now()) {
    window.location.href = '/' + _s.client_slug + '/dashboard';
  }
}

document.getElementById('username').addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('password').focus(); });
document.getElementById('password').addEventListener('keydown', function(e) { if (e.key === 'Enter') login(); });

function togglePw() {
  const inp = document.getElementById('password');
  const icon = document.getElementById('eye-icon');
  const shown = inp.type === 'text';
  inp.type = shown ? 'password' : 'text';
  icon.parentElement.setAttribute('data-shown', !shown);
  if (!shown) {
    icon.setAttribute('d', 'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z');
    if (!icon.parentElement.querySelector('circle')) {
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', '12');
      circle.setAttribute('cy', '12');
      circle.setAttribute('r', '3');
      icon.parentElement.appendChild(circle);
    }
  } else {
    icon.setAttribute('d', 'M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19M1 1l22 22');
    const circle = icon.parentElement.querySelector('circle');
    if (circle) circle.remove();
  }
}

function loginWithGoogle() {
  const btn = document.getElementById('google-btn');
  btn.disabled = true;
  btn.innerHTML = 'Redirecting...';
  const redirectTo = window.location.origin + '/login';
  window.location.href = SB_URL + '/auth/v1/authorize?provider=google&redirect_to=' + encodeURIComponent(redirectTo);
}

let loginAttempts = 0;
const MAX_ATTEMPTS = 5;
const LOCKOUT_TIME = 60000; // 60 seconds
let lockedUntil = 0;

async function login() {
  const un = document.getElementById('username').value.trim().toLowerCase();
  const pw = document.getElementById('password').value;
  const err = document.getElementById('error');
  const btn = document.getElementById('btn');

  // Rate limiting
  if (Date.now() < lockedUntil) {
    const remaining = Math.ceil((lockedUntil - Date.now()) / 1000);
    err.style.display = 'block';
    err.textContent = `Too many attempts. Try again in ${remaining}s.`;
    btn.disabled = true;
    return;
  }

  err.style.display = 'none';
  btn.textContent = 'Signing in...';
  btn.disabled = true;

  try {
    const res = await fetch(EDGE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + ANON_KEY },
      body: JSON.stringify({ username: un, password: pw }),
    });
    const data = await res.json();

    if (!res.ok) {
      loginAttempts++;
      if (loginAttempts >= MAX_ATTEMPTS) {
        lockedUntil = Date.now() + LOCKOUT_TIME;
      }
      err.style.display = 'block';
      err.textContent = data.error || 'Login failed';
      btn.textContent = 'Sign In';
      btn.disabled = false;
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
      return;
    }

    // Reset on success
    loginAttempts = 0;
    lockedUntil = 0;

    localStorage.setItem('sb_session', JSON.stringify({
      access_token: data.access_token,
      refresh_token: data.refresh_token,
      expires_at: data.expires_at || Math.floor(Date.now() / 1000) + 3600,
      client_id: data.client_id,
      client_slug: data.client_slug,
      client_supabase_url: data.client_supabase_url,
      client_supabase_anon: data.client_supabase_anon,
    }));

    const params = new URLSearchParams(window.location.search);
    const from = params.get('from');
    const safeTo = (from && from.startsWith('/') && !from.startsWith('//')) ? from : '/' + data.client_slug + '/dashboard';
    window.location.href = safeTo;
  } catch (e) {
    err.style.display = 'block';
    err.textContent = 'Network error. Try again.';
    btn.textContent = 'Sign In';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
